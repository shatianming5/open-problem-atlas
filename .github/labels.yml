# Labels for OpenProblemAtlas
# Apply with: gh label create --force -R OWNER/REPO "name" -d "description" -c "color"
# Or use https://github.com/marketplace/actions/github-labeler

# --- Type labels ---
- name: "type:problem"
  color: "0e8a16"
  description: "New verified problem submission"

- name: "type:lead"
  color: "c5def5"
  description: "Radar lead / candidate problem"

- name: "type:attempt"
  color: "d4c5f9"
  description: "AI or human attempt record"

- name: "type:source"
  color: "bfdadc"
  description: "New source for ingestion"

# --- Domain labels ---
- name: "domain:math"
  color: "1d76db"
  description: "Mathematics"

- name: "domain:tcs"
  color: "5319e7"
  description: "Theoretical Computer Science"

- name: "domain:physics"
  color: "006b75"
  description: "Mathematical Physics"

# --- Workflow labels ---
- name: "needs-review"
  color: "fbca04"
  description: "Needs human review"

- name: "good-first-entry"
  color: "7057ff"
  description: "Good for new contributors"

- name: "status-change"
  color: "e11d48"
  description: "Reports a status change (open → solved, etc.)"

# --- Feature labels ---
- name: "formalization-wanted"
  color: "f9d0c4"
  description: "Seeking formalization in Lean/Coq/Isabelle"

- name: "solver-ready"
  color: "c2e0c6"
  description: "Amenable to computational approaches"

# --- Priority labels ---
- name: "priority:high"
  color: "b60205"
  description: "High priority"

- name: "priority:low"
  color: "e4e669"
  description: "Low priority"

# --- Meta labels ---
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"

- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"
