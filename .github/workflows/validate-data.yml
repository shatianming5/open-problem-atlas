name: Validate Data

on:
  push:
    paths:
      - 'data/**'
      - 'schema/**'
      - 'review/**'
  pull_request:
    paths:
      - 'data/**'
      - 'schema/**'
      - 'review/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate all data
        run: python -m review.validators.validate_all
