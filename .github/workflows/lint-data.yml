name: Lint Data

on:
  pull_request:
    paths:
      - 'data/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check YAML syntax
        run: |
          python -c "
          import yaml, sys, pathlib
          errors = []
          for f in sorted(pathlib.Path('data').rglob('*.yaml')):
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print(f'All YAML files valid.')
          "

      - name: Check for duplicate IDs
        run: |
          python -c "
          import yaml, sys, pathlib
          ids = {}
          for f in sorted(pathlib.Path('data/problems').rglob('*.yaml')):
              data = yaml.safe_load(f.read_text())
              if data and 'id' in data:
                  pid = data['id']
                  if pid in ids:
                      print(f'DUPLICATE: {pid} in {f} and {ids[pid]}')
                      sys.exit(1)
                  ids[pid] = f
          print(f'No duplicate IDs found among {len(ids)} problems.')
          "
