collection_id: col_millennium-problems
title: "Clay Millennium Prize Problems"
description: >
  The seven Millennium Prize Problems, each carrying a $1,000,000 prize,
  selected by the Clay Mathematics Institute in 2000. These represent some of
  the most important unsolved problems in mathematics. The Poincaré conjecture
  was solved by Perelman (2003) and is not included in this atlas (it concerns
  3-manifolds, not smooth 4-manifolds).
curator: "OpenProblemAtlas"
