title: "Schanuel's Conjecture"
statement: "Given any n complex numbers z_1, ..., z_n that are linearly independent over the rational numbers, the field extension Q(z_1, ..., z_n, e^{z_1}, ..., e^{z_n}) has transcendence degree at least n over Q."
