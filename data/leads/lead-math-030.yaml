title: "Littlewood Conjecture on Simultaneous Diophantine Approximation"
statement: "For all real alpha, beta: lim inf_{n->infty} n * ||n*alpha|| * ||n*beta|| = 0, where ||.|| denotes the distance to the nearest integer."
