title: "Erdos-Turan Conjecture on Additive Bases"
statement: "If A is an additive basis of order 2 (i.e., every sufficiently large integer can be written as a sum of two elements of A), then the number of representations r(n) = |{(a,b) in A x A : a+b = n}| is unbounded."
