title: "Second Hardy-Littlewood Conjecture"
statement: "For all integers x >= 2 and y >= 2, the number of primes in the interval (x, x+y] does not exceed the number of primes up to y. That is, pi(x+y) - pi(x) <= pi(y) for all x, y >= 2."
