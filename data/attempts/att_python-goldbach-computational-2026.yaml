method_summary: >
  Performed computational verification of Goldbach's conjecture for all even
  integers in the range [4, 10^8] using an optimized Python script with a
  segmented Sieve of Eratosthenes. For each even number n, the script checks
  whether there exist primes p and q such that p + q = n. Additionally
  collected statistics on the number of Goldbach representations r(n) and the
  minimum prime in each decomposition (the Goldbach comet).
prompt: >
  Write a Python program that verifies Goldbach's conjecture for all even
  integers up to 10^8. Use a segmented sieve for memory efficiency. For each
  even n, record: (1) whether a decomposition exists, (2) the count of
  decompositions, (3) the smallest prime p such that n-p is also prime.
  Output summary statistics and flag any counterexamples.
