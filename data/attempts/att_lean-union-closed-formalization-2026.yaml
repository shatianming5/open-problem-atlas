date: "2026-03-01"
method_summary: >
  Attempted a partial formalization of the union-closed sets conjecture
  (Frankl's conjecture) in Lean 4 with Mathlib. The approach was to first
  formalize the core definitions (union-closed family, frequency of an
  element), then state the conjecture, and finally attempt to formalize
  known partial results including the n <= 50 case and the lattice case.
  Claude was used to generate initial Lean code which was then iteratively
  refined against the Lean type-checker.
prompt: >
  Formalize Frankl's union-closed sets conjecture in Lean 4 using Mathlib.
  Define a union-closed family of finite sets, state the conjecture, and
  attempt to prove it for small cases (families with at most 5 sets).
  Use Finset from Mathlib for finite set operations.
tools:
  - "Lean 4 (v4.5.0)"
  - "Mathlib4"
  - "Claude 3.5 Sonnet API"
environment:
  hardware: "Apple M2 Max, 32GB RAM"
  runtime: "Lean 4.5.0, lake"
  dependencies:
    - "mathlib4"
    - "lean4>=4.5.0"
outcome:
  summary: >
    Successfully formalized the core definitions: UnionClosedFamily as a
    structure over Finset (Finset alpha), the frequency function counting
    how many sets contain a given element, and the conjecture statement
    itself. Proved the conjecture for families with at most 3 sets using
    case analysis (decide tactic). The attempt to handle 4-5 sets ran
    into combinatorial explosion with the decide tactic, and a more
    structured proof approach was not completed within the time budget.
    The formalization of Knill's lattice case was started but blocked on
    missing Mathlib API for certain lattice-theoretic lemmas.
  result_type: "formalization"
  artifacts:
    - type: "code"
      path: "artifacts/union-closed-lean4/"
verification_status: "unverified"
labels:
  - "machine-generated"
  - "unverified"
limitations: >
  The formalization is incomplete: only the n <= 3 case is fully proved.
  The Lean code generated by Claude required significant manual iteration
  (approximately 15 rounds of fix-and-recompile) to pass the type-checker.
  Several Mathlib imports may be version-sensitive. The lattice case
  formalization is incomplete due to missing upstream lemmas.
