statement:
  canonical: >
    Determine the mechanism of high-temperature superconductivity in cuprate materials.
    Specifically, determine whether the two-dimensional Hubbard model (or the t-J model)
    on a square lattice has a d-wave superconducting ground state at physically relevant
    parameters (doping levels x ~ 0.1-0.2, U/t ~ 8). Prove or disprove that the
    repulsive Hubbard model supports superconductivity, and if so, determine the
    maximum critical temperature T_c and the nature of the pairing mechanism.
  informal: >
    High-temperature superconductors conduct electricity with zero resistance at
    temperatures far above what conventional theory predicts. Despite decades of
    research, we still don't have a proven theory for how this works.

why_it_matters: >
  High-temperature superconductivity is one of the most important unsolved problems
  in condensed matter physics. Understanding it could lead to room-temperature
  superconductors, which would revolutionize technology from energy transmission to
  transportation.

