statement:
  canonical: >
    Prove the BKL conjecture: generic spacelike singularities in solutions of the
    Einstein equations are oscillatory (Mixmaster-like), locally spatially homogeneous,
    and the dynamics at each spatial point near the singularity is well-approximated
    by a sequence of Kasner epochs connected by BKL maps (Bianchi type IX or type VIII
    dynamics). Specifically, prove that as the singularity is approached, spatial
    derivatives become negligible compared to time derivatives ("asymptotically velocity
    term dominated" or AVTD behavior is replaced by BKL oscillations for generic data).
  informal: >
    What happens at the singularity inside a black hole or at the Big Bang? The BKL
    conjecture predicts a wild, chaotic oscillation of the geometry where each point
    in space evolves independently. Proving this is one of the hardest problems in GR.

why_it_matters: >
  The BKL conjecture describes the generic structure of spacetime singularities in
  general relativity. Proving it would complete our understanding of singularity
  formation and has implications for quantum gravity, where knowledge of classical
  singularity structure is essential.

