statement:
  canonical: >
    Rigorously prove the quantum-corrected Ryu-Takayanagi (RT) formula and its
    covariant generalization (the Hubeny-Rangamani-Takayanagi or HRT formula) for
    computing entanglement entropy in holographic theories. Specifically, prove that
    for a boundary region A in a holographic CFT, the entanglement entropy is given by
    S(A) = min ext_gamma [Area(gamma)/(4 G_N) + S_bulk(Sigma_gamma)], where gamma is
    a quantum extremal surface homologous to A, and S_bulk is the bulk entropy. Extend
    this to prove the quantum maximin formula and establish the holographic entropy cone
    for arbitrary numbers of parties.
  informal: >
    In the AdS/CFT correspondence, the entanglement entropy of a boundary region equals
    the area of a minimal surface in the bulk spacetime, plus quantum corrections.
    Proving this rigorously and characterizing all possible entanglement structures
    in holographic theories is an open problem.

why_it_matters: >
  Holographic entanglement entropy is the most concrete quantitative tool connecting
  quantum information to quantum gravity. Proving these conjectures would establish
  the information-theoretic foundations of holography and constrain viable theories
  of quantum gravity.

