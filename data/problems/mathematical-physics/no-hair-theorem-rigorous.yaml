statement:
  canonical: >
    Prove the no-hair conjecture in full generality: every stationary, asymptotically
    flat, vacuum black hole solution of the Einstein equations in 3+1 dimensions is
    uniquely characterized by its mass M, angular momentum J, and electric charge Q,
    and is therefore a member of the Kerr-Newman family. Remove the remaining technical
    assumptions (analyticity of the event horizon, non-degeneracy conditions) from
    existing uniqueness theorems. Extend to include relevant matter fields and higher
    dimensions.
  informal: >
    Black holes are believed to be completely characterized by just three numbers:
    mass, spin, and charge. While this has been proven under strong technical
    assumptions, a fully rigorous proof remains elusive.

why_it_matters: >
  The no-hair theorem is fundamental to black hole physics and the information
  paradox. A complete proof would settle whether classical black holes can carry
  any additional information, with implications for quantum gravity.

