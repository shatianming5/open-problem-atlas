statement:
  canonical: >
    Prove the general Penrose inequality: for an asymptotically flat initial data set
    (M, g, K) satisfying the dominant energy condition, with outermost apparent horizon
    of area A, the ADM mass m satisfies m >= sqrt(A / (16 pi)). The Riemannian case
    (K = 0, time-symmetric) was proved by Huisken-Ilmanen (for connected horizons)
    and Bray (general), but the full Lorentzian case with non-zero second fundamental
    form K remains open.
  informal: >
    The Penrose inequality provides a lower bound on the total mass of a spacetime
    in terms of the area of its black hole horizons. It has been proven for the
    time-symmetric case but remains open in full generality.

why_it_matters: >
  The Penrose inequality is deeply connected to cosmic censorship and the fundamental
  structure of black holes in general relativity. It provides a quantitative test of
  whether singularities are always hidden behind horizons.

