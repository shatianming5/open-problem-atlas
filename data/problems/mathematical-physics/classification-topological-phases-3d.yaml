statement:
  canonical: 'Provide a complete mathematical classification of gapped quantum phases of matter in three spatial dimensions.
    Specifically: (1) For symmetry-protected topological (SPT) phases in 3D with a given symmetry group G, prove that the
    classification is given by the generalized cohomology theory (e.g., group cohomology H^{d+1}(BG, U(1)) for bosonic SPT
    phases, or appropriate cobordism groups Omega^{d+1}_{Spin}(BG) for fermionic SPT phases), and determine whether these
    classifications are complete. (2) For intrinsic topological order in 3D (phases without symmetry protection), provide
    a complete classification: in 2D, topological orders are classified by modular tensor categories, but the 3D analog requires
    higher-categorical structures (e.g., modular 2-categories or fusion 2-categories). Prove that a specific mathematical
    framework (such as fully extended 3+1D topological quantum field theories, or equivalently 4-categories with appropriate
    duality structure) provides a complete classification. (3) Establish the bulk-boundary correspondence rigorously: prove
    that every 3D topological phase has a well-defined 2D boundary theory and that the boundary theory uniquely determines
    the bulk phase.

    '
  informal: 'Matter can exist in exotic "topological phases" where the properties are determined not by symmetry breaking
    (like ordinary phases) but by global quantum entanglement patterns. In two dimensions, we have a fairly complete mathematical
    classification of these phases. The challenge is to achieve the same in three dimensions: what are all the possible topological
    phases of matter in 3D, and what mathematical structures describe them?

    '
why_it_matters: 'The classification of topological phases is one of the central problems in modern condensed matter physics
  and mathematical physics, with direct applications to quantum computing (topological quantum computation), materials science
  (topological insulators and superconductors), and pure mathematics (higher category theory, TQFT). The 2016 Nobel Prize
  in Physics was awarded for theoretical discoveries of topological phase transitions. A complete 3D classification would
  have profound consequences for both physics and mathematics.

  '
prerequisites:
