partial_results:
- summary: The ten-fold way classification of free-fermion topological insulators and superconductors was completed by Kitaev,
    Schnyder, Ryu, Furusaki, and Ludwig using K-theory and random matrix theory.
  year: 2009
- summary: 'Chen, Gu, Liu, and Wen proposed group cohomology classification of bosonic SPT phases, but it was shown to be
    incomplete: beyond-cohomology phases exist in 3D.'
  year: 2013
- summary: Freed and Hopkins classified invertible topological phases using Anderson-dual bordism, providing a complete classification
    for invertible (short-range entangled) phases.
  year: 2021
- summary: Lan, Kong, and Wen proposed a classification of 3+1D topological orders based on fusion 2-categories, but completeness
    and mathematical rigor remain to be fully established.
  year: 2018
- summary: Johnson-Freyd and collaborators established significant mathematical foundations using higher categories for the
    classification of topological phases.
  year: 2022
