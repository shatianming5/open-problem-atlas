statement:
  canonical: >
    Determine the quantum capacity Q(N) of a general quantum channel N, defined as the
    maximum asymptotic rate at which quantum information can be reliably transmitted
    through the channel. In particular, determine whether the regularized coherent
    information I_coh^{reg}(N) = lim_{n->infty} (1/n) max_{rho} I_coh(N^{tensor n}, rho)
    admits a single-letter formula, or prove that the quantum capacity is not additive
    and no single-letter formula exists.
  informal: >
    How much quantum information can be reliably sent through a noisy quantum channel?
    Unlike classical channels where Shannon's theorem gives a clean formula, the quantum
    capacity requires an intractable regularization. The open problem is whether a
    computable formula exists.

why_it_matters: >
  The quantum capacity is the most fundamental quantity in quantum communication theory.
  Finding computable formulas or proving their non-existence would resolve a central
  question in quantum Shannon theory and guide the design of practical quantum
  communication systems.

