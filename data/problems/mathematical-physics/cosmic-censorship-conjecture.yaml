partial_results:
  - summary: "Christodoulou proved weak cosmic censorship for the spherically symmetric Einstein-scalar field system."
    year: 1999
  - summary: "Dafermos and Luk proved that the Cauchy horizon of the Kerr black hole is C^0-extendible for the vacuum Einstein equations, showing that strong cosmic censorship in C^0 is false for Kerr, prompting reformulation in terms of Christoffel symbol regularity."
    year: 2017
  - summary: "Dafermos proved strong cosmic censorship (C^0 inextendibility) for the spherically symmetric Einstein-Maxwell-scalar field system."
    year: 2005
  - summary: "Kehle and Unger constructed a counterexample to weak cosmic censorship for the Einstein-Maxwell equations (charged black holes) without symmetry assumptions."
    year: 2024

