statement:
  canonical: >
    The cosmic censorship conjecture, proposed by Roger Penrose in 1969, comes in two
    forms. The Weak Cosmic Censorship Conjecture (WCCC) states that for generic
    asymptotically flat initial data for the Einstein equations satisfying appropriate
    energy conditions, the maximal Cauchy development possesses a complete future null
    infinity (scri+); equivalently, singularities forming from gravitational collapse
    of generic initial data are hidden behind event horizons and cannot be seen by
    distant observers. The Strong Cosmic Censorship Conjecture (SCCC) states that for
    generic compact or asymptotically flat initial data, the maximal globally hyperbolic
    development is inextendible as a suitably regular Lorentzian manifold; equivalently,
    the solution to Einstein's equations is uniquely determined by initial data, and
    Cauchy horizons (beyond which determinism breaks down) are non-generic. Formally,
    for the vacuum Einstein equations Ric(g) = 0 with generic initial data (Sigma, h, K)
    satisfying the constraint equations, the maximal globally hyperbolic development
    (M, g) is inextendible as a C^0 Lorentzian manifold (Christodoulou's formulation).
  informal: >
    When a massive star collapses under its own gravity, general relativity predicts that
    a singularity (a point of infinite density) forms. The cosmic censorship conjecture
    says that such singularities are always hidden inside black holes and can never be
    "naked" (visible to distant observers). The strong version additionally claims that
    the laws of physics remain deterministic everywhere outside singularities: the future
    is uniquely determined by initial conditions.

why_it_matters: >
  Cosmic censorship is one of the most important open problems in general relativity
  and gravitational physics. If weak cosmic censorship fails, naked singularities would
  exist where the predictive power of general relativity breaks down observably. If strong
  cosmic censorship fails, determinism in general relativity would be violated. The
  conjecture is essential for the mathematical well-posedness of general relativity and
  for understanding the endpoint of gravitational collapse and black hole physics.

