statement:
  canonical: >
    Prove the AGT (Alday-Gaiotto-Tachikawa) correspondence: the Nekrasov instanton
    partition function of a 4D N=2 superconformal gauge theory of class S (obtained by
    compactifying the 6D (2,0) theory on a punctured Riemann surface C) equals the
    conformal block of 2D Toda conformal field theory on C. Specifically, prove that
    for SU(2) gauge theories, the Nekrasov partition function equals the Virasoro
    conformal block, and for SU(N) gauge theories, it equals the W_N algebra conformal
    block. Establish this at the mathematical level of rigor for all genera and numbers
    of punctures.
  informal: >
    The AGT correspondence is a surprising duality between 4D gauge theory partition
    functions and 2D conformal field theory correlation functions. Despite overwhelming
    evidence, a mathematical proof is missing.

why_it_matters: >
  The AGT correspondence is one of the most profound dualities in mathematical physics,
  connecting gauge theory, conformal field theory, integrable systems, and geometric
  representation theory. A proof would illuminate deep structures in all these areas.

