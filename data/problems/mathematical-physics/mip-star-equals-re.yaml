statement:
  canonical: >
    The complexity class MIP* consists of all languages decidable by a polynomial-time
    verifier interacting with two (or more) provers who may share arbitrary quantum
    entanglement but cannot communicate during the protocol. The class RE (recursively
    enumerable) consists of all languages for which membership can be verified by a Turing
    machine that halts on positive instances. The MIP* = RE theorem states that these two
    classes are equal: MIP* = RE. Equivalently, the halting problem can be verified by a
    classical polynomial-time verifier interacting with two quantum provers sharing
    entanglement. This result implies a negative answer to Tsirelson's problem (the set
    of quantum correlations is strictly larger than the set of correlations achievable
    with tensor product strategies) and refutes the Connes embedding conjecture.
  informal: >
    If two provers who share unlimited quantum entanglement try to convince a classical
    verifier of a statement, they can convince the verifier of any statement that is true
    (recursively enumerable), even undecidable ones like the halting problem. This was
    proven by Ji, Natarajan, Vidick, Wright, and Yuen in 2020, and it also disproved
    a famous conjecture in operator algebras by Connes.

why_it_matters: >
  MIP* = RE is one of the most profound results in quantum complexity theory. It connects
  three seemingly unrelated areas: the theory of interactive proofs in computational
  complexity, the study of quantum correlations in quantum information (Tsirelson's problem),
  and the Connes embedding conjecture in operator algebras. The result shows that quantum
  entanglement gives interactive proof systems extraordinary power, far beyond what was
  previously imagined.

