statement:
  canonical: >
    Prove or disprove the triviality conjecture for phi^4 theory in four spacetime
    dimensions: in the continuum limit (removing the lattice cutoff while holding
    renormalized quantities fixed), the renormalized coupling constant goes to zero,
    making the theory a free (Gaussian) field theory. Equivalently, prove that the only
    continuum limit of lattice phi^4_4 satisfying the Osterwalder-Schrader axioms is
    the free field, or construct a non-trivial continuum limit.
  informal: >
    The simplest interacting quantum field theory, phi^4 in 4D, is widely believed
    to become a free (non-interacting) theory when you try to remove the lattice
    approximation. Proving this rigorously would have profound implications for the
    Higgs mechanism and the Standard Model.

why_it_matters: >
  If phi^4_4 is trivial, then the Higgs sector of the Standard Model is not a
  fundamental theory but must be embedded in a larger framework. This problem is
  intimately connected to the hierarchy problem and the search for physics beyond
  the Standard Model.

