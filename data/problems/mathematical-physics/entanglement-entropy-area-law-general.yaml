statement:
  canonical: >
    Prove that the entanglement entropy S(rho_A) = -Tr(rho_A log rho_A) of the ground
    state of a local, gapped Hamiltonian in d spatial dimensions satisfies an area law:
    S(rho_A) <= C * |partial A|, where rho_A is the reduced density matrix of a region A,
    |partial A| is the area of the boundary of A, and C is a constant depending on the
    Hamiltonian but not on the size of A. This has been proved in d=1 by Hastings (2007)
    but remains open for d >= 2.
  informal: >
    For quantum systems with a gap above the ground state, the entanglement between a
    region and its complement should be proportional to the boundary area, not the volume.
    This "area law" has been proven in one dimension but remains unproven in higher
    dimensions.

why_it_matters: >
  The area law is fundamental to our understanding of quantum many-body physics. It
  explains why tensor network methods (DMRG, PEPS) work efficiently, connects to
  holographic entanglement entropy in quantum gravity, and is essential for classifying
  quantum phases of matter.

