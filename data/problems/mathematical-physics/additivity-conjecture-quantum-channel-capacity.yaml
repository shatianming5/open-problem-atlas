statement:
  canonical: >
    The additivity conjecture for quantum channel capacity, in its strongest form, asserted
    that the minimum output entropy S_min(Phi) = min_{rho} S(Phi(rho)) of a quantum channel
    Phi is additive under tensor products: S_min(Phi_1 tensor Phi_2) = S_min(Phi_1) + S_min(Phi_2)
    for all channels Phi_1, Phi_2. Hastings (2009) disproved this conjecture by showing the
    existence of counterexamples. However, the fundamental open problem remains: determine the
    classical capacity C(Phi) = lim_{n -> infinity} (1/n) chi(Phi^{tensor n}) of a general
    quantum channel Phi in a single-letter (computable) formula, i.e., whether the regularization
    in the HSW theorem can be removed for specific classes of channels, and characterize for
    which channels additivity of the Holevo capacity chi(Phi_1 tensor Phi_2) = chi(Phi_1) + chi(Phi_2) holds.
  informal: >
    When we send classical information through a quantum channel, can we always compute the
    maximum transmission rate (classical capacity) from a single use of the channel, or do we
    need to consider entangled inputs across many channel uses? While the general additivity
    conjecture was disproved, determining the classical capacity of a general quantum channel
    and identifying which channels have additive capacity remains wide open.

why_it_matters: >
  Understanding quantum channel capacity is central to quantum information theory and quantum
  communication. The resolution of the additivity question determines whether the classical
  capacity of a quantum channel is computable. Hastings' counterexample showed the problem is
  fundamentally harder than hoped, but a complete characterization of channel capacities remains
  one of the deepest open problems in quantum Shannon theory.

