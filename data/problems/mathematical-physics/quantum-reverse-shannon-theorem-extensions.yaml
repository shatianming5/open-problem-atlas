statement:
  canonical: >
    Extend the quantum reverse Shannon theorem to determine the exact entanglement
    and communication costs of simulating arbitrary quantum channels (including
    channels with memory, feedback, or adaptive encodings) using shared entanglement
    and classical communication. Determine the exact trade-off between entanglement
    consumption rate and classical communication rate for channel simulation in the
    most general network settings.
  informal: >
    The quantum reverse Shannon theorem says that any quantum channel can be simulated
    using shared entanglement and classical communication at a rate given by the
    channel's entanglement-assisted capacity. The open problem is to extend this to
    more general settings involving channels with memory, networks, and feedback.

why_it_matters: >
  This problem is central to understanding the fundamental resource trade-offs in
  quantum communication theory. Its resolution would complete our understanding of
  quantum channel simulation and has implications for quantum network design.

