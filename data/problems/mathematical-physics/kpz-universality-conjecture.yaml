statement:
  canonical: >
    Prove the KPZ universality conjecture: a wide class of one-dimensional random
    growth models, interacting particle systems, and directed polymers in random media
    belong to the KPZ universality class, sharing the same scaling exponents (growth
    exponent beta = 1/3, roughness exponent alpha = 1/2, dynamic exponent z = 3/2)
    and the same limiting distributions (Tracy-Widom for curved initial conditions,
    Baik-Rains for flat initial conditions). Extend KPZ universality to higher
    dimensions d >= 2, where even the scaling exponents are not known exactly.
  informal: >
    Many different random growth processes, from burning paper to bacterial colonies,
    are believed to share the same universal statistical behavior described by the KPZ
    equation. Proving this universality and understanding it in higher dimensions is
    one of the major open problems in probability and mathematical physics.

why_it_matters: >
  KPZ universality is one of the most important discoveries in non-equilibrium
  statistical mechanics. It connects random growth, interacting particles, random
  matrices, and combinatorics. Hairer's Fields Medal work on the KPZ equation solved
  part of the problem, but full universality remains open.

