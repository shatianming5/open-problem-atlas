statement:
  canonical: >
    Resolve the implications of Haag's theorem for interacting quantum field theories.
    Haag's theorem states that the interaction picture does not exist in relativistic
    quantum field theory: the free and interacting fields cannot both satisfy the
    canonical commutation relations in the same Hilbert space if they are related by
    a unitary transformation. Determine a mathematically rigorous framework that either
    (a) circumvents Haag's theorem while preserving the physical content of perturbative
    QFT, or (b) provides a non-perturbative definition of interacting QFT in 4 dimensions
    that does not rely on the interaction picture.
  informal: >
    Haag's theorem says that the standard textbook approach to interacting quantum
    field theory (the interaction picture) is mathematically inconsistent. How do we
    reconcile this with the spectacular empirical success of perturbative QFT?

why_it_matters: >
  Haag's theorem exposes a fundamental mathematical inconsistency in the foundations
  of quantum field theory as commonly practiced. Resolving it would place perturbative
  QFT on solid mathematical foundations or point to the correct non-perturbative
  framework.

