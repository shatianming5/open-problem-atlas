statement:
  canonical: >
    Rigorously establish Witten's conjecture that the Chern-Simons path integral for a
    compact gauge group G on a 3-manifold M defines topological invariants equivalent
    to the Reshetikhin-Turaev invariants constructed from the representation theory of
    quantum groups. Specifically, give a rigorous mathematical definition of the
    Chern-Simons path integral Z_k(M, G) = integral DA exp(i k S_CS(A)) and prove
    that it computes the RT invariants for all compact simple Lie groups G, all levels k,
    and all closed oriented 3-manifolds M.
  informal: >
    Witten showed that quantum field theory (Chern-Simons theory) naturally produces
    invariants of 3-dimensional manifolds and knots. While mathematicians have
    constructed these invariants by other means, proving that the physics approach
    is rigorous and equivalent remains open.

why_it_matters: >
  This conjecture is at the heart of the interaction between quantum field theory and
  low-dimensional topology. It exemplifies how physics can generate profound
  mathematical results that mathematicians then strive to prove rigorously.

