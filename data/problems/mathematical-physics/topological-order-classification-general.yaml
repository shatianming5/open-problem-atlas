statement:
  canonical: >
    Provide a complete mathematical classification of topological phases of matter in
    arbitrary spatial dimensions, including both symmetry-protected topological (SPT)
    phases and intrinsic topological orders. For SPT phases, prove the completeness
    of the classification by group cohomology / cobordism (for bosonic systems) and
    K-theory / free-fermion classification (for fermionic systems). For intrinsic
    topological orders, establish a complete classification framework using modular
    tensor categories (in 2D) and higher-category theory (in 3D and above), and prove
    that every consistent mathematical structure is physically realizable.
  informal: >
    Quantum matter can exist in exotic phases characterized by topological properties
    rather than conventional symmetry breaking. Completely classifying all possible
    such phases of matter is a grand challenge at the interface of physics and mathematics.

why_it_matters: >
  Topological phases are a new paradigm in condensed matter physics with applications
  to quantum computing, quantum error correction, and fundamental physics. A complete
  classification would be a major achievement in both physics and mathematics.

