statement:
  canonical: >
    Determine the optimal entanglement and communication costs for quantum state
    merging and state redistribution in multiparty settings. Specifically, for n parties
    sharing a quantum state rho on H_1 tensor ... tensor H_n, find the achievable
    rate region for redistributing parts of the state among the parties using LOCC,
    and determine whether the conditional quantum mutual information provides the
    exact answer in all multiparty scenarios.
  informal: >
    Quantum state merging allows one party to transfer their share of an entangled
    state to another using entanglement and communication. Extending this to many
    parties and understanding the exact resource costs remains an open problem.

why_it_matters: >
  Quantum state merging is a foundational protocol in quantum information theory that
  unifies many quantum communication tasks. Multiparty generalizations are essential
  for quantum network theory and distributed quantum computing.

