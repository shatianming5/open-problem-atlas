statement:
  canonical: >
    The Final State Conjecture asserts that generic, asymptotically flat vacuum initial
    data (Sigma, h, K) for the Einstein vacuum equations Ric(g) = 0, satisfying the
    constraint equations and possessing sufficient mass concentration, evolve to a
    spacetime that asymptotically settles down to a finite number of Kerr black holes
    moving apart from each other, plus gravitational radiation dispersing to null infinity.
    More precisely, the maximal globally hyperbolic development (M, g) of generic
    asymptotically flat initial data, assuming cosmic censorship, decomposes in the far
    future into: (1) an exterior region approaching Minkowski space (for subcritical data)
    or a finite union of regions each asymptotic to a member of the Kerr family
    (M, g_{a_i, m_i}) with parameters (a_i, m_i), plus (2) gravitational radiation
    escaping to future null infinity. This encompasses as special cases the nonlinear
    stability of Minkowski space (proved by Christodoulou-Klainerman, 1993) and the
    nonlinear stability of the Kerr family (partially resolved).
  informal: >
    According to general relativity, what is the ultimate fate of a gravitating system?
    The final state conjecture says that any isolated gravitational system will eventually
    settle down to a collection of Kerr black holes (rotating black holes described by
    just mass and spin) flying apart, plus gravitational waves radiating away. This is
    the dynamic version of the "no-hair theorem": black holes shed all their complexity
    and are completely characterized by mass and angular momentum.

why_it_matters: >
  The final state conjecture is the central dynamical question in general relativity.
  It unifies black hole uniqueness, stability, and the long-time behavior of Einstein's
  equations into a single grand conjecture. Its resolution would confirm that Kerr black
  holes are the universal endpoints of gravitational collapse, validate the theoretical
  framework underlying gravitational wave astronomy (LIGO/Virgo observations), and
  represent a crowning achievement of the mathematical theory of general relativity.

