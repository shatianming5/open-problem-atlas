partial_results:
  - summary: "Christodoulou and Klainerman proved the nonlinear stability of Minkowski spacetime (the vacuum, zero-mass case of the final state conjecture)."
    year: 1993
  - summary: "Dafermos, Holzegel, Rodnianski, and Taylor proved the linear stability of the Schwarzschild black hole (non-rotating case)."
    year: 2019
  - summary: "Klainerman and Szeftel proved the nonlinear stability of Kerr black holes for small angular momentum |a| << m."
    year: 2021
  - summary: "Giorgi, Klainerman, and Szeftel extended the Kerr stability result, and Dafermos, Holzegel, Rodnianski, and Taylor independently proved Kerr stability for the full subextremal range |a| < m."
