statement:
  canonical: >
    Prove universality of local eigenvalue statistics for general classes of random
    matrices beyond the Wigner ensemble. Specifically: (1) Prove that the local
    eigenvalue correlation functions of band matrices with band width W >> n^{1/2}
    converge to the Gaussian ensembles in the limit n -> infinity. (2) Prove
    universality for random matrices with general (non-Gaussian) i.i.d. entries with
    finite moments. (3) Establish universality at the spectral edge (Tracy-Widom
    statistics) for sparse random matrices and adjacency matrices of random graphs.
  informal: >
    Random matrix theory predicts that the statistical properties of eigenvalue spacings
    are universal -- the same for a huge variety of random matrix ensembles. While this
    has been proven for certain classes, extending it to all physically relevant classes
    remains open.

why_it_matters: >
  Random matrix universality has applications across physics (quantum chaos, nuclear
  physics, quantum gravity), mathematics (number theory, combinatorics), and data
  science. A complete universality theory would unify these connections.

