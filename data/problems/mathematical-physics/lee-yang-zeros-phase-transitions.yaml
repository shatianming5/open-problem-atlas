statement:
  canonical: >
    Extend the Lee-Yang theorem to characterize the distribution of zeros of the
    partition function in the complex fugacity (or magnetic field) plane for general
    lattice models beyond the ferromagnetic Ising model. Specifically, determine for
    which classes of Hamiltonians (multi-component spins, frustrated systems, quantum
    spin systems) the partition function zeros are confined to specific curves or regions,
    and prove that the density of zeros near the real axis determines the nature and
    order of the phase transition in the thermodynamic limit.
  informal: >
    Lee and Yang showed that the zeros of the partition function (as a polynomial in
    the fugacity) lie on the unit circle for ferromagnetic Ising models. Extending this
    beautiful result to general models and connecting zeros to phase transitions remains open.

why_it_matters: >
  Lee-Yang zeros provide a rigorous mathematical framework for understanding phase
  transitions. Extending this theory would give powerful tools for classifying phase
  transitions and could lead to new insights in quantum phase transitions and
  non-equilibrium statistical mechanics.

