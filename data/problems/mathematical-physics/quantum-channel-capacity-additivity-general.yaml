statement:
  canonical: >
    Characterize which quantum channels satisfy additivity of the minimum output entropy:
    S_min(N_1 tensor N_2) = S_min(N_1) + S_min(N_2). Although the general additivity
    conjecture was disproved by Hastings (2009), determine the precise classes of channels
    for which additivity holds, and find computable single-letter formulas for the
    classical capacity of quantum channels beyond the known cases (degradable channels,
    entanglement-breaking channels, unital qubit channels).
  informal: >
    Hastings showed that entanglement between channel inputs can boost classical
    communication capacity. But for which channels does this happen, and can we
    compute the exact capacity? This remains open for most channels.

why_it_matters: >
  The classical capacity of quantum channels is the most fundamental quantity in
  quantum communication. Despite Hastings' counterexample, the problem of computing
  capacities for specific important channels (e.g., depolarizing channel) remains
  open and is critical for practical quantum communication.

