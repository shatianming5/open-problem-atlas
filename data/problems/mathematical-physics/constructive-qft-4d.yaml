statement:
  canonical: >
    Construct a non-trivial (interacting) quantum field theory in four spacetime
    dimensions that satisfies the Wightman axioms or the Osterwalder-Schrader axioms.
    The theory should have a well-defined Hilbert space, field operators as
    operator-valued distributions, a unitary representation of the Poincare group, and
    satisfy locality, spectral condition, and clustering. No such construction exists
    for any interacting theory in d=4, though several exist in d=2 and d=3.
  informal: >
    Despite the enormous success of quantum field theory in physics, no one has ever
    rigorously constructed a single interacting quantum field theory in the physical
    four-dimensional spacetime. Can this be done for any model?

why_it_matters: >
  This is one of the most fundamental open problems in mathematical physics. The
  absence of any rigorous interacting QFT in 4D means we lack mathematical proof that
  the theoretical framework underlying the Standard Model of particle physics is
  self-consistent.

