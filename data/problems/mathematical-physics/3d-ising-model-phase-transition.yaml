statement:
  canonical: >
    The three-dimensional Ising model on the cubic lattice Z^3 with nearest-neighbor
    ferromagnetic coupling J > 0 and Hamiltonian H = -J sum_{<i,j>} sigma_i sigma_j
    (where sigma_i in {-1, +1}) is known to exhibit a phase transition at some critical
    inverse temperature beta_c in (0, infinity). While the existence of a phase transition
    (spontaneous magnetization for beta > beta_c) has been rigorously established, the
    following fundamental problems remain open: (1) prove that the critical exponents exist
    and take the values predicted by the renormalization group and conformal bootstrap
    (e.g., beta ~ 0.3265, gamma ~ 1.2372, nu ~ 0.6301); (2) prove conformal invariance
    of the scaling limit at criticality; (3) determine whether an exact closed-form
    solution exists analogous to Onsager's 2D solution.
  informal: >
    The Ising model describes magnetic spins on a lattice that prefer to align with their
    neighbors. In two dimensions, Onsager found an exact solution in 1944. In three
    dimensions, we know a phase transition occurs (the material becomes magnetic below a
    critical temperature), but we cannot prove the precise mathematical nature of this
    transition. Can we rigorously compute the critical exponents, prove the scaling limit
    is conformally invariant, or find an exact solution?

why_it_matters: >
  The 3D Ising model is the paradigmatic model of phase transitions and critical phenomena.
  Its critical exponents are among the most precisely measured quantities in physics (via
  Monte Carlo and conformal bootstrap), yet rigorous mathematical proofs remain elusive.
  A solution would represent a major breakthrough in mathematical physics and probability
  theory, with implications for understanding universality and renormalization group theory.

