statement:
  canonical: >
    Extend and generalize Dyson's conjecture (proved by Wilson and Gunson) and the
    Macdonald conjectures (proved by Cherednik using double affine Hecke algebras)
    to new settings. Specifically: (1) Prove or find combinatorial/physical proofs
    of the remaining open Macdonald-type constant term identities for exceptional root
    systems. (2) Determine the full connection between these identities and random
    matrix theory, particularly for the circular ensembles. (3) Extend the
    Selberg-Dyson-Macdonald integral framework to the elliptic level (elliptic
    Selberg integrals) and prove the conjectured evaluations.
  informal: >
    Dyson conjectured a beautiful identity for the constant term of a Laurent polynomial
    associated to root systems. While the original conjecture is proved, extending it
    to elliptic and more general settings remains open.

why_it_matters: >
  These identities lie at the intersection of random matrix theory, representation
  theory, special functions, and mathematical physics. They connect to partition
  functions in statistical mechanics and conformal field theory.

