- summary: Asymptotic freedom of Yang-Mills theory was proven by Gross, Wilczek, and Politzer (Nobel Prize 2004), showing
    the coupling constant decreases at high energies.
  year: 1973
- summary: Balaban constructed a rigorous renormalization group for lattice Yang-Mills theory in a finite volume, a key step
    toward the full construction.
  year: 1989
- summary: Constructive quantum field theory has successfully constructed interacting theories in d = 2 and d = 3 (e.g., phi^4_3
    by Gubinelli, Imkeller, and Perkowski), but d = 4 Yang-Mills remains out of reach.
  year: 2015
- summary: Lattice gauge theory simulations provide overwhelming numerical evidence for confinement and mass gap in SU(3)
