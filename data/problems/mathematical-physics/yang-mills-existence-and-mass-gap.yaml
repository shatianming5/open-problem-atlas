statement:
  canonical: 'For any compact simple gauge group G (e.g., G = SU(N) for N >= 2), prove that a non-trivial quantum Yang-Mills
    theory exists on R^4 satisfying the Wightman axioms (or the Osterwalder-Schrader axioms for the Euclidean formulation),
    and prove that the mass gap Delta > 0 exists: the lowest point in the energy spectrum above the vacuum state has strictly
    positive energy. More precisely, there must exist a Hilbert space H, a unitary representation U(a, Lambda) of the Poincare
    group on H, a vacuum state Omega invariant under U, and operator-valued distributions (field operators) satisfying the
    Wightman axioms, such that the joint spectrum of the energy-momentum operators (H, P) lies in the forward light cone {(E,
    p) : E >= 0, E^2 - |p|^2 >= 0} with a gap: the spectrum in {E > 0} is contained in {E >= Delta} for some Delta > 0.

    '
  informal: 'Yang-Mills theory describes the fundamental forces (strong and weak nuclear forces) in the Standard Model of
    particle physics. The problem asks: can we rigorously prove that this theory makes mathematical sense (satisfies fundamental
    axioms of quantum field theory) and that the lightest particle it predicts has a strictly positive mass? This would mathematically
    explain why the strong force has a finite range and why protons and neutrons are massive.

    '
why_it_matters: 'This is one of the seven Clay Millennium Prize Problems, carrying a $1,000,000 prize. Yang-Mills theory is
  the mathematical foundation of the Standard Model of particle physics. A rigorous proof of existence and mass gap would
  establish quantum field theory on firm mathematical foundations, explain confinement in quantum chromodynamics (why quarks
  are never observed in isolation), and bridge a fundamental gap between physics and mathematics that has persisted since
  the 1950s.

  '
