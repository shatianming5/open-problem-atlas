statement:
  canonical: >
    Rigorously prove the Seiberg-Witten solution of N=2 supersymmetric Yang-Mills
    theory. Specifically, prove that: (1) the low-energy effective action of N=2 SYM
    with gauge group SU(N) is exactly determined by a family of algebraic curves
    (Seiberg-Witten curves) and a meromorphic differential; (2) the exact prepotential
    F(a) is computed by period integrals on these curves; (3) the theory exhibits
    electric-magnetic duality (S-duality) at the quantum level; (4) these results hold
    non-perturbatively, not just as formal power series.
  informal: >
    Seiberg and Witten found an "exact solution" to a supersymmetric gauge theory,
    computing its low-energy physics precisely. But this solution relies on physical
    assumptions (holomorphy, duality) rather than mathematical proof. Can we make it
    rigorous?

why_it_matters: >
  The Seiberg-Witten solution is one of the greatest achievements of theoretical
  physics, providing exact non-perturbative results in quantum field theory. Making
  it rigorous would be a landmark in mathematical physics and validate the physical
  reasoning used to derive it.

