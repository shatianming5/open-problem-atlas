statement:
  canonical: >
    The classical Unique Games Conjecture (Khot, 2002) asserts that for every epsilon > 0,
    there exists a sufficiently large alphabet size k such that it is NP-hard to determine
    whether a unique game over alphabet [k] has value at least 1 - epsilon or at most epsilon.
    The quantum unique games conjecture asks whether an analogous hardness result holds when
    the provers are allowed to share quantum entanglement: specifically, is it the case that
    for entangled-prover unique games, distinguishing near-perfect completeness from low
    soundness remains computationally hard (under appropriate complexity-theoretic assumptions),
    or does entanglement fundamentally change the approximability landscape of constraint
    satisfaction problems?
  informal: >
    The classical Unique Games Conjecture is a central assumption in computational complexity
    that implies tight hardness-of-approximation results. The quantum version asks: if two
    provers in a unique game are allowed to share quantum entanglement, does the problem remain
    hard, or can entanglement help them cheat in ways that change the computational difficulty
    of the problem?

why_it_matters: >
  The Unique Games Conjecture is arguably the most important open conjecture in the theory of
  approximation algorithms and hardness of approximation. Its quantum variant connects quantum
  entanglement to computational complexity and has implications for quantum PCP theorems,
  nonlocal games, and the power of quantum proof systems. Understanding the quantum version
  illuminates the relationship between entanglement and computational hardness.

