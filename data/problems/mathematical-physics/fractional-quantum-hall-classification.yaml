statement:
  canonical: >
    Provide a complete mathematical classification of all possible fractional quantum
    Hall (FQH) states at a given filling fraction. Determine the full topological data
    (topological order, ground state degeneracy on a torus, edge state structure, braiding
    statistics of quasiparticles) for each filling fraction, and prove which topological
    orders are physically realizable in two-dimensional electron systems. In particular,
    determine whether non-abelian FQH states (such as the Moore-Read Pfaffian at
    nu = 5/2) are realized and classify all possible non-abelian anyonic excitations.
  informal: >
    The fractional quantum Hall effect produces exotic states of matter with
    fractionally charged excitations. Classifying all possible such states and their
    exotic braiding statistics is a major open problem in condensed matter theory.

why_it_matters: >
  FQH states are the prototypical examples of topological order and host anyonic
  quasiparticles that could be used for topological quantum computing. A complete
  classification would advance both fundamental physics and quantum computing.

