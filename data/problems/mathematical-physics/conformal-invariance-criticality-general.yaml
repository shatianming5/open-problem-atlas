statement:
  canonical: >
    Prove that critical lattice models in d=2 are conformally invariant in the scaling
    limit, for a general class of models beyond the Ising model. Specifically, prove
    conformal invariance for the critical q-state Potts model for q <= 4 (the regime
    where the phase transition is continuous; for q > 4 the transition is first-order
    and conformal invariance does not apply), the O(n) loop model for
    general n in [0, 2], and the self-avoiding walk (n=0 case). In d >= 3, determine whether
    critical systems possess conformal invariance and characterize the conformal field
    theories that describe them.
  informal: >
    At a phase transition, lattice systems become scale-invariant. A stronger property,
    conformal invariance, is widely assumed but proven only for the 2D Ising model and
    a few other cases. Proving it in general is a major challenge.

why_it_matters: >
  Conformal invariance at criticality is the foundational assumption of conformal field
  theory, which has been spectacularly successful in both physics and mathematics.
  Proving it rigorously would justify this entire edifice from first principles.

