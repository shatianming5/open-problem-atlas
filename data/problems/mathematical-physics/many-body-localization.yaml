statement:
  canonical: >
    Prove or disprove the existence of many-body localization (MBL) in interacting
    quantum systems with disorder. Specifically, for the disordered Heisenberg chain
    H = sum_i [J(S_i . S_{i+1}) + h_i S_i^z] with random fields h_i drawn from a
    distribution of width W, prove that for sufficiently large W, all eigenstates
    at all energies are localized (area-law entanglement entropy, no thermalization,
    emergent integrability). Determine whether a sharp MBL transition exists or whether
    MBL is unstable to rare thermal regions (avalanche instability) in the thermodynamic
    limit.
  informal: >
    In most quantum systems, interactions cause thermalization. Many-body localization
    claims that strong enough disorder can prevent thermalization even with interactions.
    Whether true MBL exists in the thermodynamic limit is hotly debated.

why_it_matters: >
  MBL would represent a fundamentally new phase of matter that violates the eigenstate
  thermalization hypothesis. It has implications for quantum information storage,
  quantum computing, and our understanding of thermalization in quantum systems.

