statement:
  canonical: >
    Prove mirror symmetry in full generality. Specifically: (1) Prove the Homological
    Mirror Symmetry (HMS) conjecture of Kontsevich: for a mirror pair (X, X^check) of
    Calabi-Yau manifolds, there is an equivalence of triangulated categories between
    D^b(Coh(X)) (derived category of coherent sheaves on X) and D^b(Fuk(X^check))
    (derived Fukaya category of X^check). (2) Prove the SYZ (Strominger-Yau-Zaslow)
    conjecture: mirror Calabi-Yau manifolds admit dual special Lagrangian torus
    fibrations. (3) Establish these results for compact Calabi-Yau threefolds, not
    just for special cases (tori, K3 surfaces, toric varieties).
  informal: >
    Mirror symmetry is a deep duality from string theory that relates pairs of
    Calabi-Yau manifolds, exchanging their complex and symplectic geometry. Proving
    this duality rigorously is one of the central challenges of modern mathematics.

why_it_matters: >
  Mirror symmetry has been enormously influential in both mathematics and physics,
  generating deep connections between algebraic geometry, symplectic geometry, and
  string theory. A complete proof would be a landmark achievement.

