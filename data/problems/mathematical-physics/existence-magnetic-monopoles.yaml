statement:
  canonical: >
    Determine whether magnetic monopoles exist as stable solutions in physically
    relevant gauge theories. Specifically: (1) Prove that the 't Hooft-Polyakov monopole
    solutions in spontaneously broken gauge theories (such as SU(2) Higgs theory) are
    stable and have finite energy in the full quantum theory. (2) Determine whether
    magnetic monopoles exist in the Standard Model or its grand unified extensions.
    (3) Prove Dirac's quantization condition eg = n hbar c / 2 from first principles
    in a rigorous quantum field theory framework. (4) Establish whether monopole
    solutions in Yang-Mills-Higgs theories on R^3 are classified by pi_2(G/H) as
    conjectured.
  informal: >
    Do magnetic monopoles exist? Dirac showed they would explain charge quantization,
    and grand unified theories predict them. Proving their existence or non-existence
    as mathematical solutions, and understanding their properties, is a major challenge.

why_it_matters: >
  Magnetic monopoles would explain one of the deepest mysteries in physics: why
  electric charge is quantized. They arise naturally in grand unified theories and
  are connected to important problems in topology, gauge theory, and quantum field theory.

