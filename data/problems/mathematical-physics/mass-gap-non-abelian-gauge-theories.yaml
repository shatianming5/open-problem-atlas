statement:
  canonical: >
    For a general compact simple gauge group G, prove that the pure Yang-Mills quantum
    field theory (without matter) in four spacetime dimensions has a mass gap Delta > 0.
    This means the energy spectrum has a gap between the vacuum energy E=0 and the
    first excited state E >= Delta > 0. While the Clay Millennium Problem focuses on
    existence and mass gap together, the mass gap alone (assuming existence) is already
    a deep open problem. Determine the dependence of Delta on the gauge group G and
    whether the mass gap is related to the dynamically generated scale Lambda_QCD.
  informal: >
    Does every non-abelian gauge theory have massive particles? Even assuming we can
    rigorously define the theory, proving that the lightest excitation has positive mass
    is a separate and deep challenge.

why_it_matters: >
  The mass gap explains why nuclear forces are short-range. Understanding its origin
  for general gauge groups would illuminate confinement, the structure of the hadron
  spectrum, and connections between gauge theory and geometry.

