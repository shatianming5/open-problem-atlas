statement:
  canonical: >
    Prove the nonlinear stability of the Kerr family of black hole solutions to the
    Einstein vacuum equations: for initial data sufficiently close (in a suitable Sobolev
    norm) to a Kerr solution with parameters (M, a) with |a| < M (sub-extremal), the
    maximal Cauchy development is geodesically complete outside the black hole region
    and the metric approaches a (possibly different) Kerr solution as t -> infinity.
    The Schwarzschild case (a=0) should be established as a special case.
  informal: >
    If you slightly perturb a rotating black hole, does it settle down to another
    rotating black hole, or does something catastrophic happen? This is one of the
    most important open problems in mathematical general relativity.

why_it_matters: >
  Kerr stability is essential for the physical relevance of the Kerr solution: if
  Kerr black holes were unstable, they would not be observed in nature. This is
  arguably the most important open problem in mathematical general relativity.

