statement:
  canonical: >
    Prove or disprove the Parisi ultrametricity conjecture for the Sherrington-Kirkpatrick
    (SK) spin glass model: in the low-temperature phase, the overlap distribution of pure
    states has an ultrametric structure. Specifically, for three replicas sigma^1, sigma^2,
    sigma^3 drawn independently from the Gibbs measure, the overlaps q_{12}, q_{13}, q_{23}
    satisfy the ultrametric inequality: the two smallest of the three overlaps are equal
    with probability 1 in the thermodynamic limit. Extend these results to finite-dimensional
    Edwards-Anderson spin glass models in d >= 3.
  informal: >
    In spin glasses, the landscape of states has a remarkable tree-like (ultrametric)
    structure predicted by Parisi's replica symmetry breaking theory. While the free
    energy was proven correct by Talagrand, the ultrametric structure itself remains
    unproven.

why_it_matters: >
  Spin glass theory has applications far beyond physics, including optimization,
  neural networks, machine learning, and ecology. Proving ultrametricity would validate
  the Parisi framework and its wide-ranging applications.

