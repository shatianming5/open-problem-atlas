statement:
  canonical: >
    Determine the precise Standard Model prediction for the muon anomalous magnetic
    moment a_mu = (g-2)/2 to sufficient accuracy to compare with the experimental
    measurement. The dominant theoretical uncertainty comes from the hadronic vacuum
    polarization (HVP) contribution. Resolve the tension between the data-driven
    dispersive approach (using e+e- -> hadrons cross-section data) and lattice QCD
    calculations of the HVP contribution, and determine whether a_mu^{SM} agrees with
    the experimental value measured by Fermilab and BNL.
  informal: >
    The muon's magnetic moment has been measured to exquisite precision and may disagree
    with the Standard Model prediction, hinting at new physics. But the theory prediction
    itself is uncertain because of difficulties computing the strong-force contributions.
    Resolving this is one of the most pressing problems in particle physics.

why_it_matters: >
  The muon g-2 anomaly is one of the strongest hints of physics beyond the Standard
  Model. Resolving the theoretical prediction is essential to determine whether this
  discrepancy is real or an artifact of incomplete calculations.

