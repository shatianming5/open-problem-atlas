statement:
  canonical: >
    Prove that quantum chromodynamics (QCD), the SU(3) Yang-Mills gauge theory coupled
    to quarks, exhibits confinement: isolated quarks and gluons cannot exist as
    asymptotic particle states, and all physical states are color singlets (hadrons).
    Rigorously, prove that the Wilson loop expectation value satisfies an area law
    <W(C)> ~ exp(-sigma * Area(C)) for large loops C, where sigma > 0 is the string
    tension, or establish confinement through an equivalent criterion such as the
    existence of a linear quark-antiquark potential at large distances.
  informal: >
    Why can't we ever see a single quark? QCD predicts that the force between quarks
    grows with distance, permanently confining them inside protons and neutrons. But
    no one has proven this mathematically from the fundamental theory.

why_it_matters: >
  Confinement is one of the most important phenomena in fundamental physics. It
  explains why matter is made of hadrons rather than free quarks. A proof would be
  a major breakthrough in both mathematical physics and our understanding of the
  strong nuclear force.

