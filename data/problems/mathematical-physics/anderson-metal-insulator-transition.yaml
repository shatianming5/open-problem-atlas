statement:
  canonical: >
    Prove the existence of the Anderson metal-insulator transition for the Anderson
    model (tight-binding Hamiltonian with random on-site potential) on Z^d for d >= 3.
    Specifically, prove that there exists a critical disorder strength W_c such that
    for W < W_c the spectrum contains absolutely continuous component (extended states,
    metallic phase) and for W > W_c the spectrum is pure point with exponentially
    localized eigenstates (insulating phase). In d=3, determine the critical exponent
    nu for the divergence of the localization length xi ~ |W - W_c|^{-nu}.
  informal: >
    In a crystal with random impurities, electrons can either spread freely (metal)
    or get trapped (insulator). Proving that this metal-insulator transition exists
    in 3D is one of the most important open problems in mathematical physics.

why_it_matters: >
  Anderson localization is a fundamental phenomenon in condensed matter physics.
  Proving the existence of a metal-insulator transition in 3D would be a landmark
  result connecting probability theory, spectral theory, and physics.

