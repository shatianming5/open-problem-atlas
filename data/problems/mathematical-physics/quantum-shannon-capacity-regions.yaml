statement:
  canonical: >
    Determine the full capacity region for quantum multi-user channels, including the
    quantum multiple access channel (QMAC), quantum broadcast channel (QBC), and quantum
    interference channel (QIC). Specifically, find single-letter characterizations of the
    achievable rate regions for simultaneous transmission of classical and quantum
    information through these multi-user quantum channels, or prove that no such
    single-letter characterizations exist.
  informal: >
    When multiple senders and receivers share a quantum communication channel, what are
    the maximum rates at which they can simultaneously communicate? This generalizes
    Shannon's classical network information theory to the quantum realm, where
    entanglement and superposition create fundamentally new phenomena.

why_it_matters: >
  Multi-user quantum Shannon theory is essential for designing future quantum networks
  and quantum internet architectures. Resolving capacity regions would provide the
  theoretical foundation for quantum network protocols.

