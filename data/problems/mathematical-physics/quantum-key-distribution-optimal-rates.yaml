statement:
  canonical: >
    Determine the secret key capacity K(N) of a general quantum channel N, defined as
    the maximum asymptotic rate at which a secret key can be established between two
    parties connected by the channel, with unlimited public classical communication.
    In particular, determine whether the squashed entanglement or the relative entropy
    of entanglement provides the exact key rate, and find computable formulas or tight
    bounds for key rates of practical quantum channels (depolarizing, amplitude damping,
    bosonic channels).
  informal: >
    What is the maximum rate at which two parties can generate a shared secret key using
    a quantum channel, even against the most powerful eavesdropper allowed by quantum
    mechanics? Finding exact answers for realistic channels is still open.

why_it_matters: >
  Quantum key distribution is the most mature application of quantum information
  science. Determining exact key rates is essential for understanding the fundamental
  security limits of quantum cryptography and designing practical QKD systems.

