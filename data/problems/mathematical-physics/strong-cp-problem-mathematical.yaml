statement:
  canonical: >
    Provide a rigorous mathematical explanation for why the QCD vacuum angle theta
    is experimentally consistent with zero (|theta| < 10^{-10}), despite the fact that
    theta is a free parameter in the QCD Lagrangian and there is no known symmetry
    reason for it to vanish. Rigorously formulate and analyze the theta-vacuum structure
    of non-abelian gauge theory, and either prove that a dynamical mechanism (such as
    the Peccei-Quinn mechanism) necessarily drives theta to zero, or show that the
    problem has a topological or mathematical resolution.
  informal: >
    QCD has a parameter theta that could violate CP symmetry (the symmetry between
    matter and antimatter). Experiments show theta is essentially zero, but there's
    no known reason why. Why is theta so small? This is the strong CP problem.

why_it_matters: >
  The strong CP problem is one of the most important naturalness problems in
  fundamental physics. Its resolution may require new particles (axions) that could
  constitute dark matter, making it a problem at the interface of particle physics,
  cosmology, and mathematics.

