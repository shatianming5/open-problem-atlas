statement:
  canonical: >
    Prove that critical exponents at continuous phase transitions depend only on the
    spatial dimensionality d, the number of components n of the order parameter, and
    the range of interactions, but not on microscopic details of the Hamiltonian
    (universality). Specifically, prove that the Ising model (n=1), XY model (n=2),
    and Heisenberg model (n=3) on any regular lattice in d=3 dimensions have the same
    critical exponents regardless of the lattice structure. The exponents should match
    those predicted by the renormalization group at the Wilson-Fisher fixed point.
  informal: >
    Why do completely different physical systems behave identically near a phase
    transition? This remarkable phenomenon, called universality, has been observed
    experimentally and computed numerically, but never proven mathematically.

why_it_matters: >
  Universality is one of the most profound concepts in physics, explaining why
  statistical mechanics can make predictions without knowing microscopic details.
  A proof would be a major achievement in mathematical physics and probability theory.

