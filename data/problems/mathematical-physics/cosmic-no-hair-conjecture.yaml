statement:
  canonical: >
    Prove the cosmic no-hair conjecture: all initially expanding cosmological solutions
    of the Einstein equations with a positive cosmological constant Lambda > 0 and
    satisfying the strong and dominant energy conditions asymptotically approach the
    de Sitter solution as t -> infinity. More precisely, prove that for generic initial
    data on a Cauchy surface, the future development is future geodesically complete and
    the spacetime metric approaches the de Sitter metric exponentially fast, with rate
    determined by Lambda.
  informal: >
    Does every expanding universe with a positive cosmological constant eventually
    look like de Sitter space (exponentially expanding, empty space)? This conjecture
    suggests that the cosmological constant dominates all other forms of matter and
    energy at late times.

why_it_matters: >
  With the discovery of the accelerating expansion of the universe (Nobel Prize 2011),
  the cosmic no-hair conjecture has become directly relevant to the far future of our
  actual universe. Proving it would establish the ultimate fate of the cosmos.

