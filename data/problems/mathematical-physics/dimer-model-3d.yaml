statement:
  canonical: >
    Determine the free energy per site (entropy constant) of the dimer model on the
    simple cubic lattice in three dimensions. In 2D, Kasteleyn and Temperley-Fisher
    solved the dimer model exactly using Pfaffians, giving the free energy per site on
    the square lattice as (G/pi) where G is Catalan's constant. Determine whether an
    analogous exact solution exists in 3D, or prove that the 3D dimer model is not
    exactly solvable (in the sense of being expressible in closed form). The numerical
    value of the 3D entropy constant is approximately 0.4466.
  informal: >
    How many ways can you perfectly tile a 3D box with dominoes? In 2D, there is a
    beautiful exact formula. In 3D, no exact solution is known, and it is unclear
    whether one exists.

why_it_matters: >
  The dimer model is a fundamental exactly solvable model in 2D statistical mechanics.
  Understanding whether exact solvability extends to 3D would clarify the boundaries
  of exact solvability and has implications for combinatorics, algebra, and physics.

