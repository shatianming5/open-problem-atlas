statement:
  canonical: >
    Determine the distillable entanglement E_D(rho) for a general bipartite mixed state
    rho, defined as the maximum asymptotic rate at which Bell pairs (maximally entangled
    states) can be extracted from many copies of rho using LOCC. In particular, determine
    whether E_D(rho) equals the regularized relative entropy of entanglement, or find
    a computable formula for E_D.
  informal: >
    Given many copies of a noisy entangled state shared between two distant parties,
    what is the best rate at which they can distill pure Bell pairs using only local
    operations and classical communication? Finding this rate for general states remains
    an open problem.

why_it_matters: >
  Entanglement distillation is a core primitive for quantum communication, quantum
  key distribution, and quantum computing. Determining optimal rates would establish
  the fundamental value of entanglement as a resource.

