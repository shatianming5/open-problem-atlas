statement:
  canonical: >
    Do there exist NPT (negative partial transpose) bound entangled states, i.e.,
    entangled states whose partial transpose has at least one negative eigenvalue
    but from which no pure entanglement can be distilled by LOCC? It is already known
    that all PPT entangled states are bound entangled (Horodecki et al. 1998). The open
    question is whether bound entanglement can also occur among NPT states, or equivalently,
    whether every NPT state is distillable.
  informal: >
    Some quantum states are entangled but their entanglement cannot be "purified" or
    concentrated into a useful form. The PPT bound entanglement problem asks whether
    having a positive partial transpose is exactly the dividing line between distillable
    and undistillable entanglement.

why_it_matters: >
  Understanding bound entanglement is fundamental to quantum information theory.
  It determines the structure of entanglement as a resource, impacts quantum
  communication protocols, and connects to key questions in operator algebras
  and the geometry of quantum states.

