statement:
  canonical: 'In two dimensions, Schramm-Loewner Evolution (SLE_kappa) provides a rigorous mathematical framework for conformally
    invariant random curves arising as scaling limits of interfaces in critical lattice models (e.g., SLE_3 for the Ising
    model, SLE_6 for critical percolation, SLE_8/3 for self-avoiding walks). The fundamental open problem is to develop an
    analogous rigorous theory of conformal invariance for three-dimensional critical phenomena: (1) Prove that scaling limits
    of interfaces in 3D critical lattice models (such as critical percolation on Z^3 or the 3D Ising model) exist and exhibit
    conformal invariance; (2) Develop a mathematical framework (a 3D analog of SLE) to describe conformally invariant random
    surfaces or interfaces in three dimensions; (3) Rigorously establish the connection between 3D conformal field theory
    and the scaling limits of 3D lattice models.

    '
  informal: 'In two dimensions, mathematicians developed a beautiful theory (SLE) for random curves that appear at phase transitions,
    proving they have a special symmetry called conformal invariance. Can we extend this to three dimensions? Can we prove
    that the random surfaces appearing at 3D phase transitions also have conformal symmetry, and can we describe them mathematically?

    '
why_it_matters: 'The development of SLE in two dimensions was one of the greatest achievements of mathematical physics in
  the early 21st century, leading to Fields Medals for Werner (2006) and Smirnov (2010). Extending this theory to three dimensions
  would revolutionize our understanding of critical phenomena, connect to the conformal bootstrap program, and provide rigorous
  foundations for predictions of 3D conformal field theory. It represents one of the most important frontiers in probability
  theory and mathematical physics.

  '
