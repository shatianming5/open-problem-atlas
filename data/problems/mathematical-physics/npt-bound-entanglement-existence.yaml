statement:
  canonical: >
    Determine whether there exist bipartite quantum states rho on H_A tensor H_B that
    have a non-positive partial transpose (NPT) but are nevertheless bound entangled,
    i.e., no pure entanglement can be distilled from any number of copies of rho via
    LOCC. Equivalently, is every NPT state distillable?
  informal: >
    If a quantum state fails the PPT test (its partial transpose has negative eigenvalues),
    it is certainly entangled. But can we always extract useful entanglement from such
    states, or could there be NPT states whose entanglement is permanently locked away?

why_it_matters: >
  This is one of the most fundamental open problems in entanglement theory. A positive
  answer would imply a radical restructuring of entanglement theory, while a negative
  answer would simplify the resource theory of entanglement significantly.

