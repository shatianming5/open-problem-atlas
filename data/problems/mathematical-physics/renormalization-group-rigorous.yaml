statement:
  canonical: >
    Develop a complete rigorous mathematical framework for the renormalization group
    (RG) in quantum field theory. Specifically: (1) Rigorously prove the existence of
    non-trivial RG fixed points for physically relevant theories in d=4 (such as QCD
    or non-abelian gauge theories). (2) Prove that the RG flow is well-defined as a
    dynamical system on a suitable space of quantum field theories. (3) Establish the
    universality of critical exponents through RG fixed point analysis in d=3. (4) Give
    a rigorous non-perturbative proof of asymptotic freedom for Yang-Mills theory using
    RG methods.
  informal: >
    The renormalization group is one of the most powerful tools in physics, explaining
    why different physical systems behave the same near phase transitions. But a
    complete rigorous mathematical treatment is still missing.

why_it_matters: >
  The renormalization group is central to modern physics, from particle physics to
  condensed matter. A rigorous framework would unify disparate approaches, prove
  universality, and provide the mathematical foundation for one of physics' most
  important conceptual tools.

