statement:
  canonical: >
    Determine the exact percolation thresholds p_c for site percolation on common
    lattices where exact values are not known, including the simple cubic lattice in
    d=3 (numerically p_c approx 0.3116), the BCC lattice (p_c approx 0.2464), and
    the FCC lattice (p_c approx 0.198). For bond percolation, determine exact p_c
    for the simple cubic lattice (p_c approx 0.2488). Determine whether these
    thresholds can be expressed in closed form or are transcendental numbers.
  informal: >
    At what probability does a random network first become connected across its whole
    extent? For some 2D lattices, exact values are known (like p_c = 1/2 for bond
    percolation on the square lattice), but for 3D lattices, only numerical estimates exist.

why_it_matters: >
  Percolation thresholds are fundamental constants in statistical mechanics and
  probability theory. Finding exact values would deepen our understanding of phase
  transitions and could reveal hidden mathematical structures.

