statement:
  canonical: 'Rigorously establish the connections between quantum information theory and quantum gravity. Specifically: (1)
    Prove or disprove the ER=EPR conjecture of Maldacena and Susskind, that quantum entanglement between two systems is equivalent
    to a non-traversable Einstein-Rosen bridge connecting them. (2) Determine whether quantum computational complexity has
    a geometric dual in AdS/CFT, as conjectured by Susskind''s "complexity=volume" and "complexity=action" proposals. (3)
    Establish whether quantum error correcting codes underlie the structure of spacetime in holographic theories.

    '
  informal: 'Are entanglement and wormholes the same thing? Is the geometry of spacetime built from quantum information? These
    deep conjectures connecting quantum information to gravity remain unproven.

    '
why_it_matters: 'These conjectures represent a paradigm shift in our understanding of quantum gravity, suggesting that spacetime
  itself emerges from quantum information. Resolving them would fundamentally change our understanding of both quantum mechanics
  and general relativity.

  '
