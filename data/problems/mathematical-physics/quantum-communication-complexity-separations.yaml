statement:
  canonical: >
    Determine the exact relationship between quantum and classical communication
    complexity for total Boolean functions. Specifically, prove or disprove that
    there exists a total Boolean function f:{0,1}^n x {0,1}^n -> {0,1} such that
    the quantum communication complexity Q(f) is exponentially smaller than the
    classical (randomized) communication complexity R(f). Determine whether the
    log-rank conjecture holds for quantum communication.
  informal: >
    Can quantum communication be exponentially more efficient than classical
    communication for computing functions where both Alice and Bob have inputs?
    For partial functions this is known, but for total functions the largest known
    separation is only polynomial.

why_it_matters: >
  Communication complexity is a foundational model in theoretical computer science.
  Understanding quantum advantages here has implications for quantum algorithms,
  circuit complexity, and the power of quantum computing.

