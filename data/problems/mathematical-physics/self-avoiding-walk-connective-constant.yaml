statement:
  canonical: >
    Determine the connective constant mu for self-avoiding walks (SAWs) on common
    lattices. Specifically, prove that for the honeycomb lattice mu = sqrt(2 + sqrt(2))
    (conjectured by Nienhuis and proved by Duminil-Copin and Smirnov for the honeycomb
    lattice). For the square lattice (numerically mu approx 2.63816), the simple cubic
    lattice (mu approx 4.6842), and the triangular lattice (mu approx 4.1508), determine
    exact values or prove they are transcendental. Prove the conjectured critical
    exponents gamma = 43/32 and nu = 3/4 for SAWs in d=2.
  informal: >
    A self-avoiding walk never revisits a point. How many SAWs of length n are there?
    The answer grows like mu^n, where mu is the connective constant. Finding the exact
    value of mu for most lattices is an open problem.

why_it_matters: >
  Self-avoiding walks model polymer chains in chemistry and biology. The connective
  constant is a fundamental mathematical invariant of a lattice. Understanding SAWs
  connects to conformal field theory, SLE, and the geometry of random curves.

