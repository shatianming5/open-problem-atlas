statement:
  canonical: 'Rigorously establish the Kapustin-Witten approach to the geometric Langlands correspondence via topologically
    twisted N=4 super Yang-Mills theory. Specifically, prove that the S-duality of N=4 SYM, when twisted and compactified
    on a Riemann surface Sigma, produces the geometric Langlands correspondence as a mirror symmetry between the Hitchin moduli
    spaces M_H(G, Sigma) and M_H(G^L, Sigma) for a group G and its Langlands dual G^L. Make the physics derivation mathematically
    rigorous, establishing the equivalence of derived categories of coherent sheaves and D-modules on these moduli spaces.

    '
  informal: 'Kapustin and Witten showed that the geometric Langlands correspondence, one of the deepest conjectures in mathematics,
    can be understood as an electromagnetic duality in physics. Making this physical argument into a proof is a grand challenge.

    '
why_it_matters: 'The geometric Langlands program is one of the most important research directions in modern mathematics. The
  physics approach provides deep structural insights and suggests far-reaching generalizations. Making it rigorous would revolutionize
  our understanding of the Langlands program.

  '
