statement:
  canonical: >
    Determine the exact value of the fault-tolerance threshold p_th for quantum
    computation under the most general noise model (adversarial, local, Markovian).
    Specifically, for the standard depolarizing noise model, determine the supremum
    of error rates p such that arbitrary quantum computations can be performed with
    polynomial overhead using concatenated codes, topological codes, or any fault-tolerant
    scheme. Current rigorous lower bounds give p_th >= 10^{-4} while numerical estimates
    suggest p_th ~ 10^{-2} for surface codes.
  informal: >
    How noisy can quantum gates be before fault-tolerant quantum computing becomes
    impossible? We know a threshold exists, but its exact value for optimal codes
    and realistic noise models is unknown.

why_it_matters: >
  The fault-tolerance threshold is the most important number in quantum computing
  engineering. It determines whether current and near-future quantum hardware can
  support scalable computation. Closing the gap between rigorous bounds and numerical
  estimates is crucial for quantum computing development.

