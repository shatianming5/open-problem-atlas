statement:
  canonical: >
    Provide a complete rigorous characterization of Griffiths singularities in dilute
    and disordered spin systems. Prove that in the Griffiths phase (the temperature
    region between the critical temperatures of the pure and disordered systems), the
    free energy is an infinitely differentiable but non-analytic function of the magnetic
    field. Determine the exact nature of the essential singularity and its dependence
    on the disorder distribution. For quantum systems, prove that rare region effects
    lead to power-law (Griffiths-McCoy) singularities with continuously varying exponents.
  informal: >
    In disordered magnets, rare regions can locally order at temperatures above the
    bulk critical temperature, creating unusual singularities. Rigorously characterizing
    these subtle effects is an important open problem.

why_it_matters: >
  Griffiths singularities demonstrate that disorder can have profound effects on phase
  transitions. Understanding them rigorously is important for disordered systems ranging
  from random magnets to neural networks and biological systems.

