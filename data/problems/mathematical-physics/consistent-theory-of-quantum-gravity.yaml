statement:
  canonical: >
    Does there exist a mathematically consistent, background-independent quantum theory
    that reduces to general relativity in the classical limit and to quantum field theory
    in the weak-gravity limit? More precisely, construct a quantum theory satisfying the
    following: (1) the theory possesses a well-defined Hilbert space (or suitable
    generalization) of states; (2) in the semiclassical limit (hbar -> 0 or G_N -> 0),
    the theory reproduces Einstein's field equations R_{mu nu} - (1/2) R g_{mu nu} +
    Lambda g_{mu nu} = (8 pi G_N / c^4) T_{mu nu}; (3) the theory is perturbatively
    or non-perturbatively finite (free of unrenormalizable divergences that plague
    naive quantization of general relativity); (4) the theory is unitary and consistent
    with the principles of quantum mechanics; (5) the theory resolves or circumvents
    the singularities of classical general relativity (black hole singularities, Big
    Bang singularity); and (6) the theory provides a consistent resolution of the
    black hole information paradox.
  informal: >
    General relativity describes gravity as the curvature of spacetime, and quantum
    mechanics describes the behavior of particles at the smallest scales. Both theories
    are extraordinarily successful, but they are fundamentally incompatible: attempts to
    combine them using standard techniques produce nonsensical infinities. Does a
    consistent mathematical theory exist that unifies gravity with quantum mechanics?

why_it_matters: >
  The construction of a consistent theory of quantum gravity is widely regarded as the
  most fundamental open problem in theoretical physics. It is essential for understanding
  the very early universe (Big Bang), the interior of black holes, and the ultimate
  structure of spacetime at the Planck scale (~10^{-35} meters). Candidate approaches
  include string theory, loop quantum gravity, causal set theory, and asymptotic safety,
  but none has achieved a complete, experimentally verified formulation.

