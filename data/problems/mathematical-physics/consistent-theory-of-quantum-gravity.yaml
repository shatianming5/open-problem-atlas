partial_results:
  - summary: "String theory provides a perturbatively finite framework for quantum gravity in 10 dimensions, with five consistent superstring theories unified under M-theory, but a complete non-perturbative formulation remains elusive."
    year: 1995
  - summary: "The AdS/CFT correspondence (Maldacena, 1997) provides a non-perturbative definition of quantum gravity in anti-de Sitter space via a dual conformal field theory, but extension to de Sitter or flat space is not established."
    year: 1997
  - summary: "Loop quantum gravity provides a background-independent quantization of general relativity with discrete area and volume spectra, but its semiclassical limit and connection to low-energy physics remain unproven."
    year: 2004
  - summary: "Weinberg's asymptotic safety scenario suggests gravity may be non-perturbatively renormalizable at a UV fixed point; functional renormalization group studies provide evidence but no rigorous proof."
    year: 2012

