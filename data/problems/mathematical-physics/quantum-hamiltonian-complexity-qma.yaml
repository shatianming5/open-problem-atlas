statement:
  canonical: 'Prove or disprove the quantum PCP conjecture: for the k-local Hamiltonian problem with k = O(1), there exists
    a constant epsilon > 0 such that it is QMA-hard to determine whether the ground state energy of a k-local Hamiltonian
    is at most a or at least a + epsilon * n, where n is the number of qubits. This is the quantum analogue of the PCP theorem
    in classical complexity theory. Additionally, determine the exact complexity of computing ground state properties of local
    Hamiltonians on physically motivated lattice geometries.

    '
  informal: 'Is approximating the ground state energy of quantum systems hard even when we only need a rough estimate? The
    quantum PCP conjecture says yes, which would have profound implications for quantum computing and physics.

    '
why_it_matters: 'The quantum PCP conjecture is one of the most important open problems at the intersection of quantum information
  and computational complexity. It would imply that quantum entanglement in ground states is fundamentally different from
  what can be verified efficiently, with deep implications for condensed matter physics.

  '
