statement:
  canonical: >
    Time-bounded Kolmogorov complexity Kt(x) measures the minimum description length
    of x among programs running in time t. Liu and Pass (2020) showed that the average-case
    hardness of computing Kt implies one-way functions. Is the converse true? Does the
    existence of one-way functions imply that Kt is hard on average? More broadly, what
    is the precise relationship between Kolmogorov complexity and cryptographic hardness?
  informal: >
    Is the difficulty of compressing strings (computing Kolmogorov complexity) exactly
    equivalent to the existence of cryptographic hardness? Can we fully characterize
    cryptographic primitives through the lens of Kolmogorov complexity?

why_it_matters: >
  Establishing a tight equivalence between Kolmogorov complexity and one-way functions
  would provide a beautiful unification of algorithmic information theory and
  cryptography, giving a new characterization of the minimal assumption for cryptography.

