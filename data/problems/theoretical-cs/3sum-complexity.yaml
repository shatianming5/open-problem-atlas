partial_results:
  - summary: "Gronlund and Pettie gave a decision-tree algorithm for 3SUM using O(n^{3/2} sqrt(log n)) comparisons, breaking the n^2 barrier in the comparison model."
    year: 2014
  - summary: "Freund gave a randomized algorithm solving 3SUM in expected O(n^2 / (log n / log log n)^{2/3}) time in the real RAM model."
    year: 2017
  - summary: "Chan showed 3SUM can be solved in O(n^2 (log log n)^{O(1)} / log^2 n) time by combining hashing with word-RAM techniques."
    year: 2020
  - summary: "Kane, Lovett, and Moran proved that the 3SUM problem requires Omega(n log n) comparisons in the linear decision tree model."
    year: 2019

