statement:
  canonical: >
    The 3SUM problem asks: given a set S of n integers, do there exist three
    elements a, b, c in S such that a + b + c = 0? The classical algorithm
    solves this in O(n^2) time. The 3SUM conjecture asserts that no algorithm
    can solve 3SUM in O(n^{2-epsilon}) time for any constant epsilon > 0
    (in the real RAM model or comparison-based model). Is there an algorithm
    for 3SUM running in time O(n log n), or more generally, in truly
    subquadratic time o(n^2)?
  informal: >
    Given a list of n numbers, can we find three of them that add up to zero
    faster than checking almost all triples? The obvious approach takes time
    proportional to n-squared. Can we do significantly better, perhaps in time
    proportional to n times log(n)? Most researchers believe we cannot do much
    better than n-squared.

why_it_matters: >
  The 3SUM problem serves as a cornerstone of fine-grained complexity theory.
  Many problems in computational geometry, pattern matching, and graph algorithms
  have been shown to be "3SUM-hard," meaning a truly subquadratic algorithm for
  them would imply a truly subquadratic algorithm for 3SUM. The 3SUM conjecture
  is one of the key hypotheses (alongside SETH and APSP conjecture) used to
  establish conditional lower bounds throughout algorithm design. Understanding
  the true complexity of 3SUM would clarify the landscape of polynomial-time
  problems.

