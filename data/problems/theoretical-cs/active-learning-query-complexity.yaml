statement:
  canonical: >
    In active learning, the learner can adaptively choose which examples to request
    labels for. What is the optimal label complexity (number of label queries) as a
    function of the VC dimension, error parameter, and distribution? For which
    concept classes does active learning provably improve over passive learning, and
    by how much?
  informal: >
    If a learning algorithm can choose which data points to get labels for (rather
    than receiving random labeled data), how many labels does it need? When does
    this adaptive querying help significantly?

why_it_matters: >
  Active learning is crucial in practice because labeled data is expensive. Understanding
  the fundamental limits of label efficiency guides the design of active learning
  systems in applications like medical diagnosis and NLP.

