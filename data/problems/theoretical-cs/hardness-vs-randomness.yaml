statement:
  canonical: 'The hardness vs randomness paradigm establishes that circuit lower bounds imply derandomization. Is the converse
    true? Specifically, does P = BPP imply circuit lower bounds against E (or a related class)? More generally, are hardness
    assumptions exactly equivalent to derandomization results?

    '
  informal: 'If randomness can be eliminated from efficient algorithms, does that necessarily mean hard problems exist? Is
    there a tight bidirectional connection between computational hardness and the uselessness of randomness?

    '
why_it_matters: 'Establishing a tight equivalence between hardness and derandomization would unify two major themes in complexity
  theory. It would mean that understanding randomness is exactly the same as understanding circuit lower bounds.

  '
