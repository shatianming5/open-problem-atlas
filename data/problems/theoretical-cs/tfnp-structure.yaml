statement:
  canonical: 'TFNP is the class of total NP search problems, where a solution is guaranteed
    to exist. Important subclasses include PLS, PPAD, PPA, PPP, and CLS. Determine
    the complete structure of TFNP: are these subclasses all distinct? Is TFNP itself
    characterized by a syntactic complexity class?

    '
  informal: 'For computational problems where a solution always exists (like finding
    a Nash equilibrium), how do the different complexity subclasses relate to each
    other? What is the full landscape of hardness for guaranteed-to-exist solutions?

    '
why_it_matters: 'TFNP and its subclasses capture the complexity of fundamental problems
  in game theory (Nash equilibrium via PPAD), economics, and combinatorics. Understanding
  this landscape has practical implications for algorithmic mechanism design and equilibrium
  computation.

  '
prerequisites:
- NP search problems
- PPAD, PLS, PPP classes
- fixed-point theorems
- Nash equilibrium computation
