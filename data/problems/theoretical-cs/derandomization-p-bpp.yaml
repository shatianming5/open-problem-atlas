statement:
  canonical: >
    BPP is the class of languages decidable in polynomial time by a probabilistic
    Turing machine with bounded error probability. Is P = BPP? That is, can every
    randomized polynomial-time algorithm be derandomized to a deterministic
    polynomial-time algorithm?
  informal: >
    Is randomness ever truly useful for efficient computation? Most experts believe
    P = BPP, meaning that randomized algorithms can always be made deterministic
    without significant slowdown, but a proof is lacking.

why_it_matters: >
  Proving P = BPP would show that randomness is not a fundamental computational
  resource for efficient decision-making. This has profound implications for algorithm
  design, cryptography, and our understanding of computational resources. The
  Impagliazzo-Wigderson framework shows P = BPP follows from circuit lower bounds.

