statement:
  canonical: >
    Given n points in d-dimensional space (with d potentially large), preprocess them
    into a data structure that answers exact nearest neighbor queries efficiently.
    Is there a data structure with polynomial space and query time polynomial in d
    and polylogarithmic in n for exact nearest neighbor search? Or does the curse of
    dimensionality make this fundamentally impossible?
  informal: >
    Can we build efficient data structures for finding the closest point in a dataset
    when the data lives in a high-dimensional space? Current methods either use
    exponential space or have query time exponential in the dimension.

why_it_matters: >
  Nearest neighbor search is fundamental to machine learning, databases, computer vision,
  and information retrieval. The curse of dimensionality is a major practical barrier,
  and understanding its theoretical limits would guide algorithm design.

