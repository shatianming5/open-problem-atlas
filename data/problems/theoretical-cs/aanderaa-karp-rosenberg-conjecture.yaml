statement:
  canonical: >
    A graph property is a class of graphs closed under isomorphism. A graph
    property P on n vertices is called evasive if every deterministic algorithm
    that determines whether an input graph on n vertices has property P by
    querying individual edges must, in the worst case, query all n(n-1)/2 possible
    edges. The Aanderaa-Karp-Rosenberg conjecture (evasiveness conjecture) states
    that every nontrivial monotone graph property is evasive. A monotone graph
    property is one that is preserved under the addition of edges, and nontrivial
    means it is not satisfied by all graphs or by no graphs.
  informal: >
    Suppose you want to determine whether a graph has some property (such as
    being connected, containing a triangle, or being planar) that is preserved
    when you add edges. You learn about the graph by asking about one edge at
    a time: "Is there an edge between vertex i and vertex j?" The conjecture
    says that for any such property, an adversary can always force you to ask
    about every possible edge before you can determine the answer.

why_it_matters: >
  The evasiveness conjecture connects combinatorics, topology, and computational
  complexity. It concerns the query complexity (decision tree complexity) of
  graph properties, which is a fundamental model of computation. Proofs for
  special cases have used surprising topological methods (Oliver's theorem on
  fixed points of group actions, simplicial complexes). The conjecture, if true,
  would give a complete characterization of the deterministic query complexity
  of monotone graph properties.

