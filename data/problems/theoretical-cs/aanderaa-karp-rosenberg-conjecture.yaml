partial_results:
  - summary: "Kahn, Saks, and Sturtevant proved the conjecture for graphs on a prime power number of vertices, using Oliver's theorem from algebraic topology on fixed points of p-group actions on acyclic simplicial complexes."
    year: 1984
  - summary: "Rivest and Vuillemin proved that every nontrivial monotone graph property has decision tree complexity at least n^2/4, establishing a quadratic lower bound."
    year: 1976
  - summary: "The conjecture has been verified for specific properties: connectivity, planarity, containing a Hamiltonian cycle, k-colorability."
    year: 1990
  - summary: "Chakrabarti, Khot, and Shi proved near-optimal lower bounds on the randomized query complexity of monotone graph properties."
    year: 2001

