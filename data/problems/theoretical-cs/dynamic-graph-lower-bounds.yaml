statement:
  canonical: >
    Can we prove polynomial (omega(polylog n)) unconditional lower bounds for dynamic
    graph problems in the cell probe model? For problems like dynamic reachability,
    dynamic shortest paths, or dynamic maximum matching, the best known unconditional
    lower bounds are only logarithmic despite polynomial conditional lower bounds
    from SETH/OMv.
  informal: >
    When a graph changes over time (edges are inserted and deleted), we want to
    efficiently answer queries about it. Can we prove that some natural dynamic graph
    problems truly require significant update or query time?

why_it_matters: >
  Dynamic graph algorithms are central to network analysis, databases, and optimization.
  The gap between conditional lower bounds (polynomial, from SETH) and unconditional
  lower bounds (logarithmic) is enormous. Closing this gap is a major challenge in
  data structure lower bounds.

