statement:
  canonical: 'In the dynamic connectivity problem, we maintain an undirected graph
    under edge insertions and deletions while answering connectivity queries. Holm,
    de Lichtenberg, and Thorup (2001) achieved O(log^2 n) amortized time per operation.
    Kapron, King, and Mountjoy (2013) achieved O(log^4 n) worst-case. What are the
    optimal bounds for both amortized and worst-case dynamic connectivity?

    '
  informal: 'When a graph changes over time, how fast can we determine whether two
    vertices are connected? The known algorithms take O(log^2 n) amortized time, but
    it is unknown if this is optimal.

    '
why_it_matters: 'Dynamic connectivity is a fundamental data structure problem with
  applications in network monitoring, incremental algorithms, and computational geometry.
  The gap between known O(log^2 n) upper bounds and Omega(log n) lower bounds is open.

  '
prerequisites:
- dynamic data structures
