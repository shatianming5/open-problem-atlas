statement:
  canonical: 'Indistinguishability obfuscation (iO) transforms a program into an equivalent
    but "unintelligible" program such that obfuscations of any two functionally equivalent
    programs are computationally indistinguishable. Can iO be constructed from well-studied,
    standard cryptographic assumptions (e.g., LWE, DDH) without relying on new or
    poorly understood assumptions?

    '
  informal: 'Can we make computer programs unreadable while preserving their functionality,
    based on well-understood mathematical assumptions? Current constructions rely
    on novel assumptions whose security is less well understood.

    '
why_it_matters: 'iO is often called the "master tool" of cryptography because it implies
  almost all other cryptographic primitives. Jain, Lin, and Sahai (2021) constructed
  iO from sub-exponential hardness of well-studied assumptions, but whether standard
  (polynomial) hardness suffices remains open.

  '
