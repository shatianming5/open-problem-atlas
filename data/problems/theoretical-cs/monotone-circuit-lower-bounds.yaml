statement:
  canonical: 'A monotone Boolean circuit uses only AND and OR gates (no NOT gates).
    Razborov (1985) proved exponential lower bounds for the monotone circuit complexity
    of the clique function. Can similar exponential lower bounds be proved for monotone
    functions that have polynomial-size general (non-monotone) circuits? Can the gap
    between monotone and general circuit complexity be fully characterized?

    '
  informal: 'How much does negation help in circuit computation? For which problems
    does removing NOT gates make circuits exponentially larger?

    '
why_it_matters: 'Monotone circuits are a natural restriction where strong lower bounds
  are known. Understanding the gap between monotone and general circuits could yield
  insights into the role of negation in computation and potentially transfer to general
  circuit lower bounds.

  '
