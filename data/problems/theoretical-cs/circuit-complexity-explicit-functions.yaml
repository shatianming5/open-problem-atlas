statement:
  canonical: >
    Prove a superlinear lower bound on the circuit complexity of an explicit Boolean
    function. Specifically, exhibit a function f in NP (or even in P) and prove that
    any Boolean circuit computing f requires more than C*n gates for every constant C,
    where n is the input length.
  informal: >
    Can we prove that some specific, natural Boolean function requires large circuits
    to compute? Despite knowing that most functions require exponential-size circuits
    (by counting arguments), we cannot prove more than a roughly 3n lower bound for
    any explicit function.

why_it_matters: >
  The inability to prove strong circuit lower bounds for explicit functions is one of
  the most embarrassing gaps in complexity theory. The best known lower bound for an
  explicit function is approximately 3n - o(n) by Blum (1984) and Lachish-Raz (2001).
  Any significant improvement would constitute a major breakthrough.

