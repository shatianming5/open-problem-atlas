statement:
  canonical: >
    Let ACC^0 denote the class of languages computable by constant-depth polynomial-size
    circuits with AND, OR, NOT, and MOD_m gates for any fixed m. Can we prove that NP
    is not contained in ACC^0? More generally, can we prove explicit superpolynomial
    lower bounds against ACC^0 circuits for problems in NP?
  informal: >
    Can we prove that there are problems in NP that cannot be solved by small
    constant-depth circuits even when those circuits are allowed to use modular
    counting gates?

why_it_matters: >
  Proving that NP is not in ACC^0 would be a major step in circuit complexity. While
  Williams (2011) showed NEXP is not in ACC^0, extending this to NP or even NP-complete
  problems would be a dramatic improvement and would advance our understanding of the
  P vs NP question.

