statement:
  canonical: 'The dynamic optimality conjecture (Sleator and Tarjan, 1985) states
    that splay trees are O(1)-competitive with any offline binary search tree algorithm.
    That is, for any sequence of accesses, the total cost of splay tree operations
    is at most a constant factor times the cost of the optimal offline BST for that
    sequence. Is this conjecture true?

    '
  informal: 'Is the splay tree always within a constant factor of the best possible
    binary search tree for any access sequence, even compared to one that knows the
    future?

    '
why_it_matters: 'Dynamic optimality would establish splay trees as universally optimal
  BSTs, meaning no other BST algorithm can do significantly better on any access pattern.
  This is one of the most important open problems in data structures.

  '
