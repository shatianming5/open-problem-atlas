statement:
  canonical: >
    The classical PCP theorem states that every language in NP has a probabilistically
    checkable proof (PCP) where the verifier reads only a constant number of bits
    of the proof. The quantum PCP conjecture asks for an analogous result in the
    quantum setting: is it QMA-hard to approximate the ground state energy of a
    local Hamiltonian to within a constant fraction of the total number of terms?
    Formally, does there exist a constant epsilon > 0 such that the following
    promise problem is QMA-hard: given a k-local Hamiltonian H = sum_{i=1}^m H_i
    on n qubits (where each H_i acts on at most k qubits and 0 <= H_i <= I),
    distinguish between the cases where the ground state energy is at most
    epsilon * m and at least (1 - epsilon) * m?
  informal: >
    The classical PCP theorem says you can verify any mathematical proof by
    reading only a few random bits of it. The quantum PCP conjecture asks
    whether a similar phenomenon holds for quantum proofs: is it computationally
    hard even to approximately determine the lowest energy state of a quantum
    system, even when "approximately" means just getting the answer roughly right?

why_it_matters: >
  The quantum PCP conjecture is considered one of the most important open problems
  in quantum complexity theory and quantum information. If true, it would have
  profound implications for condensed matter physics (implying that ground states
  of local Hamiltonians are generically hard to approximate), quantum error
  correction, quantum algorithms, and the hardness of approximation for quantum
  problems. It would be the quantum analogue of the PCP theorem, which
  revolutionized classical complexity theory and hardness of approximation.
  The conjecture also connects to the study of entanglement, area laws, and
  the structure of quantum ground states.

