partial_results:
  - summary: "Kitaev showed that the local Hamiltonian problem is QMA-complete for 5-local Hamiltonians, later improved to 2-local (Kempe, Kitaev, Regev, 2006), establishing the quantum analogue of Cook's theorem."
    year: 2002
  - summary: "Brandao and Harrow showed that the quantum PCP conjecture is false for the special case of dense local Hamiltonians, using a quantum de Finetti theorem."
    year: 2013
  - summary: "Aharonov, Arad, Landau, and Vazirani proved a quantum analogue of gap amplification (the detectability lemma), a key ingredient in classical PCP proofs."
    year: 2009
  - summary: "Eldar and Harrow showed that no-low-energy trivial states (NLTS) exist, proving a prerequisite conjecture for the quantum PCP conjecture."
    year: 2017
  - summary: "Anshu, Breuckmann, and Nirkhe proved the NLTS conjecture using quantum LDPC codes, removing a major barrier to the quantum PCP conjecture."
    year: 2023

