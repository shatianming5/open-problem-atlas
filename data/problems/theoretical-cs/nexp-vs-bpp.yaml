statement:
  canonical: >
    Let NEXP denote the class of languages decidable by a nondeterministic Turing machine
    in exponential time, and BPP denote the class of languages decidable by a probabilistic
    Turing machine in polynomial time with bounded error. Is NEXP different from BPP?
  informal: >
    Can randomized polynomial-time algorithms solve all problems solvable by
    nondeterministic exponential-time machines? It is widely believed that NEXP is
    much more powerful than BPP, but a proof remains elusive.

why_it_matters: >
  Separating NEXP from BPP would be a major advance in computational complexity,
  establishing that nondeterministic exponential time is strictly more powerful than
  randomized polynomial time. This is one of the frontier separation problems in
  complexity theory and is connected to circuit lower bounds and derandomization.

