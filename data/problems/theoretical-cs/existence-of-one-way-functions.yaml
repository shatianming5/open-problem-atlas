partial_results:
- summary: Impagliazzo and Luby proved that one-way functions exist if and only if
    pseudorandom generators exist.
  year: 1989
- summary: Hastad, Impagliazzo, Levin, and Luby showed that any one-way function can
    be transformed into a pseudorandom generator.
  year: 1999
- summary: No candidate one-way function has been proven to be one-way; the security
    of candidates like integer factorization and discrete logarithm remains conjectural.
  year: 2000
- summary: Liu and Pass showed connections between one-way functions and time-bounded
    Kolmogorov complexity, proving that one-way functions exist iff the time-bounded
    Kolmogorov complexity problem is hard on average.
  year: 2020
