statement:
  canonical: >
    Can we construct collision-resistant hash functions that are provably secure against
    quantum adversaries, based on well-studied assumptions? Specifically, what is the
    exact quantum query complexity of collision-finding, and which lattice-based or
    code-based constructions provably resist quantum attacks with optimal parameters?
  informal: >
    Are current hash functions secure against quantum computers? Can we build
    provably quantum-resistant hash functions from well-understood mathematical problems?

why_it_matters: >
  Hash functions are ubiquitous in cryptography and security. Ensuring they remain
  secure in a post-quantum world is critical. While Grover's algorithm provides only
  a quadratic speedup for generic preimage search, the security of specific constructions
  and collision-resistance against quantum adversaries requires careful analysis.

