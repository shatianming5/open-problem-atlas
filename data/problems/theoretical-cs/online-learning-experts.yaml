statement:
  canonical: >
    In the prediction with expert advice setting, a learner must choose among n
    experts over T rounds. The minimax optimal regret is known to be Theta(sqrt(T log n))
    for the basic setting. For structured variants (e.g., combinatorial experts, sleeping
    experts, experts with limited feedback), what are the exact minimax optimal regret
    bounds? Can we achieve computationally efficient algorithms matching the
    information-theoretic optimum?
  informal: >
    When learning from experts over time, we want to perform nearly as well as the
    best expert in hindsight. For many natural variants of this problem, the exact
    optimal performance and efficient algorithms are still unknown.

why_it_matters: >
  Online learning with expert advice is foundational to online optimization, machine
  learning, and game theory. Understanding the exact minimax rates for structured
  variants is essential for practical algorithm design.

