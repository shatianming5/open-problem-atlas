statement:
  canonical: >
    Quantum walks provide a framework for quantum algorithms that has yielded speedups
    for search, element distinctness, and graph problems. What are the fundamental
    limits of quantum walk algorithms? For which problems can quantum walks provide
    superpolynomial speedups over classical algorithms, and for which are the
    speedups at most polynomial?
  informal: >
    Quantum walks (the quantum analogue of random walks) give speedups for many
    problems. But how far can this approach go? Are there natural problems where
    quantum walks give exponential speedups, or are polynomial speedups the limit?

why_it_matters: >
  Quantum walks are one of the main paradigms for designing quantum algorithms.
  Understanding their fundamental limits would guide quantum algorithm design and
  clarify which problems can benefit from quantum computation.

