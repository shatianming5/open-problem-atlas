statement:
  canonical: 'What is the optimal number of comparisons needed to find the minimum
    spanning tree of a weighted graph? Chazelle (2000) gave a nearly-linear time algorithm
    running in O(m * alpha(m,n)) time. Pettie and Ramachandran (2002) gave an optimal
    algorithm in the comparison model, but its complexity is unknown -- it runs in
    O(T*(m,n)) time where T* is the optimal decision tree complexity for MST, which
    is not known to be linear. Is the optimal MST comparison complexity O(m)?

    '
  informal: 'What is the minimum number of comparisons needed to find a minimum spanning
    tree? We know the answer is close to linear, but whether it is exactly linear
    is unknown.

    '
why_it_matters: 'MST is one of the oldest problems in combinatorial optimization.
  Despite decades of research, whether a linear-time comparison-based MST algorithm
  exists remains one of the most tantalizing open questions in algorithm design.

  '
