statement:
  canonical: >
    For every constant epsilon > 0, the following promise problem is NP-hard:
    given a unique game instance (a constraint satisfaction problem where each
    constraint is a bijection between label sets of size k), distinguish between
    the case where at least (1 - epsilon) fraction of constraints can be satisfied
    and the case where at most epsilon fraction of constraints can be satisfied.
    Formally, for all epsilon > 0, there exists a label set size k = k(epsilon)
    such that it is NP-hard to (1 - epsilon, epsilon)-decide the Unique Label
    Cover problem with label set size k.
  informal: >
    Consider a system of "unique" constraints where each constraint relates two
    variables via a one-to-one mapping over a set of labels. The conjecture says
    that even approximately deciding whether nearly all constraints can be
    satisfied (versus almost none can be) is computationally intractable (NP-hard).

why_it_matters: >
  The Unique Games Conjecture (UGC), proposed by Subhash Khot in 2002, has become
  one of the central conjectures in computational complexity and approximation
  algorithms. If true, it would provide tight inapproximability results for a
  wide range of optimization problems, including Max-Cut, Vertex Cover, and
  constraint satisfaction problems. It would unify and strengthen many known
  hardness-of-approximation results. The conjecture led Khot to receive the
  Nevanlinna Prize in 2014 for its transformative impact on the field.

