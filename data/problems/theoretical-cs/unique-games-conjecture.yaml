partial_results:
  - summary: "Khot, Kindler, Mossel, and O'Donnell showed that UGC implies the Goemans-Williamson SDP-based algorithm for Max-Cut is optimal."
    year: 2007
  - summary: "Raghavendra showed that assuming UGC, the SDP relaxation gives the optimal approximation for every constraint satisfaction problem."
    year: 2008
  - summary: "Arora, Barak, and Steurer gave a subexponential-time algorithm for unique games, showing that if the conjecture is true, NP-hard problems admit subexponential algorithms."
    year: 2015
  - summary: "Khot and Moshkovitz proved a candidate reduction for the 2-to-2 conjecture (a weaker variant of UGC)."
    year: 2018
  - summary: "Barak, Kothari, and Steurer showed limitations of SDP approaches for unique games."
    year: 2019

