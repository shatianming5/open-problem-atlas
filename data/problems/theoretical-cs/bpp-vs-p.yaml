partial_results:
  - summary: "Impagliazzo and Wigderson showed that if any problem in E = DTIME(2^{O(n)}) requires exponential-size circuits, then P = BPP."
    year: 1997
  - summary: "Sipser showed BPP is contained in the polynomial hierarchy (specifically in Sigma_2^P intersect Pi_2^P)."
    year: 1983
  - summary: "AKS primality test derandomized the Miller-Rabin primality test, showing PRIMES is in P, providing a concrete example of successful derandomization."
    year: 2002
  - summary: "It is known that BPP is contained in P/poly (BPP has polynomial-size circuit families), due to Adleman's theorem."
    year: 1978

