statement:
  canonical: >
    Let BPP (Bounded-error Probabilistic Polynomial time) denote the class of
    languages decidable by a probabilistic Turing machine in polynomial time with
    error probability at most 1/3 on every input. Let P denote the class of
    languages decidable by a deterministic Turing machine in polynomial time.
    It is known that P is contained in BPP. Does P = BPP? That is, can every
    efficient randomized algorithm be derandomized into an efficient
    deterministic algorithm?
  informal: >
    Does access to random coin flips give computers any extra power for solving
    problems efficiently? Or can every problem that can be solved quickly with
    randomness also be solved quickly without it? Most experts believe randomness
    does not help — that P = BPP — but proving this remains open.

why_it_matters: >
  The BPP vs P question is central to understanding the power of randomness in
  computation. Many practical algorithms (primality testing, polynomial identity
  testing, randomized rounding) use randomness for efficiency. If P = BPP, then
  randomness is merely a convenience, not a fundamental computational resource.
  The question connects to pseudorandom generators, circuit complexity lower
  bounds, and the hardness-randomness tradeoff paradigm of Nisan-Wigderson and
  Impagliazzo-Wigderson.

