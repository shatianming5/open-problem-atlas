statement:
  canonical: >
    The rectilinear Steiner tree problem asks for the shortest tree connecting a given
    set of points in the plane using only horizontal and vertical line segments, where
    additional Steiner points may be introduced. What is the best polynomial-time
    approximation ratio achievable? The current best is a PTAS by Arora (1998), but
    can the exact problem be solved faster in practice, and what are tight bounds for
    specific approximation schemes?
  informal: >
    What is the shortest way to connect a set of points using only horizontal and
    vertical lines, when we are allowed to add extra junction points? This problem
    arises in VLSI chip design.

why_it_matters: >
  The rectilinear Steiner tree problem is NP-hard and has direct applications in
  VLSI circuit design and network routing. Understanding its approximability and
  practical solvability is important for chip design optimization.

