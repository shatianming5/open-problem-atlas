statement:
  canonical: >
    Can non-abelian anyons (specifically Fibonacci anyons or Ising anyons supplemented
    with additional operations) be physically realized to implement a universal set of
    quantum gates with topological protection? What is the exact computational power
    of topological quantum computation with specific anyon models?
  informal: >
    Can we build quantum computers using exotic particles (anyons) whose quantum
    information is protected by topology? Which types of anyons give full quantum
    computing power?

why_it_matters: >
  Topological quantum computation promises inherently fault-tolerant quantum computing
  by encoding information in topological properties that are immune to local noise.
  Determining which anyon models are computationally universal and physically realizable
  would guide experimental efforts.

