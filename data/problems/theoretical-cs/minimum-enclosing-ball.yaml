statement:
  canonical: >
    Given n points in d-dimensional space, find the smallest ball enclosing all points.
    In fixed dimension, linear-time algorithms exist (Welzl 1991). For high dimensions
    (d growing with n), what is the optimal time complexity? Can we compute or
    (1+epsilon)-approximate the minimum enclosing ball in time polynomial in both n
    and d with optimal dependence on epsilon?
  informal: >
    How fast can we find the smallest sphere containing a set of points, especially
    when the number of dimensions is large? This is easy in low dimensions but
    becomes challenging in high dimensions.

why_it_matters: >
  The minimum enclosing ball is fundamental to clustering, classification, and
  computational geometry. In machine learning applications, high-dimensional data
  is common, making efficient high-dimensional algorithms essential.

