partial_results:
  - summary: "If NP != co-NP, then P != NP. The converse is not known; P != NP does not obviously imply NP != co-NP."
    year: 1971
  - summary: "Pratt showed that primality is in NP (via Pratt certificates), and later AKS showed primality is in P, but these results do not resolve the general NP vs co-NP question."
    year: 1975
  - summary: "In proof complexity, superpolynomial lower bounds have been shown for restricted proof systems (resolution, bounded-depth Frege), but not for general proof systems."
    year: 1985
  - summary: "Razborov proved exponential lower bounds on the size of resolution proofs for the pigeonhole principle, contributing to proof complexity understanding."
