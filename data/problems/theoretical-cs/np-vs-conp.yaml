statement:
  canonical: >
    Let NP denote the class of languages for which membership can be verified
    in polynomial time given a suitable certificate, and let co-NP denote the class
    of languages whose complements are in NP (equivalently, languages for which
    non-membership can be verified in polynomial time). Does NP = co-NP?
  informal: >
    For problems where "yes" answers have short proofs that can be checked quickly
    (NP problems), do "no" answers also always have short proofs that can be checked
    quickly? For example, we can quickly verify that a number is composite by
    exhibiting a factor, but can we always quickly verify that a number is prime
    by providing a short proof of primality? (This particular example was resolved
    — primality is in P — but the general question remains open.)

why_it_matters: >
  The NP vs co-NP question is fundamental to our understanding of the structure
  of computational complexity. If NP != co-NP, it would immediately imply P != NP,
  since P is closed under complement. The question has deep implications for
  proof complexity: NP = co-NP would mean that every tautology has a polynomially
  bounded proof in some proof system. It also relates to the existence of
  optimal propositional proof systems and the foundations of cryptography.

