statement:
  canonical: >
    Can the known black-box separations between cryptographic primitives be
    strengthened or circumvented? Specifically, which implications between primitives
    (e.g., OWF -> PKE, OWF -> OT, CRH -> OWF) can be established via non-black-box
    techniques, and which represent genuine impossibilities?
  informal: >
    We know many cryptographic tools cannot be built from simpler ones using standard
    "black-box" techniques. But are these limitations fundamental, or can clever
    non-standard techniques overcome them?

why_it_matters: >
  Black-box separations map out the landscape of cryptographic assumptions. Understanding
  which separations are genuine impossibilities versus artifacts of proof techniques
  would fundamentally reshape our understanding of the minimal assumptions needed
  for various cryptographic tasks.

