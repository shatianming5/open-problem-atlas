statement:
  canonical: >
    Let NC denote the class of languages decidable by Boolean circuits of polylogarithmic
    depth and polynomial size (equivalently, problems solvable in polylogarithmic
    parallel time with polynomially many processors). Let P denote the class of
    polynomial-time decidable languages. Does NC = P?
  informal: >
    Can every polynomial-time problem be efficiently parallelized? That is, can
    we always achieve a massive speedup by using many processors working in parallel?

why_it_matters: >
  The NC vs P question captures whether inherently sequential computation exists.
  If NC != P, there are problems that can be solved efficiently but cannot be
  significantly sped up through parallelism. P-complete problems like the circuit
  value problem are candidates for such inherently sequential problems.

