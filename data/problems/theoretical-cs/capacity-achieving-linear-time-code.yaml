statement:
  canonical: >
    Shannon's channel coding theorem guarantees the existence of codes that achieve
    the capacity of any discrete memoryless channel with vanishing error probability
    as the block length tends to infinity. However, Shannon's proof is
    non-constructive. Does there exist an explicit family of codes that
    simultaneously: (1) achieves the capacity of the binary symmetric channel
    (or more generally, any discrete memoryless channel), (2) has a linear-time
    encoding algorithm (O(n) time for block length n), and (3) has a linear-time
    decoding algorithm (O(n) time for block length n)?
  informal: >
    Shannon proved in 1948 that reliable communication over a noisy channel is
    possible up to a fundamental limit called the channel capacity. But can we
    build practical codes that reach this limit while being extremely fast —
    encoding and decoding each message in time proportional to its length?

why_it_matters: >
  Finding capacity-achieving codes with linear-time complexity would be a major
  breakthrough at the intersection of information theory, coding theory, and
  algorithm design. While LDPC codes and polar codes approach capacity and
  have near-linear complexity, achieving exact capacity with strictly linear-time
  encoding and decoding for general channels remains open. Such codes would
  have enormous practical impact in communications, storage, and any system
  where data must be transmitted reliably over noisy channels at the highest
  possible rate with minimal computational overhead.

