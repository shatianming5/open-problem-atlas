partial_results:
  - summary: "Gallager's LDPC codes (1962) empirically approach capacity and have near-linear decoding complexity under iterative message-passing decoding, but provable capacity-achievement with linear-time decoding is not established for general channels."
    year: 1962
  - summary: "Arikan's polar codes (2009) provably achieve the capacity of any binary-input symmetric memoryless channel with encoding and decoding complexity O(n log n)."
    year: 2009
  - summary: "Spielman showed how to construct linear-time encodable and decodable codes that correct a constant fraction of errors (for adversarial channels), but these do not achieve Shannon capacity."
    year: 1996
  - summary: "Pfister and Urbanke showed that spatially coupled LDPC codes universally achieve capacity on the BEC with near-linear complexity under belief propagation decoding."
    year: 2014
  - summary: "Polar codes with successive cancellation list decoding achieve competitive performance in 5G NR standards, with O(n log n) complexity."
    year: 2018

