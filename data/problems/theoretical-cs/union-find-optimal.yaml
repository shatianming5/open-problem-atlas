statement:
  canonical: >
    The Union-Find (disjoint set) data structure supports union and find operations.
    Tarjan (1975) showed that union by rank with path compression achieves O(alpha(n))
    amortized time per operation, where alpha is the inverse Ackermann function.
    Fredman and Saks (1989) proved an Omega(alpha(n)) lower bound in the cell probe
    model. Is this tight in more restrictive but natural models? What are the optimal
    bounds for concurrent and cache-oblivious variants?
  informal: >
    The union-find data structure is essentially optimal for the pointer machine model,
    but what about for modern computing models that account for parallelism, caching,
    and concurrency?

why_it_matters: >
  Union-Find is one of the most important data structures in computer science, used
  in algorithms for minimum spanning trees, connected components, and equivalence
  classes. Understanding its optimal performance in modern computational models
  has practical significance.

