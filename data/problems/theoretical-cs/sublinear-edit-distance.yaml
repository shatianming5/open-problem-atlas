statement:
  canonical: 'What is the best approximation ratio achievable for edit distance (Levenshtein
    distance) between two strings of length n in truly subquadratic time? Can edit
    distance be approximated within a constant factor in near-linear time? Can it
    be estimated in sublinear time with reasonable approximation?

    '
  informal: 'How fast can we approximately compute the edit distance between two strings?
    The exact problem takes quadratic time (and this is conditionally optimal), but
    can we get good approximations much faster, even without reading the entire input?

    '
why_it_matters: 'Edit distance is fundamental to string processing, bioinformatics,
  and natural language processing. The quadratic barrier for exact computation (conditional
  on SETH) motivates the study of fast approximation algorithms. Achieving constant-factor
  approximation in near-linear time would be a major breakthrough.

  '
