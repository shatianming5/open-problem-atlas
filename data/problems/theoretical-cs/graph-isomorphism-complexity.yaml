statement:
  canonical: 'The graph isomorphism problem (GI) asks, given two finite graphs G and
    H, whether there exists a bijection between their vertex sets that preserves adjacency.
    GI is known to be in NP but is neither known to be in P nor known to be NP-complete.
    What is the precise computational complexity of graph isomorphism? Specifically,
    is GI in P, or is it NP-complete, or does it have intermediate complexity?

    '
  informal: 'Given two networks (graphs), is there a way to relabel the nodes of one
    so that it becomes identical to the other? We know this can be checked quickly
    once a relabeling is proposed, but we do not know whether the relabeling can always
    be found quickly. Is this problem fundamentally hard (NP-complete), efficiently
    solvable (in P), or something in between?

    '
why_it_matters: 'Graph isomorphism is one of the few natural problems in NP that is
  neither known to be in P nor known to be NP-complete, making it a prime candidate
  for an NP-intermediate problem (which must exist if P != NP by Ladner''s theorem).
  Its complexity status has implications for group theory, combinatorics, database
  theory, and chemistry (molecule comparison). Babai''s 2015 quasipolynomial-time
  algorithm was a major breakthrough, but the gap between quasipolynomial and polynomial
  time remains.

  '
