partial_results:
- summary: Babai achieved a quasipolynomial-time algorithm running in exp(polylog(n))
    time, dramatically improving the previous best bound of exp(sqrt(n log n)) by
    Luks.
  year: 2015
- summary: 'GI is known to be solvable in polynomial time for many restricted graph
    classes: planar graphs, bounded-degree graphs, bounded-genus graphs, and graphs
    of bounded treewidth.'
  year: 2000
- summary: Schoning showed that if GI is NP-complete, then the polynomial hierarchy
    collapses to Sigma_2^P, providing evidence against GI being NP-complete.
  year: 1988
- summary: GI is in the complexity class SPP (a subclass of PP), shown by Arvind and
    Kurur.
  year: 2006
