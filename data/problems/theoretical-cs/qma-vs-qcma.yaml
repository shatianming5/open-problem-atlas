statement:
  canonical: >
    QMA is the class of problems verifiable by a quantum computer given a quantum proof
    (witness), while QCMA is the same but restricted to classical proofs. Does QMA
    equal QCMA? That is, does allowing quantum proofs give strictly more verification
    power than classical proofs, when the verifier is quantum?
  informal: >
    Do quantum proofs (witnesses) provide extra power compared to classical proofs
    when verified by a quantum computer? Can every quantum proof be replaced by a
    classical one?

why_it_matters: >
  The QMA vs QCMA question probes whether quantum information provides inherent
  advantages for proof verification. It is analogous to fundamental questions about
  the nature of quantum information and has implications for quantum computation
  and quantum verification protocols.

