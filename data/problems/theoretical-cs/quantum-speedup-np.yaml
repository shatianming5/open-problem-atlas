statement:
  canonical: >
    Can quantum computers achieve more than a quadratic speedup (beyond Grover's
    algorithm) for NP-complete problems? Specifically, can any NP-complete problem
    be solved in time 2^(o(n)) on a quantum computer, or does the quadratic speedup
    from Grover's algorithm represent the best possible quantum advantage?
  informal: >
    Grover's search gives a quadratic speedup (from 2^n to 2^(n/2)) for brute-force
    search. Can quantum computers do even better for NP-complete problems, or is
    quadratic the limit?

why_it_matters: >
  This question determines the ultimate limits of quantum computing for the most
  important class of hard problems. If quantum computers cannot do better than
  quadratic speedup for NP, it would rule out "quantum solving" of NP-complete
  problems and clarify the relationship between BQP and NP.

