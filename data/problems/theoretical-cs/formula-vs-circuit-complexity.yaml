statement:
  canonical: >
    A Boolean formula is a circuit where every gate has fan-out one. It is known that
    formulas can be at most quadratically less efficient than circuits. Is there an
    explicit function with polynomial-size circuits but requiring super-polynomial-size
    formulas? Equivalently, is NC^1 strictly contained in P/poly?
  informal: >
    Formulas are a restricted form of circuits where intermediate results cannot be
    reused. Is there a natural function that can be computed by small circuits but
    requires very large formulas?

why_it_matters: >
  Understanding the gap between formula and circuit complexity illuminates the power
  of reusing intermediate computations. An explicit separation would advance our
  understanding of circuit depth vs size tradeoffs and is related to the NC^1 vs NC^2 question.

