statement:
  canonical: >
    The dense model theorem (used by Green, Tao, and Ziegler) states that if a set S
    is dense in a pseudorandom set R, then S has a dense model in the full universe
    that is indistinguishable from S by bounded-complexity tests. Can this theorem be
    extended to stronger computational models, tighter parameters, or broader settings
    while maintaining efficiency?
  informal: >
    Can we find efficient dense approximations to sparse structured sets in more
    general computational settings? This has connections to both additive combinatorics
    and complexity theory.

why_it_matters: >
  The dense model theorem bridges additive combinatorics and computational complexity.
  Extensions could yield new derandomization results, improve our understanding of
  pseudorandomness, and lead to breakthroughs in both areas.

