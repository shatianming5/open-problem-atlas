statement:
  canonical: >
    Huang (2019) proved that the sensitivity s(f) of a Boolean function f satisfies
    s(f) >= sqrt(deg(f)), resolving the sensitivity conjecture. What are the tight
    relationships between sensitivity and other Boolean function complexity measures
    (block sensitivity, certificate complexity, decision tree depth, degree)?
    Specifically, is s(f) = Theta(bs(f))? What is the exact polynomial relationship?
  informal: >
    The sensitivity conjecture was resolved, but the exact polynomial relationships
    between sensitivity and other measures of Boolean function complexity remain
    unknown. What are the tight bounds?

why_it_matters: >
  Boolean function complexity measures (sensitivity, block sensitivity, degree,
  certificate complexity) are fundamental tools in theoretical computer science.
  Determining their exact relationships would complete our understanding of Boolean
  function structure.

