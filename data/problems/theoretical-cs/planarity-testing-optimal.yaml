statement:
  canonical: >
    Planarity testing (determining if a graph can be drawn in the plane without edge
    crossings) can be done in linear time sequentially (Hopcroft-Tarjan, 1974). Can
    planarity testing be done in O(log n) time with a linear number of processors
    (i.e., is it in NC^1 or even AC^1)? What is the optimal complexity for dynamic
    planarity testing under edge insertions and deletions?
  informal: >
    We can test whether a graph is planar in linear time, but can we do it efficiently
    in parallel? And what about when the graph keeps changing?

why_it_matters: >
  Planarity is one of the most natural graph properties, and understanding its
  complexity in parallel and dynamic settings connects to fundamental questions in
  circuit complexity and dynamic data structures.

