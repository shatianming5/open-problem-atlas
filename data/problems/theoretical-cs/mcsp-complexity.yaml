statement:
  canonical: >
    The Minimum Circuit Size Problem (MCSP) asks: given the truth table of a Boolean
    function f and a parameter s, does there exist a Boolean circuit of size at most s
    that computes f? Determine the exact computational complexity of MCSP. In particular,
    is MCSP NP-complete?
  informal: >
    Given a complete description of a Boolean function and a size bound, can we
    efficiently determine whether there exists a small circuit computing that function?
    This problem is known to be in NP but its exact hardness is a mystery.

why_it_matters: >
  MCSP occupies a unique position in complexity theory. It is a natural NP problem whose
  NP-completeness status is unknown, and it has deep connections to one-way functions,
  natural proofs, learning theory, and Kolmogorov complexity. Resolving its complexity
  could have far-reaching consequences for cryptography and circuit complexity.

