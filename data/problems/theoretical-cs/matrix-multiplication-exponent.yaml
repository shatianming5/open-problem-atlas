statement:
  canonical: >
    Define the matrix multiplication exponent omega as the infimum over all
    real numbers c such that two n x n matrices over a field can be multiplied
    using O(n^c) arithmetic operations. It is known that 2 <= omega < 2.372.
    What is the exact value of omega? In particular, does omega = 2?
  informal: >
    Multiplying two n-by-n matrices the standard way takes about n^3 operations.
    Strassen showed in 1969 that it can be done faster. The fundamental question
    is: what is the best possible exponent? Can we multiply matrices in
    essentially n^2 operations (which is optimal since just reading the input
    takes n^2 time), or is the true exponent strictly greater than 2?

why_it_matters: >
  Matrix multiplication is one of the most fundamental operations in computer
  science and mathematics, underlying algorithms for linear algebra, graph
  problems (transitive closure, shortest paths, matching), parsing, and
  scientific computing. The value of omega directly determines the best
  possible running time for all these applications. Determining whether omega = 2
  is one of the most important open problems in algebraic complexity theory.
  Each improvement in upper bounds has had widespread algorithmic consequences.

