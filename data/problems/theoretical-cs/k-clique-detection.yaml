statement:
  canonical: >
    What is the optimal time complexity for detecting whether an n-vertex graph contains
    a clique of size k? For k=3 (triangle detection), the best known algorithm runs
    in O(n^omega) time where omega is the matrix multiplication exponent. For general
    k, can we do significantly better than n^(omega*k/3) time? Is there an algorithm
    running in n^(o(k)) time?
  informal: >
    How fast can we find a clique of size k in a graph? The naive approach takes
    about n^k time. Can we do much better, especially for large k?

why_it_matters: >
  k-clique detection is a fundamental problem in graph algorithms. Its complexity is
  tightly connected to matrix multiplication, fine-grained complexity, and database
  query evaluation. Improvements would have broad algorithmic implications.

