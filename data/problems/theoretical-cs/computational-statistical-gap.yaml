statement:
  canonical: >
    For many statistical estimation problems, the information-theoretically optimal
    sample complexity is much smaller than what any known polynomial-time algorithm
    achieves. Is there a fundamental computational-statistical gap, where polynomial-time
    algorithms provably require more samples than information-theoretic bounds? Can we
    prove such gaps unconditionally, or at least under standard complexity assumptions?
  informal: >
    Some learning problems can be solved with very few examples if we have unlimited
    computation time, but all known efficient algorithms need many more examples.
    Is this gap inherent, or are we missing better algorithms?

why_it_matters: >
  The computational-statistical gap is central to understanding the limits of efficient
  machine learning. It determines whether statistical optimality and computational
  efficiency can be simultaneously achieved, with implications for sparse recovery,
  community detection, and planted problems.

