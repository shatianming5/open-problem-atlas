statement:
  canonical: >
    The Berman-Hartmanis conjecture states that all NP-complete languages are
    polynomial-time isomorphic to each other. That is, for any two NP-complete
    languages A and B, there exists a polynomial-time computable bijection f
    with a polynomial-time computable inverse such that x is in A iff f(x) is in B.
  informal: >
    Are all NP-complete problems essentially the same under efficient renaming?
    Can we always find a bijective efficient translation between any two NP-complete
    problems?

why_it_matters: >
  The isomorphism conjecture, if true, would show that all NP-complete problems share
  a deep structural similarity beyond mere polynomial-time reducibility. Its resolution
  is connected to the existence of one-way functions: Agrawal (2002) showed the
  conjecture is false if and only if P != NP and one-way functions exist.

