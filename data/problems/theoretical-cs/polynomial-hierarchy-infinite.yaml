statement:
  canonical: >
    The polynomial hierarchy (PH) is defined as the union of the classes
    Sigma_k^P for k >= 0, where Sigma_0^P = P, and Sigma_{k+1}^P = NP^{Sigma_k^P}.
    The hierarchy is said to collapse to level k if Sigma_k^P = Sigma_{k+1}^P
    (equivalently, if PH = Sigma_k^P). Is the polynomial hierarchy infinite,
    i.e., is Sigma_k^P strictly contained in Sigma_{k+1}^P for every k >= 0?
  informal: >
    The polynomial hierarchy is a tower of complexity classes built on top of P
    and NP, where each level adds another layer of alternating "guessing."
    Does this tower go on forever with each level being strictly more powerful
    than the one below it, or does it eventually flatten out (collapse) so that
    additional levels of guessing add no more power?

why_it_matters: >
  The polynomial hierarchy is one of the central structures in computational
  complexity theory. Many natural computational problems are complete for
  various levels of PH. If PH collapses, it would have dramatic consequences
  for the landscape of complexity theory — for instance, if PH collapses to P,
  then P = NP. Conversely, proving PH is infinite would separate P from NP
  (since P = NP implies PH = P). The question connects to circuit complexity,
  counting complexity, and the relativization barrier.

