statement:
  canonical: >
    The Learning with Errors (LWE) problem is to distinguish (A, As+e) from (A, u)
    where A is random, s is a secret, e is a noise vector, and u is uniform. What are
    the exact hardness parameters: for given dimension n and noise rate alpha, what is
    the precise computational complexity of LWE? Do the best known algorithms (BKZ,
    dual attacks) achieve optimal complexity?
  informal: >
    How hard is the LWE problem as a function of its parameters? The answer determines
    the security levels of most lattice-based cryptographic schemes.

why_it_matters: >
  LWE is the foundation of most lattice-based cryptography, including NIST post-quantum
  standards. Accurate hardness estimation is crucial for setting security parameters.
  Overestimation wastes performance; underestimation compromises security.

