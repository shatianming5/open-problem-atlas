statement:
  canonical: >
    The Nisan-Wigderson hypothesis posits the existence of a function in E = DTIME(2^O(n))
    that requires circuits of size 2^Omega(n). This is a sufficient condition for
    constructing pseudorandom generators that derandomize BPP. Can this hypothesis be
    proven unconditionally?
  informal: >
    Is there a problem solvable in exponential time that cannot be solved by any
    sub-exponential-size circuit? Proving this would show that randomness can be
    eliminated from efficient computation.

why_it_matters: >
  The Nisan-Wigderson hypothesis is a standard hardness assumption in complexity
  theory. If true, it implies P = BPP and provides explicit pseudorandom generators.
  Proving it unconditionally would be a major breakthrough, essentially resolving the
  derandomization question.

