statement:
  canonical: >
    Let P denote the class of languages decidable by a deterministic Turing machine
    in polynomial time, and NP denote the class of languages decidable by a
    nondeterministic Turing machine in polynomial time (equivalently, languages for
    which a proposed solution can be verified in polynomial time). Does P = NP?
  informal: >
    If a solution to a problem can be quickly verified (in polynomial time), can
    the solution itself always be quickly found (in polynomial time)? In other words,
    is efficient verification of answers just as powerful as efficient computation
    of answers?

why_it_matters: >
  The P vs NP problem is widely regarded as the most important open problem in
  theoretical computer science and one of the seven Millennium Prize Problems.
  A proof that P = NP would revolutionize cryptography (rendering most current
  encryption insecure), optimization, artificial intelligence, and mathematics.
  A proof that P != NP would formally justify the belief that many important
  computational problems are inherently intractable and would place fundamental
  limits on what can be efficiently computed.

