partial_results:
  - summary: "Baker, Gill, and Solovay proved that there exist oracles A and B such that P^A = NP^A and P^B != NP^B, showing that any proof resolving P vs NP must be non-relativizing."
    year: 1975
  - summary: "Razborov and Rudich showed that 'natural proofs' cannot prove P != NP if one-way functions exist, ruling out a large class of proof strategies."
    year: 1997
  - summary: "Aaronson and Wigderson showed that the algebrization barrier further restricts the class of techniques that can resolve P vs NP."
    year: 2009
  - summary: "Ryan Williams proved that NEXP is not in ACC^0, the strongest circuit lower bound known, using a connection between algorithms and circuit lower bounds."
    year: 2011

