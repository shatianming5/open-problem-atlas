statement:
  canonical: 'Fully homomorphic encryption (FHE) allows computation on encrypted data
    without decryption. Current FHE schemes incur significant overhead: ciphertext
    expansion is at least polylogarithmic and computation is orders of magnitude slower
    than plaintext computation. What is the minimum possible overhead for FHE? Can
    we achieve FHE with O(1) ciphertext expansion and computation overhead polynomial
    in the security parameter but independent of the computation depth?

    '
  informal: 'Can we perform computations on encrypted data with only a small (ideally
    constant) overhead compared to computing on unencrypted data?

    '
why_it_matters: 'FHE enables secure computation outsourcing, private database queries,
  and secure machine learning. Reducing the overhead from current impractical levels
  to near-optimal would make these applications practical.

  '
