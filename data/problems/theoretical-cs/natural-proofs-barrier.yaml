statement:
  canonical: 'Razborov and Rudich (1997) showed that any proof of circuit lower bounds that is both "constructive" (can recognize
    hard functions efficiently) and "large" (applies to a large fraction of functions) cannot prove P != NP if one-way functions
    exist. Can we develop proof techniques that circumvent the natural proofs barrier to prove strong circuit lower bounds?

    '
  informal: 'Most known techniques for proving circuit lower bounds have a special structure (they are "natural proofs") that
    provably cannot work to separate P from NP if cryptographic assumptions hold. Can we find fundamentally different proof
    strategies?

    '
why_it_matters: 'The natural proofs barrier, together with relativization and algebrization, represents a fundamental obstacle
  to resolving P vs NP. Understanding how to circumvent this barrier is essential for making progress on the most important
  questions in complexity theory.

  '
