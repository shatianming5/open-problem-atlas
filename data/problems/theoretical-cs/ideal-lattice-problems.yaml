statement:
  canonical: >
    Ideal lattices (lattices with algebraic structure arising from polynomial rings)
    are used in efficient lattice-based cryptography. Are computational problems on
    ideal lattices (such as Ring-LWE, Ring-SIS, and the Shortest Vector Problem on
    ideal lattices) as hard as their counterparts on general lattices? Or does the
    algebraic structure enable faster algorithms?
  informal: >
    Lattice-based cryptography uses structured lattices for efficiency, but does that
    structure make the underlying mathematical problems easier to solve? If so, the
    security of many proposed post-quantum cryptosystems could be compromised.

why_it_matters: >
  Most practical lattice-based cryptographic schemes (including NIST post-quantum
  standards like CRYSTALS-Kyber) rely on structured lattices. If ideal lattice problems
  are significantly easier than general lattice problems, these schemes could be broken.

