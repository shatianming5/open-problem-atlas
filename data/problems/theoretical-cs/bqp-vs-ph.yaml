statement:
  canonical: >
    Is BQP contained in the polynomial hierarchy (PH)? It is known that BQP is
    contained in PP (which is in PSPACE), and there is an oracle relative to which
    BQP is not in PH. But in the unrelativized setting, is BQP inside or outside PH?
  informal: >
    Does quantum computing fit within the classical complexity hierarchy, or does it
    transcend it? If BQP is outside PH, then quantum computers solve problems that
    are fundamentally beyond what classical computation can approximate even with
    alternating quantifiers.

why_it_matters: >
  Placing BQP relative to PH would clarify the computational power of quantum mechanics.
  If BQP is outside PH, quantum computing represents a genuinely new kind of
  computational power not captured by the classical hierarchy.

