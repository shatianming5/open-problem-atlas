statement:
  canonical: >
    For the c-approximate nearest neighbor problem in d-dimensional Euclidean space,
    what is the optimal tradeoff between space, query time, and approximation factor c?
    Specifically, is the n^(1/c^2) query time achieved by locality-sensitive hashing
    optimal for polynomial space data structures? Can we prove matching lower bounds?
  informal: >
    What is the best possible tradeoff for approximate nearest neighbor search? We
    have good algorithms (like LSH) but do not know if they are optimal.

why_it_matters: >
  Approximate nearest neighbor is used throughout machine learning, recommendation
  systems, and search engines. Establishing tight lower bounds would show whether
  existing algorithms like LSH are essentially optimal or can be improved.

