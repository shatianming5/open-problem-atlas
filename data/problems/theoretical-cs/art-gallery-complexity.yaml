statement:
  canonical: >
    The art gallery problem asks for the minimum number of guards needed to see every
    point of a simple polygon. While Chvátal's theorem gives an upper bound of
    floor(n/3) guards for an n-vertex polygon, the computational problem of finding
    the minimum number of guards is known to be NP-hard. What is the exact complexity?
    Is the problem in NP? Is it in the existential theory of the reals (ETR-complete)?
  informal: >
    How hard is it to compute the minimum number of guards needed to watch every point
    in an art gallery (polygon)? We know it is NP-hard, but is it even in NP?

why_it_matters: >
  The art gallery problem is a classic problem in computational geometry with
  applications in surveillance, sensor placement, and robotics. Its exact
  computational complexity is surprisingly subtle and connects to the existential
  theory of the reals.

