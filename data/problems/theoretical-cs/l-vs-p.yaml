statement:
  canonical: >
    Let L denote the class of languages decidable in deterministic logarithmic space,
    and P denote the class decidable in deterministic polynomial time. Does L = P?
  informal: >
    Can every problem solvable in polynomial time also be solved using only logarithmic
    memory? This asks whether time-efficient computation can always be made space-efficient.

why_it_matters: >
  The L vs P question concerns the fundamental relationship between time and space in
  computation. It is known that L is contained in P (by simulation), but separation
  has not been proven. Proving L != P would be a breakthrough in establishing
  time-space tradeoffs.

