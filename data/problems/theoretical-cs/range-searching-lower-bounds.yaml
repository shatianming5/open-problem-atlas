statement:
  canonical: >
    In range searching, we preprocess n points in R^d to answer queries asking how
    many points lie inside a given geometric range (halfspace, simplex, box, etc.).
    What are tight lower bounds for the space-query time tradeoff? For simplex range
    searching in d >= 3 dimensions, is the known O(n/sqrt(m)) query time with O(m)
    space (for m >= n) tight? Can we prove matching lower bounds?
  informal: >
    How efficiently can we count points inside geometric shapes after preprocessing?
    We have good algorithms, but proving they cannot be improved requires lower
    bounds that are largely missing.

why_it_matters: >
  Range searching is fundamental to computational geometry, databases, and geographic
  information systems. Establishing tight lower bounds would determine whether current
  algorithms are optimal or can be improved.

