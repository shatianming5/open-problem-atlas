statement:
  canonical: >
    The matroid secretary conjecture (Babaioff, Immorlica, Kleinberg, 2007) states
    that for any matroid, there exists an O(1)-competitive online algorithm for the
    secretary problem defined over that matroid. That is, elements arrive in random
    order with adversarial weights, and the algorithm must select an independent set
    of maximum weight, achieving a constant fraction of the offline optimum. Is this true?
  informal: >
    In the classical secretary problem, the best candidate can be found with probability
    1/e. For generalizations involving complex combinatorial constraints (matroids),
    can we still achieve a constant-factor approximation?

why_it_matters: >
  The matroid secretary conjecture connects online algorithm design with matroid theory
  and has applications in mechanism design, auction theory, and combinatorial
  optimization. Despite much progress, a constant-competitive algorithm for general
  matroids remains elusive.

