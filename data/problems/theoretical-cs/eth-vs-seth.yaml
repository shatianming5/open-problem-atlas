statement:
  canonical: >
    The Exponential Time Hypothesis (ETH) states that 3-SAT cannot be solved in
    2^o(n) time. The Strong Exponential Time Hypothesis (SETH) states that for every
    epsilon > 0, there exists k such that k-SAT cannot be solved in O(2^((1-epsilon)n))
    time. Does ETH imply SETH, or are they independent? More broadly, what is the
    relationship between these hypotheses and their fine-grained consequences?
  informal: >
    Are the two main hardness assumptions in fine-grained complexity theory (ETH and
    SETH) equivalent, or does the stronger one (SETH) really add power? What are the
    exact consequences of each assumption?

why_it_matters: >
  ETH and SETH are the foundational hypotheses of fine-grained complexity theory.
  They imply tight conditional lower bounds for many natural problems. Understanding
  whether SETH is strictly stronger than ETH would clarify the landscape of
  fine-grained complexity.

