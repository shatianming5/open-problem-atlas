statement:
  canonical: >
    Håstad, Impagliazzo, Levin, and Luby (1999) proved that pseudorandom generators
    (PRGs) can be constructed from any one-way function. However, the construction
    incurs a significant overhead in seed length. Can we construct PRGs from one-way
    functions with optimal (linear or near-linear) seed length and polynomial security
    loss?
  informal: >
    We know how to build pseudorandom generators from any one-way function, but the
    known construction is very inefficient. Can we make it practical?

why_it_matters: >
  The HILL construction is one of the most fundamental results in cryptography but
  the polynomial blowup in seed length limits its practical applicability. An optimal
  construction would tighten the foundations of pseudorandomness.

