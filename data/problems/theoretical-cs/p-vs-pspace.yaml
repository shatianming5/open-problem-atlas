statement:
  canonical: >
    Let P denote the class of languages decidable by a deterministic Turing machine
    in polynomial time, and let PSPACE denote the class of languages decidable by a
    deterministic Turing machine using polynomial space. It is known that P is contained
    in PSPACE. Does P = PSPACE? Equivalently, can every problem solvable with
    polynomial space also be solved in polynomial time?
  informal: >
    We know that problems solvable quickly (polynomial time) can also be solved
    with limited memory (polynomial space). But is the reverse true? Can every
    problem that requires only a reasonable amount of memory also be solved
    quickly? Most researchers believe the answer is no, but this remains unproven.

why_it_matters: >
  Resolving whether P = PSPACE would clarify the relationship between time and
  space as computational resources. PSPACE includes problems from game theory
  (determining optimal strategies in two-player games like generalized chess),
  formal verification, and planning. A separation would prove that there are
  problems solvable with limited memory that inherently require exponential time,
  establishing a fundamental gap between these two resources. Since NP is
  contained in PSPACE, proving P != PSPACE would immediately imply P != NP.

