partial_results:
- summary: Khachiyan's ellipsoid method (1979) and Karmarkar's interior point method
    (1984) gave weakly polynomial algorithms for LP, resolving the question of polynomial-time
    solvability but not strong polynomiality.
  year: 1984
- summary: Tardos showed that the number of arithmetic operations can be bounded by
    a polynomial in n and m for LP with integer data, but each operation may involve
    large numbers.
  year: 1986
- summary: 'Strongly polynomial algorithms exist for special cases: network flow,
    minimum cost flow (via combinatorial algorithms).'
  year: 1972
- summary: Dadush and Huiberts gave a condition-number-free algorithm using O(n^{2.5}
    log(n/delta)) pivots with high probability, but it is not strongly polynomial.
  year: 2020
