statement:
  canonical: 'A linear program (LP) is the problem of optimizing a linear objective
    function subject to linear inequality and equality constraints: minimize c^T x
    subject to Ax <= b, x >= 0, where A is an m x n matrix. A strongly polynomial
    algorithm is one whose running time is bounded by a polynomial in n and m alone,
    independent of the bit-lengths of the coefficients in A, b, and c. Known polynomial-time
    algorithms for LP (ellipsoid method, interior-point methods) are weakly polynomial
    — their running time depends on the bit-length of the input. Does there exist
    a strongly polynomial-time algorithm for linear programming?

    '
  informal: 'Linear programming is the problem of finding the best outcome in a mathematical
    model with linear constraints. We know how to solve it efficiently, but all known
    methods have running times that depend on the sizes of the numbers in the input,
    not just on the number of variables and constraints. Can we find a method whose
    speed depends only on the number of variables and constraints?

    '
why_it_matters: 'Linear programming is arguably the most important optimization problem,
  with applications throughout operations research, economics, engineering, and computer
  science. While weakly polynomial algorithms exist (Khachiyan''s ellipsoid method,
  Karmarkar''s interior point method), the existence of a strongly polynomial algorithm
  remains one of Smale''s 18 problems for the 21st century. It is fundamental to understanding
  the complexity of combinatorial optimization and the boundary between discrete and
  continuous computation.

  '
