statement:
  canonical: >
    A sorting network is an oblivious comparison-based sorting algorithm with a fixed
    comparison pattern. The AKS network (Ajtai, Komlós, Szemerédi, 1983) achieves
    O(log n) depth, which is asymptotically optimal. However, the constant factor is
    enormous. What is the minimum depth sorting network for practical values of n? Can
    the constant in O(log n) be made practical?
  informal: >
    We know sorting networks of depth O(log n) exist, but the known constructions have
    huge hidden constants. Can we build sorting networks with both optimal depth and
    practical constants?

why_it_matters: >
  Sorting networks are important for parallel sorting and hardware implementations.
  The gap between the theoretical O(log n) optimum and practical constructions (like
  bitonic sort with O(log^2 n) depth but small constants) remains significant.

