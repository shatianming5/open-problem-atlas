statement:
  canonical: >
    In the streaming model, a sequence of items from a universe of size m arrives one
    at a time. The k-th frequency moment F_k = sum_i (f_i)^k where f_i is the frequency
    of item i. For k > 2, what is the exact space complexity of (1+epsilon)-approximating
    F_k in a single pass? Are the known upper and lower bounds tight?
  informal: >
    How much memory is needed to approximately compute statistical properties (frequency
    moments) of a data stream in one pass? For higher moments (k>2), the exact answer
    is still not fully understood.

why_it_matters: >
  Streaming algorithms are fundamental for processing massive data sets. Frequency
  moment estimation is the canonical problem in streaming, and determining its
  exact space complexity would complete our understanding of the streaming model's
  power and limitations.

