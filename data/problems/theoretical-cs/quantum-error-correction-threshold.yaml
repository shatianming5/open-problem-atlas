statement:
  canonical: >
    The threshold theorem for quantum computation states that if the error rate per
    gate is below a threshold p_th, arbitrary long quantum computations can be
    performed with polynomial overhead. What is the exact value of p_th for the most
    general noise model? Current estimates range from 10^-4 to 10^-2 depending on the
    model and error correction code.
  informal: >
    How noisy can quantum gates be while still allowing reliable quantum computation
    through error correction? We know a threshold exists, but its exact value depends
    on details that are not fully understood.

why_it_matters: >
  The error correction threshold determines the engineering requirements for building
  a scalable quantum computer. A higher threshold would make quantum computing more
  practical; a lower one would demand more stringent hardware.

