statement:
  canonical: 'Can public-key encryption be constructed from one-way functions alone?
    One-way functions are known to imply private-key cryptography (pseudorandom generators,
    symmetric encryption, digital signatures), but it is unknown whether they suffice
    for public-key encryption or key exchange.

    '
  informal: 'If hard-to-invert functions exist, does that automatically mean we can
    do public-key cryptography? We know hard-to-invert functions give us symmetric
    crypto, but it is open whether they give us asymmetric/public-key crypto.

    '
why_it_matters: 'This is one of the most fundamental questions in cryptography. A
  positive answer would unify the foundations of cryptography under one-way functions.
  A negative answer (a black-box separation exists) would mean public-key crypto requires
  fundamentally different assumptions.

  '
