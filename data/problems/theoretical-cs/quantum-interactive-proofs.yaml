statement:
  canonical: >
    While QIP = PSPACE is known (Jain, Ji, Upadhyay, Watrous, 2011), the structure
    of quantum multi-prover interactive proofs remains open. What is the complexity
    of MIP* (multi-prover interactive proofs with entangled provers)? Following the
    resolution MIP* = RE (Ji et al., 2020), what are the implications for
    intermediate models, and what is the structure of QIP(k) for small k?
  informal: >
    When provers share quantum entanglement, interactive proof systems become
    incredibly powerful (equivalent to all computably enumerable languages). What
    happens for restricted variants of quantum interactive proofs?

why_it_matters: >
  The MIP* = RE result (resolving Connes' embedding conjecture) was one of the most
  surprising results in theoretical computer science. Understanding the fine structure
  of quantum interactive proofs continues to reveal deep connections between quantum
  information, operator algebras, and computability.

