statement:
  canonical: >
    In proper PAC learning, the hypothesis must come from the same concept class as
    the target. For which concept classes is proper learning strictly harder than
    improper learning? Specifically, are there concept classes that are improperly
    learnable in polynomial time but for which proper learning requires superpolynomial
    time (under standard complexity assumptions)?
  informal: >
    When learning, does it matter if the hypothesis we output has the same form as
    the target function? Is it sometimes fundamentally easier to learn using a
    different representation?

why_it_matters: >
  Understanding the gap between proper and improper learning illuminates the role
  of representation in learning. It connects to practical questions about model
  selection and the power of different hypothesis classes.

