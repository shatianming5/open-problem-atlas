partial_results:
- summary: Savitch (1970) proved NL is contained in DSPACE(log^2 n), giving a quadratic
    blowup from nondeterministic to deterministic space.
  year: 1970
- summary: Immerman and Szelepcsényi independently proved NL = coNL (1988), showing
    nondeterministic logspace is closed under complement.
  year: 1988
- summary: Reingold (2008) proved undirected st-connectivity is in L, solving a major
    special case.
  year: 2008
