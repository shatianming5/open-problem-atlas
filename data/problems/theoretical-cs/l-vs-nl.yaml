statement:
  canonical: 'Let L denote the class of languages decidable by a deterministic Turing
    machine using O(log n) space, and NL denote the class decidable by a nondeterministic
    Turing machine using O(log n) space. Does L = NL?

    '
  informal: 'Can every problem solvable with a small amount of nondeterministic memory
    also be solved with the same amount of deterministic memory? The canonical NL-complete
    problem is directed graph reachability (st-connectivity).

    '
why_it_matters: 'The L vs NL question is the space-bounded analogue of P vs NP. Resolving
  it would clarify the power of nondeterminism in space-bounded computation. Savitch''s
  theorem shows NL is contained in L^2 (deterministic O(log^2 n) space), but closing
  the gap to L remains open.

  '
