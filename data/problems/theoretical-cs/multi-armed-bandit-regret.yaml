statement:
  canonical: >
    In the multi-armed bandit problem, a learner selects one of K arms at each round
    and observes a reward. For structured bandits (linear, contextual, combinatorial),
    what are the exact minimax regret bounds? For contextual bandits with large or
    infinite policy classes, what is the optimal regret as a function of the complexity
    of the policy class?
  informal: >
    When making sequential decisions under uncertainty with limited feedback, what is
    the best possible performance for complex, structured settings? Many important
    variants of the bandit problem still lack tight bounds.

why_it_matters: >
  Multi-armed bandits are fundamental to sequential decision-making with applications
  in clinical trials, recommendation systems, and online advertising. Tight regret
  bounds guide practical algorithm design.

