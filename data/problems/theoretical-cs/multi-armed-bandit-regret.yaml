partial_results:
  - summary: "UCB achieves O(sqrt(KT log T)) regret for K-armed bandits, nearly matching the Omega(sqrt(KT)) lower bound."
    year: 2002
  - summary: "For linear bandits in d dimensions, the optimal regret is Theta(d*sqrt(T)) but structural assumptions affect constants."
    year: 2011
  - summary: "For contextual bandits with general policy classes, tight bounds in terms of VC/Natarajan dimension remain open."
    year: 2020

