partial_results:
  - summary: "Bennett, Bernstein, Brassard, and Vazirani showed that relative to a random oracle, BQP does not contain NP, providing evidence that quantum computers cannot solve NP-complete problems."
    year: 1997
  - summary: "Grover's algorithm gives a quadratic speedup for unstructured search, but this does not place NP inside BQP."
    year: 1996
  - summary: "Aaronson showed that relative to an oracle, BQP is not contained in the polynomial hierarchy, demonstrating that BQP has problems potentially not in PH (and hence not in NP)."
    year: 2010
  - summary: "Raz and Tal proved an oracle separation between BQP and PH, showing that relative to an oracle, BQP is not contained in PH."
    year: 2019
  - summary: "It is known that BQP is contained in AWPP (which is contained in PP), and BQP contains BPP, but the relationship to NP remains unresolved."
    year: 2003

