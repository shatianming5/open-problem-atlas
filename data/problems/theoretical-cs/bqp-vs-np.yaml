statement:
  canonical: >
    Let BQP (Bounded-error Quantum Polynomial time) denote the class of decision
    problems solvable by a quantum computer in polynomial time with error
    probability at most 1/3. Let NP denote the class of decision problems for
    which a "yes" answer can be verified in polynomial time given a suitable
    certificate. What is the relationship between BQP and NP? Specifically,
    is NP contained in BQP, is BQP contained in NP, or are they incomparable?
  informal: >
    Quantum computers can solve some problems faster than classical computers
    (like factoring integers). But can quantum computers efficiently solve
    all problems whose solutions can be quickly verified? In other words,
    can quantum computers crack NP-complete problems like the traveling
    salesman problem? Most experts believe quantum computers cannot solve
    all NP problems efficiently, but this has not been proven.

why_it_matters: >
  Understanding the relationship between BQP and NP is central to determining
  the power and limitations of quantum computation. If NP were contained in BQP,
  quantum computers would be able to efficiently solve NP-complete problems,
  with revolutionary consequences for optimization, cryptography, and artificial
  intelligence. If BQP is not contained in NP, it would mean quantum computers
  can solve problems that have no efficiently verifiable proofs, which would be
  equally surprising. The question also impacts the security of post-quantum
  cryptography and the practical motivation for building quantum computers.

