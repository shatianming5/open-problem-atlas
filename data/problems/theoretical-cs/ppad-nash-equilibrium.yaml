statement:
  canonical: >
    While computing a Nash equilibrium in general games is PPAD-complete, many natural
    variants remain unresolved. What is the complexity of computing Nash equilibria in
    succinctly represented games, polymatrix games, or games with special structure?
    Is finding an approximate Nash equilibrium with inverse polynomial precision in
    PPAD-hard for all game representations?
  informal: >
    We know computing exact Nash equilibria is hard (PPAD-complete), but for many
    structured or approximate versions the complexity is still unknown. What is the
    precise boundary of hardness for equilibrium computation?

why_it_matters: >
  Nash equilibrium is the central solution concept in game theory. Understanding the
  precise complexity of computing equilibria in various settings has implications for
  economics, mechanism design, and multi-agent systems.

