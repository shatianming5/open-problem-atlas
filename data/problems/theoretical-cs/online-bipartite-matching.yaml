statement:
  canonical: 'In the online bipartite matching problem, vertices on one side arrive
    online and must be irrevocably matched to previously arrived vertices. Karp, Vazirani,
    and Vazirani (1990) achieved a competitive ratio of 1 - 1/e for the unweighted
    case. For the general weighted (edge-weighted) online bipartite matching problem,
    what is the optimal competitive ratio? Can 1 - 1/e be achieved in the weighted
    setting?

    '
  informal: 'When items arrive one at a time and must be immediately and permanently
    assigned to available slots, how close to optimal can we get without knowing the
    future? The unweighted case is solved but the weighted version remains open.

    '
why_it_matters: 'Online matching is central to the theory of online algorithms and
  has direct applications to ad auctions, resource allocation, and kidney exchange.
  Determining the optimal competitive ratio for weighted variants would advance both
  theory and practice.

  '
