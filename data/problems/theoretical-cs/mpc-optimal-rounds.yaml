statement:
  canonical: >
    What is the minimum number of rounds required for secure multi-party computation
    (MPC) of general functions in various settings (honest majority, dishonest majority,
    computational vs information-theoretic security)? Can all functions be securely
    computed in a constant number of rounds with optimal communication complexity?
  informal: >
    When multiple parties want to jointly compute a function of their private inputs
    without revealing anything else, how many rounds of communication are needed?
    What is the minimum possible?

why_it_matters: >
  MPC is fundamental to privacy-preserving computation, secure voting, auctions,
  and machine learning on private data. Round complexity directly impacts latency
  in practical protocols.

