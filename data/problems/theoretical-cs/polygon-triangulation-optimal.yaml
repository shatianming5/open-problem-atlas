statement:
  canonical: >
    Chazelle (1991) gave a linear-time algorithm for triangulating a simple polygon,
    but the algorithm is extremely complex and has never been implemented. Is there a
    simple, practical linear-time algorithm for simple polygon triangulation? Can the
    linear-time result be extended to polygons with holes efficiently?
  informal: >
    We know how to divide a simple polygon into triangles in optimal linear time, but
    the known algorithm is so complicated that nobody has ever implemented it. Can we
    find a simpler algorithm that is equally fast?

why_it_matters: >
  Polygon triangulation is a fundamental primitive in computational geometry, computer
  graphics, and mesh generation. A practical linear-time algorithm would be both
  theoretically satisfying and practically useful.

