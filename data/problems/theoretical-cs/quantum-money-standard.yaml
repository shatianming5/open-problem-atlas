statement:
  canonical: >
    Can we construct a public-key quantum money scheme -- quantum states that can be
    publicly verified but not copied -- from standard cryptographic assumptions (e.g.,
    LWE)? Wiesner's original private-key scheme is information-theoretically secure,
    but public-key quantum money from standard assumptions remains elusive.
  informal: >
    Can we create digital money that is physically impossible to counterfeit, where
    anyone can verify a bill but no one can copy it, based on well-understood
    mathematical problems?

why_it_matters: >
  Quantum money would be the ultimate uncounterfeitable currency, leveraging the
  no-cloning theorem. A public-key scheme from standard assumptions would be a
  breakthrough at the intersection of quantum computing and cryptography.

