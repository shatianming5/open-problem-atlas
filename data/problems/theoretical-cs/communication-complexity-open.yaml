  - summary: "Chattopadhyay, Mande, and Sherif (2019) disproved the approximate version (log-approximate-rank conjecture), but the exact version remains open."
    year: 2019
  - summary: "Sudakov and Tomon (2023) proved a nearly tight bound of O(sqrt(rank)), improving previous results."
