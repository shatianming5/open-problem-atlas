statement:
  canonical: >
    The log-rank conjecture (Lovász and Saks, 1988) states that the deterministic
    communication complexity of a Boolean function f(x,y) is at most polylogarithmic
    in the rank of its communication matrix M_f (where M_f[x,y] = f(x,y) over the
    reals). Is this conjecture true?
  informal: >
    When two parties need to compute a joint function of their inputs by exchanging
    messages, is the amount of communication needed always bounded by a polynomial
    in the logarithm of the rank of the function's truth table viewed as a matrix?

why_it_matters: >
  The log-rank conjecture is one of the most important open problems in communication
  complexity. It connects algebraic properties (matrix rank) to combinatorial ones
  (communication cost) and has implications for circuit complexity, data structures,
  and learning theory.

