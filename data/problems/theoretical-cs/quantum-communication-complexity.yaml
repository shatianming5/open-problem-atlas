statement:
  canonical: >
    What is the largest possible separation between quantum and classical communication
    complexity for total Boolean functions? For partial functions, exponential separations
    are known (Raz 1999). For total functions, can quantum communication be exponentially
    smaller than classical communication, or is the advantage at most polynomial?
  informal: >
    How much can quantum communication reduce the amount of information two parties
    need to exchange to compute a joint function? For all functions (not just
    specially constructed ones), is the quantum advantage limited?

why_it_matters: >
  Understanding the power of quantum communication has implications for quantum
  networks, distributed quantum computing, and the foundations of quantum information.
  It also connects to important questions in circuit complexity and data structures.

