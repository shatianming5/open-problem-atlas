statement:
  canonical: >
    Can the All-Pairs Shortest Paths (APSP) problem on a graph with n vertices and
    arbitrary edge weights be solved in O(n^(3-epsilon)) time for some constant
    epsilon > 0? The best known algorithm runs in O(n^3 / 2^(Omega(sqrt(log n))))
    time, barely improving on the cubic bound.
  informal: >
    Can we find shortest paths between all pairs of vertices in a weighted graph
    significantly faster than the naive cubic-time algorithm?

why_it_matters: >
  APSP is one of the most fundamental graph problems and serves as a central
  problem in fine-grained complexity theory. Many other problems have been shown
  to be equivalent in complexity to APSP, so a truly subcubic algorithm would have
  far-reaching consequences.

