statement:
  canonical: >
    In agnostic learning, the target function may not belong to the hypothesis class.
    The learner seeks the best approximation within the class. What are the fundamental
    computational limits of agnostic learning? For which concept classes (halfspaces,
    decision trees, DNF) is agnostic learning computationally hard, and what are the
    best achievable approximation guarantees in polynomial time?
  informal: >
    When learning without assuming the data fits a model perfectly, how well can we
    learn? For basic concept classes like linear classifiers, even approximately finding
    the best-fitting classifier is open.

why_it_matters: >
  Agnostic learning is the realistic learning setting since real data rarely fits
  any model perfectly. Understanding its computational limits is essential for
  understanding what machine learning can and cannot achieve efficiently.

