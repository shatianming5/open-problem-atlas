statement:
  canonical: 'Can polynomial-size DNF formulas (disjunctive normal form) be PAC learned
    in polynomial time under the uniform distribution? DNF formulas are a fundamental
    Boolean function class, and their learnability has been open since Valiant introduced
    the PAC model in 1984.

    '
  informal: 'Can we efficiently learn any Boolean function expressible as a short
    OR-of-ANDs formula from random examples? This is one of the most basic open problems
    in computational learning theory.

    '
why_it_matters: 'DNF learnability is the most prominent open problem in PAC learning
  theory. DNF formulas represent a natural and important concept class, and their
  learnability connects to fundamental questions about the power of learning algorithms.

  '
