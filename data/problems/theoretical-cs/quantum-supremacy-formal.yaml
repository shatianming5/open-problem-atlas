statement:
  canonical: >
    Can we formally prove that quantum computers can solve some problem asymptotically
    faster than any classical computer (i.e., prove an unconditional separation between
    BQP and BPP)? Current quantum speedup results (e.g., Shor's algorithm) rely on
    unproven hardness assumptions about classical computation.
  informal: >
    Can we mathematically prove, without any unproven assumptions, that quantum
    computers are genuinely faster than classical computers for some problem?

why_it_matters: >
  While quantum computers appear to be faster for certain problems (factoring, simulation),
  all known proofs rely on unproven assumptions about classical hardness. A formal
  unconditional proof of quantum advantage would resolve one of the deepest questions
  in quantum computing.

