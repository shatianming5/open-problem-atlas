statement:
  canonical: >
    Cache-oblivious algorithms operate efficiently in the memory hierarchy without
    knowing cache parameters (block size B, cache size M). For which problems can
    cache-oblivious algorithms match the performance of cache-aware algorithms? Is
    there a separation: a problem where cache-aware algorithms are provably more
    efficient than any cache-oblivious algorithm?
  informal: >
    Algorithms that automatically adapt to the memory hierarchy without knowing its
    parameters can often match algorithms that are specifically designed for the
    cache. Is this always possible, or are there problems where knowledge of cache
    parameters provably helps?

why_it_matters: >
  Cache-oblivious algorithms are practically important because they automatically
  perform well across diverse hardware. Understanding whether they can always match
  cache-aware algorithms would determine the limits of hardware-independent algorithm
  design.

