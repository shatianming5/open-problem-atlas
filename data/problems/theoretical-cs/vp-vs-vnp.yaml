statement:
  canonical: >
    Let VP denote the class of polynomial families computable by arithmetic circuits of
    polynomial size, and VNP denote Valiant's class of polynomial families that are
    definable as exponential sums over VP families (analogous to NP). Does VP = VNP?
  informal: >
    Is the permanent polynomial as easy to compute as the determinant? This is the
    algebraic analogue of P vs NP, asking whether every polynomial with a short
    description also has a short computation.

why_it_matters: >
  VP vs VNP is the central problem of algebraic complexity theory, introduced by
  Valiant in 1979. The permanent vs determinant question has deep connections to
  combinatorics, representation theory, and algebraic geometry. Resolving VP != VNP
  is considered a necessary step toward P != NP.

