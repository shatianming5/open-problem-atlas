statement:
  canonical: 'Can the maximum flow in a network with m edges and n vertices be computed
    in O(m) time (linear in the number of edges)? Chen et al. (2022) achieved an almost-linear
    time algorithm running in m^(1+o(1)) time. Can the o(1) term in the exponent be
    eliminated entirely?

    '
  informal: 'Can we compute the maximum flow through a network in time proportional
    to just reading the input? Recent breakthroughs got very close, but truly linear
    time remains elusive.

    '
why_it_matters: 'Maximum flow is a fundamental optimization problem with applications
  in transportation, network design, bipartite matching, and image segmentation. Achieving
  truly linear time would be optimal and would represent the culmination of 70 years
  of research.

  '
