statement:
  canonical: >
    Let X be a smooth projective variety over a finitely generated field k, and let l be a
    prime different from the characteristic of k. The cycle class map from algebraic cycles
    modulo homological equivalence tensored with Q_l to the l-adic cohomology group
    H^{2i}(X_{\bar{k}}, Q_l(i))^{Gal(\bar{k}/k)} is surjective. Equivalently, every
    Galois-invariant cohomology class in the appropriate degree comes from an algebraic cycle.
  informal: >
    For varieties over finite fields or number fields, every cohomology class that is fixed
    by the Galois symmetry group actually comes from a geometric object (an algebraic cycle).

why_it_matters: >
  The Tate conjecture (1965) is one of the central conjectures in arithmetic geometry, parallel
  to the Hodge conjecture in complex geometry. It has profound implications for the theory of
  motives, for the Birch-Swinnerton-Dyer conjecture, and for the Langlands program. It remains
  open in general, though proved in many important special cases.

