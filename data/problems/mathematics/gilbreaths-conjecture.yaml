statement:
  canonical: >
    Let p_1 = 2, p_2 = 3, p_3 = 5, ... be the sequence of prime numbers. Define the sequence
    of iterated absolute differences: d_1(n) = |p_{n+1} - p_n| and d_k(n) = |d_{k-1}(n+1) - d_{k-1}(n)|
    for k >= 2. Then d_k(1) = 1 for all k >= 1.
  informal: >
    Write down the prime numbers. Take the absolute differences of consecutive terms. Repeat
    this process. The conjecture says the first element of each resulting row of differences
    is always 1.

why_it_matters: >
  Gilbreath's conjecture is a striking regularity in the sequence of primes that has been
  verified extensively but resists all proof attempts. It encodes deep structural information
  about the distribution of prime gaps.

