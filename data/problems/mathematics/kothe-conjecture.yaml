statement:
  canonical: >
    If a ring R has no nonzero two-sided nil ideal, then R has no nonzero one-sided nil ideal.
    Equivalently, the sum of two left nil ideals of any ring is again a nil ideal. This can also
    be stated as: the upper nil radical of any ring contains every left nil ideal.
  informal: >
    In a ring (an algebraic structure with addition and multiplication), a nil ideal is one where
    every element, when raised to some power, gives zero. The conjecture asks: if there is no
    "global" nil ideal, can there still be a "one-sided" nil ideal?

why_it_matters: >
  The Kothe conjecture, posed in 1930, is one of the oldest and most important open problems
  in ring theory. It addresses the fundamental structure of nil ideals and radicals in
  noncommutative rings. Its resolution would clarify the relationship between one-sided and
  two-sided nil ideals, a basic question in abstract algebra.

