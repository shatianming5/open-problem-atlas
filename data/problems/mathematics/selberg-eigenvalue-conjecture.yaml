statement:
  canonical: >
    For any congruence subgroup Gamma of SL(2, Z), every nonzero eigenvalue lambda of the
    Laplacian on the modular surface Gamma\H satisfies lambda >= 1/4, where H is the upper
    half-plane. Equivalently, for Maass cusp forms on congruence subgroups, the spectral
    parameter satisfies |Re(s) - 1/2| = 0 (i.e., s lies on the critical line Re(s) = 1/2).
  informal: >
    The Laplacian on modular surfaces coming from congruence subgroups should have no
    "small eigenvalues" — all non-trivial eigenvalues should be at least 1/4. This is
    an analogue of the Ramanujan conjecture for non-holomorphic modular forms.

why_it_matters: >
  The Selberg eigenvalue conjecture (1965) is a cornerstone of the theory of automorphic forms
  and spectral geometry. It is equivalent to the Ramanujan conjecture for GL(2) Maass forms.
  It has applications to the distribution of primes in arithmetic progressions, quantum chaos,
  and expander graph constructions. Selberg proved lambda >= 3/16; the best known bound is 975/4096.

