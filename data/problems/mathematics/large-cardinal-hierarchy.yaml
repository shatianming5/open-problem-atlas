statement:
  canonical: 'Construct an inner model (a canonical model of set theory analogous to Godel''s L) for a supercompact cardinal.
    More broadly, develop inner model theory for the large cardinal hierarchy at and beyond the level of supercompact cardinals,
    establishing the consistency strength of these axioms relative to each other and to combinatorial set-theoretic principles.

    '
  informal: 'Large cardinal axioms form a linear hierarchy of increasingly strong assumptions about the universe of sets.
    Inner model theory provides canonical models that "tame" these axioms. Building inner models has succeeded up to Woodin
    cardinals, but extending the theory to supercompact cardinals and beyond remains a major open challenge.

    '
why_it_matters: 'The inner model program is one of the central projects in set theory, aiming to understand the consistency
  strength of large cardinal axioms. Inner models have been constructed up to the level of Woodin cardinals (by Steel, Mitchell,
  and others), but extending beyond to supercompact and stronger cardinals is considered one of the hardest and most important
  open problems in mathematical logic. Success would illuminate the structure of the set- theoretic universe and the relationship
  between different foundational axioms.

  '
