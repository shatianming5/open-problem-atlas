statement:
  canonical: >
    For a torsion-free discrete group G, the reduced group C*-algebra C*_r(G) contains no
    idempotent elements other than 0 and 1. Equivalently, the Kadison-Kaplansky conjecture
    asserts that for torsion-free groups, the K_0 group of C*_r(G) has no non-trivial
    projections.
  informal: >
    If a discrete group has no elements of finite order (other than the identity), then a
    certain operator algebra built from the group should have no non-trivial projections.

why_it_matters: >
  The Kadison-Kaplansky conjecture is a fundamental problem in operator algebras and noncommutative
  geometry. It is implied by the Baum-Connes conjecture, which is one of the most important
  conjectures connecting topology, geometry, and analysis. Progress on this conjecture has driven
  the development of K-theory for operator algebras and index theory.

