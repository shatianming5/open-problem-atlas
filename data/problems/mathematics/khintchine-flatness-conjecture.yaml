statement:
  canonical: >
    Determine the optimal flatness constant f(n): the smallest constant such that every
    convex body K in R^n that contains no integer lattice point in its interior has width
    at most f(n) in some lattice direction. The flatness theorem (Khintchine, 1948) guarantees
    f(n) is finite. The conjecture is that f(n) = O(n^{2/3}). Current best bounds give
    f(n) = O(n^{3/2}) (Banaszczyk) and f(n) = Omega(n^{1/3}) (Kannan-Lovász).
  informal: >
    How "thin" must a convex body be in some direction if it avoids all integer points?
    The precise growth rate of the flatness constant with dimension is unknown.

why_it_matters: >
  The flatness theorem connects the geometry of numbers, integer programming, and Diophantine
  approximation. It is a key tool in Lenstra's algorithm for integer programming in fixed
  dimension. Determining the optimal constant has implications for algorithmic efficiency and
  for understanding the interaction between convex bodies and lattices.

