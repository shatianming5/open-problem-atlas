statement:
  canonical: >
    For every positive integer k, there are only finitely many pairs of perfect powers
    (a^m, b^n) with a, b, m, n >= 2 and |a^m - b^n| = k. Equivalently, the gaps between
    consecutive perfect powers tend to infinity.
  informal: >
    Perfect powers are numbers like 4, 8, 9, 16, 25, 27, ... (squares, cubes, etc.). Pillai's
    conjecture says that as you go further out, consecutive perfect powers get increasingly
    far apart, so any fixed gap k occurs only finitely many times.

why_it_matters: >
  Pillai's conjecture generalizes Catalan's conjecture (now Mihailescu's theorem) and is a
  central open problem in the theory of exponential Diophantine equations. It is implied by
  the abc conjecture and connects to deep questions about integral points on curves.

