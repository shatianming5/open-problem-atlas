statement:
  canonical: >
    For every epsilon > 0, there exists an effectively computable constant K(epsilon) such
    that for all coprime positive integers a, b, c with a + b = c, we have
    c < K(epsilon) * rad(abc)^{1+epsilon}, where rad(n) denotes the product of the distinct
    prime factors of n. The problem is to establish this with explicit, computable K(epsilon),
    or prove the stronger Baker-type form c < C * rad(abc)^{1+omega(abc)^{-1/3}} for an
    absolute constant C.
  informal: >
    The abc conjecture says that when three coprime positive integers satisfy a + b = c,
    the number c cannot be too large compared to the product of the distinct prime factors
    of abc. The effective version demands explicit, computable bounds.

why_it_matters: >
  The effective abc conjecture would have sweeping consequences across number theory,
  including effective solutions to Fermat-type equations, the Mordell conjecture,
  Roth's theorem, and many Diophantine problems. While Mochizuki claims a proof of abc,
  the mathematical community has not reached consensus on its validity.

