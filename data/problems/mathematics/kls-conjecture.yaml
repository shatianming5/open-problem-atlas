statement:
  canonical: >
    For any log-concave probability distribution mu on R^n, the Cheeger isoperimetric constant
    psi_mu satisfies psi_mu >= c * sigma_mu, where sigma_mu is the square root of the smallest
    eigenvalue of the covariance matrix and c > 0 is a universal constant independent of n.
  informal: >
    For any log-concave probability distribution in high dimensions, the isoperimetric constant
    (measuring the minimal boundary-to-volume ratio of partitions) is controlled by the variance.
    The conjecture says no dimension-dependent loss occurs.

why_it_matters: >
  The KLS conjecture (Kannan, Lovasz, Simonovits, 1995) is a cornerstone conjecture in
  high-dimensional probability and geometry. It implies Bourgain's slicing conjecture and
  the thin-shell conjecture. It would also yield optimal mixing times for Markov chains on
  convex bodies, with major implications for sampling and optimization algorithms.

