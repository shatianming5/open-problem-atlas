statement:
  canonical: >
    For every graph G, the crossing number cr(G) >= cr(K_{chi(G)}), where chi(G) is the
    chromatic number. In other words, among all graphs with chromatic number n, the complete
    graph K_n has the smallest crossing number.
  informal: >
    If a graph needs n colors for a proper vertex coloring, then it is at least as hard to
    draw without crossings as the complete graph on n vertices. The complete graph is the
    "easiest to draw" among all graphs requiring that many colors.

why_it_matters: >
  Albertson's conjecture, posed in 2007, creates a beautiful bridge between chromatic graph
  theory and topological graph theory. It connects two fundamental graph invariants -- the
  chromatic number and the crossing number -- that are usually studied independently. The
  conjecture strengthens our understanding of how colorability relates to planarity.

