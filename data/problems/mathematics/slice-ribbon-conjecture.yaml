statement:
  canonical: >
    Every slice knot is a ribbon knot. A knot K in S^3 is slice if it
    bounds a smoothly embedded disk D^2 in the 4-ball B^4. It is ribbon
    if it bounds an immersed disk in S^3 whose only singularities are
    "ribbon singularities" (the disk passes through itself in arcs, with
    no "clasp" singularities). The conjecture asserts that these two
    conditions are equivalent.
  informal: >
    A knot is "slice" if it can bound a smooth disk in 4-dimensional space.
    A knot is "ribbon" if it can bound a disk that crosses itself only in
    a simple way (ribbon crossings). The conjecture says these two notions
    are the same: any knot that bounds a disk in 4D can do so without
    complicated self-intersections.

why_it_matters: >
  The slice-ribbon conjecture, posed by Ralph Fox in 1962, is one of the
  most important open problems in 4-dimensional topology and knot theory.
  It connects 3-dimensional knot invariants (ribbon structure) to
  4-dimensional smooth topology (slice condition). Its resolution would
  clarify the relationship between topological and smooth categories in
  dimension 4, and it relates to handle decompositions of 4-manifolds.

