statement:
  canonical: >
    Do there exist smooth initial data for the three-dimensional incompressible Euler equations
    (partial_t u + (u . nabla)u + nabla p = 0, div u = 0) on R^3 or T^3 such that the solution
    develops a singularity (blow-up of the vorticity) in finite time?
  informal: >
    The 3D Euler equations describe the motion of an ideal (inviscid, incompressible) fluid.
    Starting from smooth initial conditions, does the fluid flow always remain smooth, or can
    it develop infinite vorticity in finite time? This is one of the fundamental open problems
    in mathematical fluid dynamics.

why_it_matters: >
  The blow-up problem for the 3D Euler equations is one of the most important open problems in
  mathematical physics and PDE theory. It is closely related to the Navier-Stokes regularity
  problem (one of the Millennium Prize Problems). Understanding Euler blow-up would shed light
  on turbulence, energy cascades, and the physical limits of classical fluid mechanics.
  Recent work by Elgindi (2021) established blow-up for certain classes of initial data with
  limited regularity, and Chen-Hou (2023) provided computer-assisted proofs of blow-up for
  C^{1,alpha} data.

