statement:
  canonical: >
    Let M be a closed (compact, without boundary) Riemannian manifold of even
    dimension 2n with positive sectional curvature. Then the Euler
    characteristic chi(M) > 0. Equivalently, does positive sectional curvature
    in even dimensions force the Euler characteristic to be positive?
  informal: >
    In Riemannian geometry, sectional curvature measures how curved a space is
    in each 2-dimensional direction. If a compact even-dimensional manifold
    curves positively in every direction, Hopf conjectured that a topological
    invariant called the Euler characteristic must be positive. This is known
    in dimensions 2 and 4 but open in general.

why_it_matters: >
  The Hopf conjecture, dating to the 1930s, is one of the most fundamental
  open problems in Riemannian geometry. It exemplifies the interaction between
  curvature and topology, which is the central theme of differential geometry.
  Despite its clean and elementary statement, it has resisted all approaches
  for nearly a century. It is closely related to the Chern conjecture on the
  Euler characteristic of affine manifolds.

