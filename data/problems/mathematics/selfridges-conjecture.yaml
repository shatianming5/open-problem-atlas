statement:
  canonical: >
    There is no composite number n that is simultaneously a base-2 Fermat pseudoprime
    (2^{n-1} ≡ 1 mod n) and a Lucas pseudoprime with respect to some Lucas sequence
    with Jacobi symbol parameters chosen appropriately. Equivalently, there is no
    PSW pseudoprime: no composite passes both a strong base-2 probable prime test and a
    strong Lucas probable prime test with the standard parameter selection.
  informal: >
    The Pomerance-Selfridge-Wagstaff (PSW) conjecture says that no composite number can
    fool both a Fermat primality test with base 2 and a Lucas primality test at the same
    time. If true, the combination would be a deterministic primality test.

why_it_matters: >
  The PSW conjecture, if true, would provide an extremely efficient deterministic primality
  test. The Baillie-PSW test based on this conjecture is widely used in practice (e.g., in
  Mathematica and Maple) and has never been found to fail, despite extensive search.

