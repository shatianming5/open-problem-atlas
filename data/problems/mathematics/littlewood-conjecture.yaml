statement:
  canonical: >
    For every pair of real numbers alpha, beta, the limit inferior
    lim inf_{n -> infinity} n * ||n*alpha|| * ||n*beta|| = 0, where ||x|| denotes the
    distance from x to the nearest integer.
  informal: >
    For any two irrational numbers alpha and beta, one can find integers n making n, n*alpha,
    and n*beta all simultaneously close to integers, in the sense that the product of the
    three distances tends to zero.

why_it_matters: >
  Littlewood's conjecture (circa 1930) is a central problem in Diophantine approximation and
  dynamics on homogeneous spaces. Einsiedler, Katok, and Lindenstrauss (2006) showed that the
  set of counterexamples has Hausdorff dimension zero using measure rigidity on SL(3,R)/SL(3,Z),
  work contributing to Lindenstrauss's Fields Medal. The conjecture remains open.

