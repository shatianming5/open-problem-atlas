statement:
  canonical: >
    If z_1, z_2, ..., z_n are complex numbers that are linearly independent over the
    rational numbers Q, then the field extension Q(z_1, ..., z_n, e^{z_1}, ..., e^{z_n})
    has transcendence degree at least n over Q.
  informal: >
    Given n complex numbers that are linearly independent over the rationals, the 2n numbers
    formed by these numbers together with their exponentials contain at least n that are
    algebraically independent. This would settle nearly all open problems in transcendental
    number theory.

why_it_matters: >
  Schanuel's conjecture is arguably the most important open problem in transcendental number
  theory. It implies the Lindemann-Weierstrass theorem, the Gelfond-Schneider theorem, and
  would resolve the algebraic independence of e and pi, among many other fundamental questions.

