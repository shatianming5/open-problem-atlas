statement:
  canonical: >
    Let K be a field and G a torsion-free group. Then the only units in
    the group ring K[G] are the trivial units, i.e., elements of the form
    a·g where a ∈ K \ {0} and g ∈ G.
  informal: >
    If you form the group ring of a torsion-free group over a field, the
    conjecture says the only invertible elements are the obvious ones:
    nonzero scalar multiples of single group elements.

why_it_matters: >
  Kaplansky's unit conjecture is one of three famous conjectures (along with
  the zero-divisor and idempotent conjectures) about group rings of torsion-free
  groups. It is the strongest of the three. A counterexample was found by
  Gardam (2021) over the field F_2 for a virtually abelian group, but the
  conjecture remains open over fields of characteristic zero and for many
  classes of groups.

