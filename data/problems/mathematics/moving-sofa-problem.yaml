statement:
  canonical: >
    What is the largest area of a connected planar region that can be moved
    around a right-angled corner in an L-shaped hallway of unit width? The
    region must be translated and rotated continuously through the hallway
    without overlap.
  informal: >
    What is the largest sofa (measured by area) that can be moved around
    a right-angle turn in a hallway of fixed width?

why_it_matters: >
  The moving sofa problem is a deceptively simple geometric optimization
  problem that has remained open since 1966. It exemplifies the difficulty
  of optimization over shapes and continuous motions. The best known lower
  bound is Gerver's sofa (area ≈ 2.2195) from 1992, and Romik's ambidextrous
  sofa handles a symmetric variant. A 2024 preprint by Jineon Baek claims
  to prove that Gerver's sofa is optimal, but the proof is not yet fully
  verified.

