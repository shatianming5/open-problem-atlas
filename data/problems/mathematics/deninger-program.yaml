statement:
  canonical: >
    Deninger conjectures the existence of an "arithmetic site" or infinite-dimensional
    foliated dynamical system whose regularized determinant of a suitable foliation Laplacian
    recovers the Riemann zeta function (and more generally L-functions). The zeros of the
    zeta function should correspond to eigenvalues of a self-adjoint operator, and the
    Riemann Hypothesis would follow from a positivity property of this operator.
  informal: >
    There should exist a geometric/dynamical object whose spectral properties encode the
    zeros of the Riemann zeta function. Finding and rigorously constructing this object
    would prove the Riemann Hypothesis.

why_it_matters: >
  Deninger's program (initiated in the early 1990s) provides one of the most compelling
  conceptual frameworks for approaching the Riemann Hypothesis. It draws on analogies with
  the Weil conjectures (proved by Deligne using etale cohomology) and proposes an "arithmetic
  cohomology" that would play the same role for number fields. Connes' noncommutative geometry
  program has overlapping goals.

