statement:
  canonical: >
    Let A be an abelian variety of dimension g over a number field. The normalized Frobenius
    angles (or normalized L-function coefficients) at primes of good reduction are
    equidistributed with respect to the Haar measure on a specific compact group ST(A),
    the Sato-Tate group of A. For elliptic curves without CM, this was proved to be SU(2)
    (the classical Sato-Tate). For higher-dimensional abelian varieties, the identity of
    ST(A) and the equidistribution remain conjectural in general.
  informal: >
    The classical Sato-Tate conjecture (now a theorem for elliptic curves over totally real
    fields) predicts the distribution of point counts on elliptic curves mod p. The
    generalization to higher-dimensional abelian varieties and more general motives remains
    open.

why_it_matters: >
  The Sato-Tate conjecture connects arithmetic statistics, random matrix theory, and
  automorphic forms. Its proof for elliptic curves (Taylor, Clozel, Harris, Shepherd-Barron,
  2011) was a triumph of the Langlands program. The generalization to higher genus varieties
  is a major open frontier, with deep connections to motives and L-functions.

