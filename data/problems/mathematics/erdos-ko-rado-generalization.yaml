statement:
  canonical: >
    Determine the maximum size of a t-intersecting family of permutations of {1, 2, ..., n},
    where a family F of permutations is t-intersecting if every pair sigma, tau in F agrees
    on at least t points (i.e., |{i : sigma(i) = tau(i)}| >= t). For t = 1, the Deza-Frankl
    conjecture (proved by Ellis, Friedgut, and Pilpel for large n) states the maximum is
    (n-1)!. For general t, the conjectured maximum is (n-t)! and the extremal families are
    cosets of the stabilizer of t points.
  informal: >
    Among all collections of permutations where every two permutations agree in at least t
    positions, how large can the collection be? The conjecture says it is (n-t)!, achieved
    by fixing t specific positions.

why_it_matters: >
  The Erdos-Ko-Rado theorem for sets is a cornerstone of extremal combinatorics. Its
  extension to permutations connects to representation theory of the symmetric group,
  coding theory (permutation codes), and algebraic combinatorics. The problem for general
  t remains open and requires new techniques beyond the spectral methods used for t = 1.

