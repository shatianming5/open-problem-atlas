statement:
  canonical: >
    There exists a canonical inner model (called "Ultimate L") that is
    compatible with all large cardinal axioms and satisfies V = Ultimate L.
    More precisely, assuming the existence of an extendible cardinal, there
    is a definable inner model L_Omega that is close to V (satisfies a
    strong form of the Weak Covering Lemma), is compatible with all large
    cardinals, and in which the Continuum Hypothesis and other combinatorial
    principles hold. The conjecture asserts that such a model exists and
    that V = L_Omega is consistent with all known large cardinal axioms.
  informal: >
    The Ultimate L Conjecture proposes that there is a "best" canonical
    model of set theory that looks like Godel's constructible universe L
    but is large enough to accommodate all known large cardinal axioms.
    This would resolve the Continuum Hypothesis (it would be true in this
    model) and provide a definitive answer to "what sets exist."

why_it_matters: >
  Woodin's Ultimate L program represents one of the most ambitious attempts
  to resolve the fundamental independence phenomena in set theory, including
  the Continuum Hypothesis. If successful, it would provide a canonical
  model of set theory compatible with all large cardinals, resolving
  questions left open since Cohen's independence proof of 1963. It
  represents a competing approach to the forcing axiom/Martin's Maximum
  program.

