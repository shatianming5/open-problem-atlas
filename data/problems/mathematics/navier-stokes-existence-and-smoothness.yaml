statement:
  canonical: >
    In three spatial dimensions, given any initial velocity field v_0(x) that is smooth and
    divergence-free (and decays sufficiently rapidly at infinity), prove one of the following:
    (A) There exist smooth functions v(x,t) (velocity) and p(x,t) (pressure) defined for all
    t > 0 that satisfy the incompressible Navier-Stokes equations
    dv/dt + (v . nabla)v = -nabla p + nu Delta v, div v = 0,
    with v(x, 0) = v_0(x), and v has bounded energy for all t > 0; or
    (B) There exists a smooth, divergence-free initial condition v_0 for which no such smooth
    solution exists for all t > 0 (i.e., singularities develop in finite time).
  informal: >
    The Navier-Stokes equations describe the motion of fluids like water and air. In three
    dimensions, we do not know whether smooth solutions always exist for all time, or whether
    the fluid can develop a "singularity" where the velocity becomes infinite. This problem
    asks for a definitive answer.

why_it_matters: >
  The Navier-Stokes existence and smoothness problem is one of the seven Millennium Prize
  Problems. The Navier-Stokes equations are the fundamental equations governing fluid dynamics
  and are used throughout science and engineering. Understanding whether solutions can blow up
  in finite time is crucial for the mathematical foundations of fluid mechanics and has
  implications for turbulence theory.

