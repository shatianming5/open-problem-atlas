statement:
  canonical: >
    Every simple directed graph on n vertices in which every vertex has out-degree at least
    n/k contains a directed cycle of length at most k. The special case k = 3 asserts that
    every digraph on n vertices with minimum out-degree at least n/3 contains a directed
    triangle.
  informal: >
    If every vertex in a directed graph points to at least n/k other vertices, then the
    graph must contain a short directed cycle of length at most k. Even the case of
    directed triangles (k = 3) remains unproved.

why_it_matters: >
  The Caccetta-Haggkvist conjecture, posed in 1978, is one of the most important open
  problems in directed graph theory. Even the triangle case (k = 3) has resisted all
  approaches for over 40 years. It connects to extremal combinatorics, additive number
  theory, and has been linked to problems in number theory through Cayley digraphs.

