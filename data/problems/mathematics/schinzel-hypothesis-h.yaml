statement:
  canonical: >
    Let f_1(x), ..., f_s(x) be irreducible polynomials with integer coefficients and positive
    leading coefficients. Suppose that no prime p divides the product f_1(n)*...*f_s(n) for
    all integers n (the "no fixed prime divisor" condition). Then there exist infinitely many
    positive integers n such that f_1(n), ..., f_s(n) are all simultaneously prime.
  informal: >
    Any collection of integer polynomials that could conceivably all be prime at the same time
    (no obvious obstruction from a single prime dividing the product) will indeed all be
    simultaneously prime for infinitely many inputs.

why_it_matters: >
  Schinzel's Hypothesis H (1958) is one of the most general conjectures in prime number theory.
  It subsumes the twin prime conjecture, Landau's conjecture (n^2+1 primes), Bunyakovsky's
  conjecture, and many others. It remains completely open for any system of two or more
  polynomials. Even single polynomial cases beyond linear are unproven (e.g., n^2+1).

