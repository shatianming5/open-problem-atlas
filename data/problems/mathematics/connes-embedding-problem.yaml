statement:
  canonical: >
    The Connes embedding problem (1976) asks whether every separable type II_1 von Neumann
    factor embeds into an ultrapower of the hyperfinite type II_1 factor R. This was disproved
    by Ji, Natarajan, Vidick, Wright, and Yuen (2020) via the result MIP* = RE, showing that
    the complexity class of multiprover interactive proofs with entanglement equals the class
    of recursively enumerable languages. The remaining open problems concern understanding
    which factors embed, characterizing the gap, and the implications for quantum information.
  informal: >
    Not every von Neumann algebra can be approximated by matrix algebras in the appropriate
    sense. This was disproved in 2020 with deep consequences for quantum computing. The
    remaining questions concern characterizing which algebras embed and the quantum
    information-theoretic implications.

why_it_matters: >
  The resolution of the Connes embedding problem via MIP* = RE is one of the most remarkable
  results connecting operator algebras, quantum information, and computational complexity.
  It disproved a 44-year-old conjecture and showed Tsirelson's problem has a negative answer.
  Understanding the full implications and characterizing embeddable factors remain major open
  directions.

