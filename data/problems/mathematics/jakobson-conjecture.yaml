statement:
  canonical: >
    For a generic smooth one-parameter family of unimodal maps f_a: [0,1] -> [0,1]
    (such as the quadratic family f_a(x) = ax(1-x)), the set of parameters a for
    which f_a admits an absolutely continuous invariant probability measure (a.c.i.p.)
    -- i.e., exhibits stochastic behavior -- has positive Lebesgue measure. More
    broadly (Palis conjecture), for typical one-dimensional dynamical systems, the
    parameter space decomposes into a set where the system is hyperbolic (structurally
    stable) and a set where it supports an a.c.i.p., and together these sets have
    full Lebesgue measure.
  informal: >
    Consider the family of maps x -> ax(1-x) as the parameter a varies. For some
    values of a the dynamics are orderly (periodic), and for others they are
    chaotic with a natural probability distribution. The conjecture predicts that
    "almost all" parameter values fall into one of these two categories -- there
    is essentially no third type of behavior.

why_it_matters: >
  This conjecture, building on Jakobson's landmark 1981 theorem and extended by
  Palis, is fundamental to understanding the global structure of parameter
  spaces in dynamics. It predicts a clean dichotomy between regular and
  stochastic behavior that would provide a complete probabilistic picture of
  one-dimensional dynamics. The higher-dimensional generalization (Palis
  conjecture) is one of the most ambitious open problems in dynamical systems.

