statement:
  canonical: >
    For finite lattices L of size n (as partially ordered sets), what is the minimum distortion
    required to embed the lattice metric (shortest path distance in the Hasse diagram) into
    L^1 (Manhattan distance) space? Specifically, determine the worst-case distortion
    c_1(L_n) = inf_f sup_{x,y} d_{L^1}(f(x),f(y)) / d_L(x,y) * sup_{x,y} d_L(x,y) /
    d_{L^1}(f(x),f(y)) over all lattices of size n and all embeddings f.
  informal: >
    How well can the metric structure of lattices be preserved when embedded into familiar
    geometric spaces? The worst-case distortion for embedding lattice metrics into L^1 is
    poorly understood.

why_it_matters: >
  The metric embedding theory of lattices connects order theory, discrete geometry, and
  theoretical computer science. Low-distortion embeddings have applications to algorithm
  design (approximation algorithms), data structures, and the geometry of Banach spaces.
  The distortion of general lattice metrics is a challenging open question.

