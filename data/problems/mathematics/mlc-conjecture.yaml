statement:
  canonical: >
    The Mandelbrot set M = {c in C : the orbit of 0 under f_c(z) = z^2 + c
    is bounded} is locally connected. That is, for every point c in M and every
    open set U containing c, there exists a connected open set V with
    c in V subset U intersect M.
  informal: >
    The Mandelbrot set is the famous fractal that catalogs the behavior of
    quadratic maps z -> z^2 + c. The MLC conjecture asserts that this set has
    no "infinitely thin filaments" -- every point can be surrounded by an
    arbitrarily small connected neighborhood within the set.

why_it_matters: >
  The MLC conjecture is perhaps the most important open problem in holomorphic
  dynamics. If true, it would imply that the Mandelbrot set is topologically
  completely described by Thurston's combinatorial model, that the Fatou
  conjecture (density of hyperbolicity) holds for quadratic polynomials, and
  that every quadratic polynomial is combinatorially rigid. It would provide a
  complete topological classification of quadratic dynamics.

