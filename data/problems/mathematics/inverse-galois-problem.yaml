statement:
  canonical: >
    Is every finite group isomorphic to the Galois group of some Galois extension of the
    rational numbers Q? That is, for every finite group G, does there exist a Galois extension
    K/Q such that Gal(K/Q) is isomorphic to G?
  informal: >
    Galois theory associates a symmetry group to every polynomial equation. The inverse Galois
    problem asks: can every possible finite symmetry group arise from some polynomial equation
    with rational coefficients?

why_it_matters: >
  The inverse Galois problem is one of the most fundamental open questions in algebra. It
  connects group theory with algebraic number theory and arithmetic geometry. Hilbert posed
  it in the late 19th century, and it remains open despite major advances in our understanding
  of Galois groups, modular forms, and arithmetic geometry.

