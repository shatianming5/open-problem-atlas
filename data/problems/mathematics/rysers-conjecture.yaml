statement:
  canonical: >
    Every Latin square of odd order n has a transversal (a set of n entries, one from each
    row and one from each column, with all symbols distinct). More generally, the
    Ryser-Brualdi-Stein conjecture asserts that every Latin square of order n has a partial
    transversal of size at least n - 1.
  informal: >
    In an n x n Latin square (where each symbol appears exactly once in each row and column),
    can you always find n entries, one per row and one per column, that are all different?
    Ryser conjectured yes when n is odd; the Brualdi-Stein extension asks for n - 1 such entries
    in all cases.

why_it_matters: >
  Ryser's conjecture, posed in 1967, is a central open problem in combinatorics with
  connections to design theory, graph decompositions, proper edge colorings of bipartite
  graphs, and rainbow matchings. It has inspired a large body of work on transversals in
  Latin squares and more general combinatorial structures.

