statement:
  canonical: >
    If two periods (numbers expressible as integrals of algebraic functions over
    semi-algebraic domains defined over Q) are equal, then there exists a finite sequence
    of elementary operations — additivity of integrals, change of variables with algebraic
    Jacobians, and Stokes' theorem — that transforms one integral representation into the
    other.
  informal: >
    All relations between periods (a class of numbers including pi, log(2), and values of
    the zeta function at integers) should follow from three basic rules of calculus: linearity,
    substitution, and Stokes' theorem.

why_it_matters: >
  The Kontsevich-Zagier conjecture (2001) proposes a complete set of "axioms" for equality among
  periods, a vast class of numbers arising throughout mathematics. It would imply the
  transcendence of many specific numbers and connects to the Grothendieck period conjecture,
  motives, and mixed Hodge structures. It provides a vision for a "calculus of periods."

