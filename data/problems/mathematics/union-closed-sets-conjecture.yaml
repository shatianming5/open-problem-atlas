statement:
  canonical: >
    Let F be a finite family of finite sets, not all empty, that is union-closed (i.e., the
    union of any two sets in F is also in F). Then there exists an element that belongs to at
    least half of the sets in F. Formally, there exists x in the union of F such that
    |{A in F : x in A}| >= |F|/2.
  informal: >
    Consider a collection of sets that is closed under taking unions (combining any two sets
    in the collection produces another set that is also in the collection). The conjecture
    says there must be some element that appears in at least half the sets.

why_it_matters: >
  Frankl's conjecture, posed in 1979, is one of the most tantalizing open problems in
  extremal combinatorics. It is extremely easy to state but has resisted all proof attempts.
  Gilmer's 2022 breakthrough proved the first constant-fraction bound, and subsequent
  improvements have brought renewed attention to the problem.

