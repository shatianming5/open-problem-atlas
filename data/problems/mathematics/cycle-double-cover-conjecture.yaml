statement:
  canonical: >
    Every bridgeless graph has a cycle double cover: a collection of cycles such that every
    edge of the graph appears in exactly two of the cycles. Equivalently, every 2-edge-connected
    graph can be embedded on some orientable surface such that each face boundary is a cycle.
  informal: >
    In any connected graph where removing a single edge never disconnects the graph, it is
    possible to find a collection of cycles that together cover every edge exactly twice.
    This is equivalent to saying the graph can be drawn on some surface (like a sphere or torus)
    so that every face is bounded by a cycle.

why_it_matters: >
  The cycle double cover conjecture, independently posed by Szekeres (1973) and Seymour (1979),
  is one of the most important open problems in graph theory. It connects structural graph
  theory with topological graph theory and surface embeddings. It is related to the Petersen
  graph and to nowhere-zero flow conjectures.

