statement:
  canonical: >
    What are the limits of intelligence, both artificial and human? Smale's 18th problem
    asks for a rigorous mathematical framework to understand the fundamental limits of
    learning and intelligence. In a more precise formulation: what is the computational
    complexity of learning and optimization in high-dimensional spaces, and what are the
    inherent limitations of any learning algorithm given finite data?
  informal: >
    Can we mathematically characterize the ultimate limits of what any intelligent system
    (biological or artificial) can learn, given bounded computational resources and finite
    data? This is the most open-ended of Smale's problems for the 21st century.

why_it_matters: >
  Smale's 18th problem (1998) connects mathematical optimization, learning theory, and
  computational complexity. It motivates research on PAC learning bounds, statistical learning
  theory, neural network approximation theory, and the mathematical foundations of AI. Its
  resolution would have profound implications for understanding both artificial and natural
  intelligence.

