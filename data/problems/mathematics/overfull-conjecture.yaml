statement:
  canonical: >
    Let G be a graph with maximum degree Delta(G) > n/3, where n = |V(G)|. Then the
    chromatic index chi'(G) = Delta(G) + 1 (i.e., G is Class 2) if and only if G contains
    an overfull subgraph H with Delta(H) = Delta(G). A graph H is overfull if |E(H)| >
    Delta(H) * floor(|V(H)|/2).
  informal: >
    For graphs with sufficiently high maximum degree, the only reason a graph needs one
    extra color for edge-coloring (beyond its maximum degree) is if it contains a dense
    substructure (an overfull subgraph) that forces this.

why_it_matters: >
  The Overfull conjecture, posed by Chetwynd and Hilton in 1986, would provide a complete
  characterization of the chromatic index for graphs with large maximum degree. By Vizing's
  theorem, every simple graph has chromatic index Delta or Delta + 1. Determining which case
  holds is NP-complete in general, but the Overfull conjecture implies it can be decided in
  polynomial time for dense graphs.

