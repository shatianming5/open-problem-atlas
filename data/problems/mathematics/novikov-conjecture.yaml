statement:
  canonical: >
    Let M be a closed oriented smooth manifold with fundamental group π.
    For any class x ∈ H^*(Bπ; Q) in the rational cohomology of the
    classifying space, the higher signature ⟨L(M) ∪ f^*(x), [M]⟩ is an
    oriented homotopy invariant, where L(M) is the Hirzebruch L-class and
    f: M → Bπ classifies the universal cover.
  informal: >
    Certain numerical invariants of manifolds defined using their
    fundamental group (called higher signatures) should be preserved when
    one manifold is continuously deformed into another in a way that
    preserves orientation.

why_it_matters: >
  The Novikov conjecture is one of the most important open problems in
  topology. It implies that a large class of topological invariants are
  actually homotopy invariants. The conjecture has been verified for many
  classes of groups and has driven the development of major areas including
  index theory, K-theory of group C*-algebras, and coarse geometry.

