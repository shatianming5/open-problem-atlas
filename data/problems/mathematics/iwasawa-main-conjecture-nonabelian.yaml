statement:
  canonical: >
    Let F_infty / F be a p-adic Lie extension of a number field F with Galois
    group G = Gal(F_infty / F), a compact p-adic Lie group (not necessarily
    abelian). The non-abelian Iwasawa main conjecture asserts that the
    characteristic element of the dual Selmer group (as a module over the
    Iwasawa algebra Lambda(G)) equals, up to a unit, a p-adic L-function
    element in an appropriate K_1 group of the Iwasawa algebra. This
    generalizes the classical abelian Iwasawa main conjecture (proved by
    Mazur-Wiles and Wiles) to non-commutative Galois extensions.
  informal: >
    Iwasawa theory connects algebraic objects (ideal class groups in towers of
    number fields) with analytic objects (p-adic L-functions). The classical
    theory works for commutative (abelian) towers. The non-abelian conjecture
    extends this to non-commutative towers, requiring fundamentally new
    algebraic machinery involving noncommutative rings.

why_it_matters: >
  The non-abelian Iwasawa main conjecture is a central goal of modern algebraic
  number theory. It would provide a deep unification of arithmetic invariants
  with L-values in the most general setting. Coates, Fukaya, Kato, Sujatha,
  and others have formulated precise versions, and partial results by Kakde and
  Ritter-Weiss have been achieved, but the general case remains wide open.

