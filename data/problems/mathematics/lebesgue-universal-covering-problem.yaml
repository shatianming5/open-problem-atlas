    year: 1936
  - summary: "Hansen improved the upper bound to approximately 0.8441153."
    year: 1992
  - summary: "Gibbs reported a further small improvement on Hansen's bound."
    year: 2018
  - summary: "The lower bound of π/8 + √3/4 ≈ 0.8257 has been known since Pál."
