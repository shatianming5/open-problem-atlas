statement:
  canonical: >
    What is the convex region of smallest area in the plane that can contain
    a congruent copy of every planar set of diameter one? Such a region is
    called a universal covering or universal cover.
  informal: >
    Find the smallest convex shape that can cover (after suitable rotation
    and translation) any shape whose widest extent is at most 1.

why_it_matters: >
  Lebesgue's universal covering problem, dating to 1914, is one of the
  oldest open problems in geometry. Despite its elementary statement,
  determining the exact minimum area has resisted all attempts. The best
  bounds have been improved incrementally over more than a century, with
  the current best upper bound around 0.8441 (Gibbs, 2018).

