statement:
  canonical: >
    Let Gamma be a lattice in a simple Lie group G of real rank r >= 2. If Gamma
    acts faithfully on a compact manifold M by C^2 diffeomorphisms, then
    dim(M) >= dim(G/P) where P is a maximal parabolic subgroup of G. In
    particular, for SL(n, Z) acting on a compact manifold M, one needs
    dim(M) >= n - 1.
  informal: >
    Higher-rank lattices (such as SL(n,Z) for n >= 3) are very rigid algebraic
    objects. Zimmer's conjecture predicts that they cannot act nontrivially on
    manifolds that are "too small" in dimension -- there is a minimum dimension
    for the manifold that depends on the rank of the lattice.

why_it_matters: >
  Zimmer's conjecture, formulated in the 1980s, is a centerpiece of Zimmer's
  program aiming to extend Margulis superrigidity from the linear setting to
  smooth actions on manifolds. It connects Lie theory, ergodic theory, and
  smooth dynamics. The breakthrough by Brown, Fisher, and Hurtado (2017-2022)
  resolved the conjecture for cocompact lattices, but extensions to
  non-cocompact lattices and other aspects remain open.

