statement:
  canonical: >
    The Sierpinski problem asks to determine the smallest odd positive integer k such that
    k * 2^n + 1 is composite for all positive integers n. It is conjectured that the
    smallest such Sierpinski number is k = 78557. This requires showing that for every
    odd k < 78557 that is not already eliminated by covering set arguments, there exists
    some n for which k * 2^n + 1 is prime.
  informal: >
    A Sierpinski number is an odd number k for which k * 2^n + 1 is never prime, no matter
    what n you choose. It is known that 78557 is a Sierpinski number (it has a covering set).
    The problem is to prove it is the smallest one, by finding a prime of the form k * 2^n + 1
    for each remaining candidate k.

why_it_matters: >
  The Sierpinski problem connects covering systems, sieve theory, and computational searches
  for large primes. Its resolution would complete our understanding of which multipliers k
  can produce primes in the family k * 2^n + 1.

