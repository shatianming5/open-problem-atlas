statement:
  canonical: >
    For a non-principal Dirichlet character chi modulo q, the maximum of |sum_{n<=x} chi(n)|
    over all x should be bounded by O(sqrt(q) * log log q). The classical Polya-Vinogradov
    inequality gives the bound O(sqrt(q) * log q). The conjecture asserts that the log q factor
    can be replaced by log log q, at least for primitive characters.
  informal: >
    Sums of Dirichlet characters (which generalize the Legendre symbol) should be much smaller
    than what the classical Polya-Vinogradov inequality proves. The conjecture sharpens the
    best known general bound.

why_it_matters: >
  Improving the Polya-Vinogradov inequality is a central goal in analytic number theory.
  Better character sum bounds would improve results on the least quadratic residue, the
  distribution of primes in arithmetic progressions, and many sieve-theoretic applications.
  Montgomery and Vaughan proved the conjectured bound assuming GRH.

