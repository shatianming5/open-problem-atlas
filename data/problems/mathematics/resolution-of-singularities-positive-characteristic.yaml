statement:
  canonical: >
    Does every algebraic variety over a field of positive characteristic p
    admit a resolution of singularities? That is, given an integral scheme
    X of finite type over a field k with char(k) = p > 0, does there exist
    a proper birational morphism Y → X with Y smooth?
  informal: >
    Every algebraic variety (solution set of polynomial equations) over a
    field of characteristic zero can be "desingularized" — replaced by a
    smooth variety that is birationally equivalent. Can the same always be
    done when the characteristic of the field is a prime number?

why_it_matters: >
  Hironaka's celebrated 1964 proof of resolution of singularities in
  characteristic zero is one of the landmarks of algebraic geometry. Extending
  this to positive characteristic is one of the most important open problems
  in the field. Resolution of singularities has deep applications to number
  theory (via arithmetic geometry), the minimal model program, and the
  classification of algebraic varieties.

