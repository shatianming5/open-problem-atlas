statement:
  canonical: >
    A Besicovitch set (Kakeya set) in R^n is a compact set that contains a unit line segment
    in every direction. The Kakeya conjecture states that every Besicovitch set in R^n has
    Hausdorff dimension n (and equivalently, Minkowski dimension n).
  informal: >
    A Kakeya set is a set in n-dimensional space that contains a unit-length needle pointing
    in every possible direction. In 2D, Besicovitch showed such sets can have zero area, but
    the conjecture says in higher dimensions they must be "full-dimensional" in a precise sense.

why_it_matters: >
  The Kakeya conjecture is a central problem in geometric measure theory and harmonic analysis.
  It has deep connections to restriction estimates for the Fourier transform, Bochner-Riesz
  summability, local smoothing conjectures, and additive combinatorics. Progress on the Kakeya
  conjecture has driven advances across multiple areas of analysis.

