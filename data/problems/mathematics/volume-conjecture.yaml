statement:
  canonical: >
    For any hyperbolic knot K in S^3, let J_N(K; q) denote the colored
    Jones polynomial colored by the N-dimensional irreducible representation
    of sl(2,C), evaluated at q = exp(2πi/N). Then
    lim_{N→∞} (2π/N) log |J_N(K; e^{2πi/N})| = vol(S^3 \ K),
    where vol denotes the simplicial (hyperbolic) volume of the knot complement.
  informal: >
    The colored Jones polynomial is an algebraic knot invariant. The volume
    conjecture says that if you evaluate it at special roots of unity and
    take a limit, you recover the hyperbolic volume of the knot complement —
    linking quantum algebra to hyperbolic geometry.

why_it_matters: >
  The volume conjecture is a remarkable bridge between quantum topology
  (specifically, quantum invariants of knots) and hyperbolic geometry. It
  connects the algebraic world of Jones polynomials and quantum groups to
  the geometric world of Thurston's hyperbolic structures, and is a key
  conjecture in the broader program of understanding 3-manifold topology
  through quantum invariants.

