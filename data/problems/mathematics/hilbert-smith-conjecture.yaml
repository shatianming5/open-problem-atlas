statement:
  canonical: >
    If a locally compact group G acts faithfully and continuously on a
    connected topological manifold M, then G must be a Lie group. Equivalently,
    the p-adic integers Z_p cannot act faithfully and continuously on any
    connected topological manifold.
  informal: >
    If a group acts continuously and faithfully on a manifold, the group
    must itself be a smooth object (a Lie group). In particular, exotic
    groups like the p-adic integers cannot act in this way.

why_it_matters: >
  The Hilbert–Smith conjecture is a natural generalization of Hilbert's
  fifth problem (solved by Gleason, Montgomery, and Zippin in 1952). It
  connects the topology of transformation groups with the structure theory
  of locally compact groups and has implications for understanding
  symmetries of manifolds.

