statement:
  canonical: >
    Borsuk (1933) conjectured that every bounded set in R^n can be partitioned into at most
    n+1 parts, each of smaller diameter than the original set. The conjecture is false in
    general (disproved for n >= 298 by Kahn and Kalai in 1993, later improved to n >= 64).
    The problem remains open for dimensions 4 through 63: determine the exact dimensions
    for which f(n) > n+1, where f(n) is the minimum number of pieces needed.
  informal: >
    Can every bounded set in n-dimensional space be divided into n+1 pieces each smaller
    in diameter than the original? This is true in dimensions 1, 2, 3, but fails for high
    dimensions. The precise threshold dimension is unknown.

why_it_matters: >
  Borsuk's conjecture drove decades of research in combinatorial and discrete geometry.
  Its surprising disproof in high dimensions by Kahn and Kalai using combinatorial methods
  revealed deep connections between geometry and combinatorics. The remaining gap between
  dimensions 4 and 63 is a major open question in discrete geometry.

