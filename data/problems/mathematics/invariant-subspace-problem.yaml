statement:
  canonical: >
    Does every bounded linear operator T on a separable, infinite-dimensional
    Hilbert space H have a non-trivial closed invariant subspace? That is,
    does there exist a closed subspace M of H with {0} ⊊ M ⊊ H such that
    T(M) ⊆ M?
  informal: >
    Given any continuous linear transformation on an infinite-dimensional
    Hilbert space, must there always be a proper closed subspace that the
    transformation maps into itself?

why_it_matters: >
  The invariant subspace problem is one of the most important open questions
  in functional analysis and operator theory. It is connected to the structure
  theory of operators and the understanding of how operators can be decomposed.
  Enflo (1976) and Read (1985) showed counterexamples exist on general Banach
  spaces, but the Hilbert space case remains open.

