statement:
  canonical: >
    Let A be the generator of a bounded analytic semigroup on a Hilbert space H, and let
    C: D(A) -> Y be an observation operator. Then C is an infinite-time admissible observation
    operator for the semigroup if and only if the Carleson measure condition holds:
    sup_{Re(s)>0} ||C(sI - A)^{-1}|| < infinity. In other words, resolvent boundedness
    characterizes admissibility.
  informal: >
    For certain infinite-dimensional linear systems (e.g., heat equations, wave equations),
    the question is whether observability (can you recover the state from measurements?) is
    equivalent to a simple resolvent estimate.

why_it_matters: >
  The Weiss conjecture (1989) is a central open problem in infinite-dimensional systems theory.
  It connects operator semigroup theory, control theory for PDEs, and Carleson measure theory.
  Jacob and Partington proved it for specific semigroups, but the general case remains open.
  It has implications for PDE control and stabilization.

