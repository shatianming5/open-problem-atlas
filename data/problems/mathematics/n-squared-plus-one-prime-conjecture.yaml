statement:
  canonical: >
    There are infinitely many primes of the form n^2 + 1 where n is a positive integer.
    Equivalently, the polynomial f(x) = x^2 + 1 takes prime values for infinitely many
    positive integers x.
  informal: >
    If you take perfect squares 1, 4, 9, 16, 25, ... and add 1, you get 2, 5, 10, 17, 26, ...
    Some of these are prime (2, 5, 17, ...). The conjecture says there are infinitely many
    primes in this sequence.

why_it_matters: >
  This is one of Landau's four problems presented at the 1912 International Congress of
  Mathematicians. It is the simplest open case of the Bunyakovsky conjecture for a
  specific quadratic polynomial and represents a fundamental barrier in our understanding
  of prime values of polynomials.

