statement:
  canonical: >
    For every tree T, there exists a function f_T such that every graph G with no induced
    copy of T satisfies chi(G) <= f_T(omega(G)), where chi(G) is the chromatic number and
    omega(G) is the clique number. In other words, every tree is chi-binding: forbidding it
    as an induced subgraph bounds the chromatic number in terms of the clique number.
  informal: >
    If you forbid a specific tree as an induced subgraph, then graphs cannot have a huge
    chromatic number unless they also have a large clique. Trees are "well-behaved" as
    forbidden induced subgraphs in this sense.

why_it_matters: >
  The Gyarfas-Sumner conjecture, independently posed by Gyarfas (1975) and Sumner (1981),
  is a central open problem in structural graph theory. It is one of the most natural
  questions about chi-boundedness and connects Ramsey theory, perfect graphs, and chromatic
  number theory. It is known that not all graphs are chi-bounded (e.g., cycles of odd
  length), making the role of trees special.

