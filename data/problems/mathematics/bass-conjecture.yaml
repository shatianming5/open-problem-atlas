statement:
  canonical: >
    Let G be a discrete group and let P be a finitely generated projective
    module over the integral group ring Z[G]. Then the Hattori-Stallings
    rank of P, viewed as a class function on G, takes the value r_P(1) = rank(P)
    at the identity and r_P(g) = 0 for every element g ≠ 1 of infinite order
    in G.
  informal: >
    For any finitely generated projective module over the group ring of a
    discrete group, a certain trace-like invariant (the Hattori-Stallings rank)
    should be concentrated at the identity element and vanish on elements of
    infinite order.

why_it_matters: >
  The Bass conjecture is a fundamental problem in algebraic K-theory and
  group theory. It implies the Kadison-Kaplansky idempotent conjecture
  for torsion-free groups, which states that the reduced group C*-algebra
  of a torsion-free group has no nontrivial idempotents. The conjecture
  connects algebraic topology, homological algebra, and operator algebras.

