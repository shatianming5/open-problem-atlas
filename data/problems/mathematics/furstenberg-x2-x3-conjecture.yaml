statement:
  canonical: >
    Let mu be a Borel probability measure on the circle R/Z that is invariant under both
    T_2: x -> 2x (mod 1) and T_3: x -> 3x (mod 1), and is ergodic with respect to the
    semigroup generated by T_2 and T_3. Then mu is either the Lebesgue measure or is
    supported on a finite set of rationals. More generally, Furstenberg conjectured that
    the only nonatomic measure jointly invariant and ergodic under multiplication by 2 and
    by 3 on R/Z is the Lebesgue measure.
  informal: >
    Consider the circle (numbers from 0 to 1 with the ends glued together). The operations
    "multiply by 2" and "multiply by 3" (mod 1) each preserve certain natural probability
    distributions. The conjecture says the only "nice" probability distribution that is
    preserved by both operations simultaneously is the uniform distribution.

why_it_matters: >
  Furstenberg's conjecture, posed in 1967, is a central open problem in ergodic theory and
  dynamical systems. It concerns the rigidity of measures under the action of non-lacunary
  multiplicative semigroups and has deep connections to number theory, fractal geometry, and
  the structure of invariant measures. It is related to the Mahler-Furstenberg conjecture
  on normal numbers.

