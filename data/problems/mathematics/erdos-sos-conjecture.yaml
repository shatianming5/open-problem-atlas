statement:
  canonical: >
    Every graph G with average degree greater than k - 2 contains every tree T with k edges
    as a subgraph. Equivalently, if |E(G)| > (k-2)|V(G)|/2, then G contains a copy of every
    tree on k + 1 vertices.
  informal: >
    If a graph has enough edges (average degree bigger than k - 2), then it must contain
    every possible tree with k edges. Having many edges forces all tree shapes to appear.

why_it_matters: >
  The Erdos-Sos conjecture, posed in 1963, is a central conjecture in extremal graph theory
  about embedding trees in dense graphs. It strengthens the classical Erdos-Gallai theorem
  on paths and would be a key step toward understanding the Turan problem for trees. Ajtai,
  Komlos, Simonovits, and Szemeredi announced a proof for large trees around 2010, but the
  full manuscript has not been published.

