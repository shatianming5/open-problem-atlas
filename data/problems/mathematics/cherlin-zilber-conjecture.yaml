statement:
  canonical: >
    Every infinite simple group of finite Morley rank is isomorphic (as a group)
    to an algebraic group over an algebraically closed field. Equivalently,
    there are no "bad groups" -- infinite simple groups of finite Morley rank
    that are not algebraic groups.
  informal: >
    Morley rank is a model-theoretic measure of complexity. Groups of finite
    Morley rank generalize algebraic groups. The conjecture predicts that among
    these, the simple ones (those without nontrivial normal subgroups) are
    always classical algebraic groups -- no exotic examples exist.

why_it_matters: >
  The Cherlin-Zilber conjecture, formulated independently around 1979, is the
  central open problem in the model theory of groups. It would establish that
  the model-theoretic notion of finite Morley rank precisely captures algebraic
  groups among simple groups, giving a powerful bridge between model theory and
  algebraic geometry. The program to prove it has generated a rich body of work
  paralleling the classification of finite simple groups.

