statement:
  canonical: >
    Is every countable discrete group G whose bounded representations on Hilbert
    space are all unitarizable (i.e., similar to unitary representations)
    necessarily amenable? Equivalently, if every uniformly bounded representation
    pi: G -> B(H) is similar to a unitary representation, must G be amenable?
    The converse (amenable implies unitarizable) was established by Day and
    Dixmier.
  informal: >
    A group is "unitarizable" if every way of representing it as bounded
    operators on a Hilbert space can be conjugated to act by unitary (distance-
    preserving) operators. Amenable groups are always unitarizable. The Dixmier
    problem asks the converse: is amenability the only reason a group could be
    unitarizable?

why_it_matters: >
  The Dixmier problem, posed in 1950, is a fundamental question connecting
  geometric group theory, operator algebras, and representation theory. It
  probes the deep relationship between the algebraic/geometric property of
  amenability and the analytic property of unitarizability. It is related to
  several other important problems about bounded cohomology and derivations.

