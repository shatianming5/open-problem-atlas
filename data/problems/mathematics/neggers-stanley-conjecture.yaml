statement:
  canonical: >
    For a finite poset P, the order polynomial Omega(P, t) (counting the number of
    order-preserving maps from P to {1, 2, ..., t}) has only real zeros when expressed
    in the basis of binomial coefficients. Equivalently, the W-polynomial (a transformation
    of the order polynomial) has only real roots. The original Neggers conjecture (for
    naturally labeled posets) was disproved; the modified version due to Stanley remains open.
  informal: >
    A polynomial that counts the number of ways to assign values from {1,...,t} to elements
    of a partially ordered set in an order-respecting way should, after a suitable transformation,
    have only real roots.

why_it_matters: >
  The Neggers-Stanley conjecture connects enumerative combinatorics with the theory of real-rooted
  polynomials. Real-rootedness implies log-concavity and unimodality, which are central topics
  in algebraic combinatorics. The conjecture stimulates research on P-partitions, Ehrhart theory,
  and symmetric function theory.

