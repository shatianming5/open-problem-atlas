statement:
  canonical: >
    If n complete graphs, each having exactly n vertices, are combined in such a way that any
    two of them share at most one vertex, then the union graph can be properly colored with
    n colors. Equivalently, the chromatic index of any linear hypergraph on n vertices is at
    most n.
  informal: >
    Take n complete graphs, each with n vertices. Combine them so that any two share at most
    one vertex. Then you can color the edges of each complete graph (equivalently, the vertices
    of the union) using just n colors, so that no two adjacent edges share a color.

why_it_matters: >
  The Erdos-Faber-Lovasz conjecture, posed in 1972, was one of Erdos's favorite problems and
  carried a $500 prize. It stood open for nearly 50 years before being resolved by Kang,
  Kelly, Kuhn, Methuku, and Osthus in 2021. The proof uses absorption techniques and
  probabilistic methods, advancing our understanding of coloring in hypergraphs.

