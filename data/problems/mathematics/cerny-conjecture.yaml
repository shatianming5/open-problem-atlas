statement:
  canonical: >
    Every synchronizing deterministic finite automaton on n states has a synchronizing (reset)
    word of length at most (n-1)^2. A synchronizing word is a string that maps every state
    to a single fixed state regardless of the starting state.
  informal: >
    If a machine with n states has the property that some input sequence forces it into a
    single state no matter where it starts, then there exists such a sequence of length at
    most (n-1)^2.

why_it_matters: >
  The Cerny conjecture (1964) is the most famous open problem in automata theory. The bound
  (n-1)^2 would be tight (achieved by Cerny's automaton). Despite decades of effort, the best
  upper bound is approximately O(n^3/6). The conjecture has applications in coding theory,
  symbolic dynamics, and industrial systems (part orienters).

