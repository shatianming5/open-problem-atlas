statement:
  canonical: >
    Let p(z) be a polynomial of degree n >= 2 with all zeros contained in the
    closed unit disk |z| <= 1. Then for each zero a of p, there exists a
    critical point w (zero of p') with |a - w| <= 1. That is, every zero of p
    has a critical point of p within distance 1 from it.
  informal: >
    Consider a polynomial whose roots all lie within the unit circle in the
    complex plane. Sendov conjectured that near each root, there is always a
    critical point (a place where the derivative vanishes) within distance 1.
    Despite its elementary statement, this conjecture has been open since 1958.

why_it_matters: >
  Sendov's conjecture, posed in 1958, is one of the most famous open problems
  in the geometry of polynomials and complex analysis. It connects the zero
  distribution of a polynomial with the zeros of its derivative, a
  relationship going back to Gauss-Lucas theorem. Despite extensive partial
  results (verified for degree up to 9, for zeros on the unit circle, etc.),
  the general case remains open. Tao proved it for sufficiently high degree
  polynomials in 2022, but small degrees remain unresolved.

