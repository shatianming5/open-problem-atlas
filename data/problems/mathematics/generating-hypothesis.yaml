statement:
  canonical: >
    If f: X -> Y is a map between finite spectra (finite CW-complexes
    stably) such that the induced map pi_*(f): pi_*(X) -> pi_*(Y) on
    stable homotopy groups is the zero map, then f is stably null-homotopic
    (i.e., f = 0 in the stable homotopy category). Equivalently, the
    functor pi_* from the stable homotopy category of finite spectra to
    graded abelian groups is faithful.
  informal: >
    In stable homotopy theory, we study spaces "up to suspension." The
    generating hypothesis says that stable homotopy groups detect everything:
    if a map between finite spaces induces the zero map on all stable
    homotopy groups, then the map itself must be zero (stably).

why_it_matters: >
  Freyd's generating hypothesis, posed in 1966, is one of the oldest open
  problems in stable homotopy theory and homological algebra. If true, it
  would dramatically simplify the structure of the stable homotopy category
  of finite spectra. It has deep consequences for the Picard group of the
  stable homotopy category and for understanding the structure of thick
  subcategories via the Hopkins-Smith theorem.

