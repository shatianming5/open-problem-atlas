partial_results:
  - summary: "The cases t <= 4 were proved by Hadwiger (1943) and Dirac (1952)."
    year: 1952
  - summary: "The case t = 5 is equivalent to the Four Color Theorem, proved by Appel and Haken."
    year: 1977
  - summary: "The case t = 6 was proved by Robertson, Seymour, and Thomas (assuming the Four Color Theorem)."
    year: 1993
  - summary: "Norin, Song, and Postle broke the sqrt(log n) barrier: every graph with no K_t minor is O(t (log t)^beta)-colorable for some beta < 1."
    year: 2019

