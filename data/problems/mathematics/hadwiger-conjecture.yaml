statement:
  canonical: >
    For every integer t >= 1, every graph with no K_t minor is (t-1)-colorable. Equivalently,
    if a graph G requires at least t colors for a proper vertex coloring (i.e., chi(G) >= t),
    then G contains K_t as a minor.
  informal: >
    If a graph needs at least t colors to color its vertices (so that no two adjacent vertices
    share a color), then it must contain a "squished" version of the complete graph on t vertices
    as a substructure.

why_it_matters: >
  Hadwiger's conjecture, posed in 1943, is considered one of the deepest open problems in
  graph theory. It generalizes the Four Color Theorem (the case t = 5) and strengthens it
  dramatically. Paul Seymour has called it "one of the most important open problems in
  graph theory, if not all of combinatorics."

