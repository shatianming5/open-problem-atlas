    year: 1971
  - summary: "Abbott, Erdos, and Hanson improved the bound to N(x) = O(log x / log log x)."
    year: 1974
  - summary: "Kane proved the upper bound N(x) = O((log x)^{2/3 + epsilon})."
    year: 2007
  - summary: "The number 3003 = C(78,2) = C(15,5) = C(14,6) is known to appear 8 times; no number is known to appear more."
