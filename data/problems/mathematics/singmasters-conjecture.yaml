statement:
  canonical: >
    There exists a finite upper bound N such that every integer greater than 1 appears at most
    N times in Pascal's triangle. Equivalently, for each integer k > 1, the number of solutions
    to the equation C(n, m) = k (with 0 < m < n) is bounded by a universal constant.
    Singmaster conjectured N = 8, the multiplicity achieved by the number 3003.
  informal: >
    In Pascal's triangle, each number appears some number of times. The number 1 appears
    infinitely often (it borders both sides), but every other number seems to appear only
    finitely many times. The conjecture says there is a universal upper bound on how many
    times any number greater than 1 can appear.

why_it_matters: >
  Singmaster's conjecture sits at the intersection of combinatorics and number theory. It
  concerns the structure of Pascal's triangle, one of the most fundamental objects in
  combinatorics. The conjecture relates to the Diophantine problem of when binomial
  coefficients coincide, connecting to questions about factorials and divisibility.

