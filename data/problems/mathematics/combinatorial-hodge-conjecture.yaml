statement:
  canonical: >
    For a smooth tropical variety X of dimension d, every (p,p)-class in the tropical
    cohomology H^{p,p}(X) that lies in the image of the cycle class map from tropical cycles
    generates the full space of (p,p)-classes. More precisely, the tropical cycle class map
    from the Chow group of tropical cycles to tropical (p,p)-cohomology is surjective,
    providing a combinatorial analogue of the classical Hodge conjecture.
  informal: >
    The tropical (combinatorial) analogue of the Hodge conjecture asks whether every
    "Hodge-type" cohomology class on a tropical variety comes from a geometric tropical cycle.

why_it_matters: >
  The combinatorial Hodge conjecture connects tropical geometry, combinatorics, and algebraic
  topology. Tropical geometry provides a "combinatorial shadow" of algebraic geometry, and
  understanding which cohomology classes are algebraic in the tropical setting could shed light
  on the classical Hodge conjecture (a Millennium Prize Problem).

