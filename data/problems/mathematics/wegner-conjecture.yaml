statement:
  canonical: >
    For every unit disk graph G with clique number ω(G), the chromatic
    number χ(G) satisfies χ(G) ≤ (3/2)ω(G) - 1/2 for ω(G) ≥ 3. More
    generally, for disk graphs (not necessarily unit), the chromatic
    number should be bounded by a function that is at most 3/2 times
    the clique number (up to lower-order terms).
  informal: >
    If you represent a graph by disks in the plane where vertices are
    connected when their disks overlap, how many colors do you need?
    Wegner conjectured that the answer is at most about 3/2 times the
    size of the largest clique.

why_it_matters: >
  Wegner's conjecture is a fundamental question in geometric graph theory
  connecting chromatic number, clique number, and geometric representation.
  It has been open since 1977 and is important for frequency assignment
  problems in wireless networks, where disk graphs naturally model
  interference patterns.

