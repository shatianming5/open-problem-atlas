statement:
  canonical: >
    Does there exist a strongly polynomial-time algorithm for linear programming? That is,
    an algorithm whose running time is bounded by a polynomial in the number of variables n
    and number of constraints m only, independent of the bit-size of the coefficients. Current
    polynomial-time algorithms (ellipsoid method, interior point methods) are weakly polynomial
    — their complexity depends on log of the input numbers.
  informal: >
    Can linear programs be solved in a number of steps that depends only on the number of
    variables and constraints, not on the size of the numbers involved?

why_it_matters: >
  This is Smale's 9th problem for the 21st century and one of the most important open questions
  in mathematical optimization. Linear programming is ubiquitous in operations research,
  economics, and engineering. A strongly polynomial algorithm would be a fundamental advance
  in the theory of computation and optimization, resolving one of the deepest questions about
  the complexity of a problem we solve billions of times daily.

