statement:
  canonical: >
    Every closed contact manifold (M, xi) admits at least one closed orbit of
    the Reeb vector field associated to any contact form alpha defining xi.
    Equivalently, for any contact form on a closed manifold, the Reeb flow has
    at least one periodic orbit.
  informal: >
    On any compact odd-dimensional manifold equipped with a contact structure
    (a geometric structure arising naturally in mechanics and optics), there is
    always a trajectory of the associated dynamical system that returns to its
    starting point -- a periodic orbit must exist.

why_it_matters: >
  The Weinstein conjecture, posed in 1979, is a foundational problem in
  symplectic and contact topology. It connects the global topology of contact
  manifolds with the dynamics of Reeb flows. Its resolution in dimension 3 by
  Taubes (2007) using Seiberg-Witten theory was a landmark achievement, but the
  general case in higher dimensions remains open.

