statement:
  canonical: >
    For a prime p and chromatic level n, the homotopy type of the
    E(n)-local sphere L_{E(n)} S^0 is determined by a specific splitting
    of the chromatic fracture square. More precisely, the fiber of the
    localization map L_{E(n)} S^0 -> L_{K(n)} S^0 decomposes as a
    finite wedge of localizations L_{E(n-1)} S^{k_i} for specific shifts
    k_i. This predicts the precise structure of the homotopy groups of
    L_{E(n)} S^0 in terms of the Morava K-theory localizations.
  informal: >
    Chromatic homotopy theory breaks stable homotopy into layers by "color"
    (chromatic level). The chromatic splitting conjecture predicts how
    these layers fit together: the transition from one level to the next
    should decompose in a very specific and simple way.

why_it_matters: >
  Hopkins' chromatic splitting conjecture is a central structural prediction
  in chromatic homotopy theory, the dominant framework for understanding
  stable homotopy theory. It would provide a complete inductive understanding
  of how the chromatic layers assemble. Known to hold at chromatic level 1,
  partial results exist at level 2, but the general case remains open and
  has been shown to fail in certain formulations at large primes and high
  chromatic levels.

