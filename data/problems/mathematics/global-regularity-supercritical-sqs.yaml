statement:
  canonical: >
    Consider the inviscid surface quasi-geostrophic (SQG) equation on R^2:
    ∂_t θ + u·∇θ = 0, where u = ∇^⊥(-Δ)^{-1/2}θ. Given smooth initial
    data θ_0, does the solution remain smooth for all time, or can finite-time
    singularities develop?
  informal: >
    The surface quasi-geostrophic equation is a 2D model from geophysics
    that shares many structural features with the 3D Euler equations.
    The question is whether smooth solutions can develop singularities
    in finite time.

why_it_matters: >
  The inviscid SQG equation is a key model in fluid dynamics and serves
  as a testing ground for understanding potential singularity formation in
  the 3D Euler equations, to which it bears a strong structural analogy.
  While the critical dissipative SQG equation was resolved by Caffarelli
  and Vasseur (2010) and Kiselev, Nazarov, and Volberg (2007), the inviscid
  case remains open and is considered one of the most important problems
  in mathematical fluid dynamics.

