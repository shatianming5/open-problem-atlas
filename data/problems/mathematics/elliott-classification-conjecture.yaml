statement:
  canonical: >
    Simple separable nuclear C*-algebras satisfying the Universal Coefficient
    Theorem (UCT) are classified by their Elliott invariant, which consists of
    ordered K-theory (K_0, K_0^+, [1]_{K_0}), K_1-group, and the tracial
    simplex together with the natural pairing between traces and K_0. In its
    most general form, the conjecture asks whether all simple separable nuclear
    C*-algebras satisfy the UCT, and whether the Elliott invariant suffices for
    classification without the UCT assumption.
  informal: >
    C*-algebras are algebras of operators on Hilbert spaces, fundamental in
    quantum mechanics and noncommutative geometry. Elliott conjectured that the
    "well-behaved" (nuclear) ones that are also simple (have no ideals) can be
    completely characterized by a small collection of algebraic and topological
    invariants. This was proved for those satisfying a technical condition (UCT),
    but whether all relevant C*-algebras satisfy UCT remains open.

why_it_matters: >
  The Elliott classification program has been one of the most successful
  long-term research programs in operator algebras. The recent breakthrough by
  Carrion, Gabe, Schafhauser, Tikuisis, and White (building on decades of work
  by many mathematicians) essentially resolved the conjecture for UCT algebras.
  However, the UCT problem -- whether all separable nuclear C*-algebras satisfy
  the UCT -- remains one of the most important open problems in operator
  algebras.

