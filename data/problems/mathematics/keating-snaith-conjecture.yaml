statement:
  canonical: >
    For each positive real k, the 2k-th moment of the Riemann zeta function on the critical
    line satisfies (1/T) integral_0^T |zeta(1/2 + it)|^{2k} dt ~ c_k (log T)^{k^2} as
    T -> infinity, where c_k is an explicit constant predicted by random matrix theory
    involving Barnes' G-function: c_k = g_k * a_k, with g_k from the CUE ensemble and a_k
    an arithmetic factor involving primes.
  informal: >
    The moments of the Riemann zeta function along the critical line grow like specific
    powers of log T, with precise constants predicted by modeling the zeta function as a
    random unitary matrix.

why_it_matters: >
  The Keating-Snaith conjecture (2000) provides a stunning bridge between number theory and
  random matrix theory. Confirming it would validate the deep analogy between the zeta function
  and random matrices. Only the cases k = 1 (Hardy-Littlewood) and k = 2 (Ingham) are proved.
  The conjecture has applications to the distribution of primes and L-functions.

