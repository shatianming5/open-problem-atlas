statement:
  canonical: >
    Let M_d denote the Hardy-Littlewood maximal operator on R^d. The conjecture
    asserts that for p > 1, the operator norm ||M_d||_{L^p -> L^p} is bounded
    by a constant C(p) independent of the dimension d. More broadly, various
    fundamental operators in harmonic analysis (Riesz transforms, maximal
    functions associated to convex bodies, etc.) are conjectured to have bounds
    that do not depend on the ambient dimension.
  informal: >
    The Hardy-Littlewood maximal function is one of the most basic tools in
    analysis, computing the maximal average of a function over balls. In high
    dimensions, one expects it to remain well-behaved. The conjecture says its
    operator norm on L^p spaces does not blow up as the dimension increases --
    the bound depends only on p, not on the dimension of the space.

why_it_matters: >
  Dimension-free estimates are a central theme in modern harmonic analysis,
  probability, and geometric functional analysis. They are crucial for extending
  results to infinite-dimensional settings (such as Gaussian measure spaces)
  and have applications to geometric inequalities, PDEs, and mathematical
  physics. Stein initiated this program and proved partial results, but the
  full conjecture remains open.

