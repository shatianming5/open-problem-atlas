statement:
  canonical: >
    There exists a universal constant c > 0 such that every convex body K in R^n of volume 1
    has a hyperplane section of (n-1)-dimensional volume at least c. Equivalently, the isotropic
    constant L_K of any convex body K in isotropic position satisfies L_K <= C for a universal
    constant C independent of dimension.
  informal: >
    Every high-dimensional convex body of unit volume can be sliced by a hyperplane to produce
    a cross-section whose area is bounded below by a universal constant, regardless of the
    dimension or shape of the body.

why_it_matters: >
  The slicing conjecture, raised by Bourgain (1986) and Milman, is one of the central open
  problems in asymptotic convex geometry and high-dimensional probability. It is equivalent to
  a uniform bound on isotropic constants and is implied by the KLS conjecture. Progress on it
  drives understanding of concentration of measure in high dimensions.

