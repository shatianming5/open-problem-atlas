statement:
  canonical: >
    For every epsilon > 0, there exists a constant c(epsilon) > 0 such that if x and y are
    positive integers with x^3 != y^2, then |x^3 - y^2| > c(epsilon) * x^{1/2 - epsilon}.
    The strong form asserts that |x^3 - y^2| > c * x^{1/2} for an absolute constant c > 0.
  informal: >
    When a perfect cube and a perfect square are not equal, the gap between them grows at
    least roughly as the square root of the cube. It is hard for a cube and a square to be
    very close together without being equal.

why_it_matters: >
  Hall's conjecture is a fundamental Diophantine inequality related to the abc conjecture
  and the theory of elliptic curves. It has direct implications for bounding solutions to
  Mordell's equation y^2 = x^3 + k.

