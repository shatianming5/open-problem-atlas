statement:
  canonical: >
    Determine the exact value of the Ramsey number R(5,5), the smallest integer n such
    that every 2-coloring of the edges of the complete graph K_n contains a monochromatic
    K_5. It is currently known that 43 <= R(5,5) <= 48.
  informal: >
    What is the smallest number of people you need to invite to a party to guarantee that
    either 5 of them all know each other, or 5 of them are all mutual strangers? The answer
    is known to be between 43 and 48.

why_it_matters: >
  Determining exact Ramsey numbers is notoriously difficult. Only R(1,k), R(2,k), R(3,k)
  for small k, and R(4,4)=18 are known exactly. Finding R(5,5) has been called one of the
  hardest open problems in combinatorics. Paul Erdos famously said that if aliens demanded
  we compute R(5,5) or face destruction, we should mobilize all our computers; but if they
  asked for R(6,6), we should prepare to fight.

