statement:
  canonical: >
    Every piecewise-polynomial function f: R^n -> R (i.e., a continuous function such that
    R^n can be partitioned into finitely many closed semialgebraic regions on each of which
    f agrees with a polynomial) can be expressed as a finite combination of polynomials using
    only the operations of max and min. Equivalently, f belongs to the lattice generated by
    the polynomial ring R[x_1,...,x_n] under sup and inf operations.
  informal: >
    Any continuous function that is polynomial on each piece of a finite partition of R^n can
    be written using max and min of finitely many polynomials.

why_it_matters: >
  The Pierce-Birkhoff conjecture (1956) lies at the intersection of real algebraic geometry,
  commutative algebra, and lattice-ordered rings. It is proved for n <= 2 by Mahé (1984) but
  remains open in higher dimensions. It connects to the theory of f-rings, real spectra, and
  semialgebraic geometry.

