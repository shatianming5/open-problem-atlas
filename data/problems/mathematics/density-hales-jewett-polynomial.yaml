statement:
  canonical: >
    Let k ≥ 2 be a positive integer. For any δ > 0, there exists N such
    that every subset A ⊆ [k]^N with |A| ≥ δ · k^N contains a combinatorial
    polynomial subspace of dimension 1. More precisely, A contains a
    "polynomial combinatorial line," generalizing the notion of combinatorial
    lines in the density Hales-Jewett theorem to polynomial patterns.
  informal: >
    The density Hales–Jewett theorem (proved by the Polymath project) says
    that dense subsets of high-dimensional grids contain combinatorial lines.
    The polynomial version asks whether the same holds for polynomial patterns,
    which would vastly generalize Bergelson–Leibman type results.

why_it_matters: >
  The polynomial density Hales–Jewett conjecture would be a far-reaching
  extension of the density Hales–Jewett theorem and the polynomial
  Szemerédi theorem. It would provide a unified combinatorial framework
  for polynomial recurrence results in ergodic theory and has connections
  to theoretical computer science and additive combinatorics.

