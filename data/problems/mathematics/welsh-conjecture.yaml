statement:
  canonical: >
    Let m_n denote the number of matroids on an n-element ground set. Welsh conjectured that
    the sequence log(m_n)/n^2 converges, and more generally asked for the asymptotic growth
    rate of the number of matroids. It is known that log(m_n)/n^2 is bounded between positive
    constants. The conjecture is that the limit exists and equals a specific constant.
  informal: >
    How many matroids are there on n elements? The number grows super-exponentially, roughly
    as 2^{cn^2}. Welsh conjectured that the growth rate (in a logarithmic sense) converges
    to a precise constant.

why_it_matters: >
  Understanding the number of matroids is a fundamental question in matroid theory and
  enumerative combinatorics. The explosive growth means most matroids are "wild" and not
  representable over any field. Welsh's conjecture guides research on the structure of
  typical matroids and has connections to entropy methods in combinatorics.

