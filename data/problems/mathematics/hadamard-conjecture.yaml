statement:
  canonical: >
    A Hadamard matrix of order n is an n x n matrix H with entries in {-1, +1} satisfying
    H H^T = n I_n. Hadamard's conjecture asserts that a Hadamard matrix of order n exists
    for every positive integer n that is divisible by 4 (and also for n = 1 and n = 2).
  informal: >
    A Hadamard matrix is a square matrix whose entries are all +1 or -1, and whose rows are
    mutually orthogonal. Such matrices can only exist in sizes 1, 2, or multiples of 4.
    The conjecture is that they exist for every multiple of 4.

why_it_matters: >
  Hadamard matrices have wide applications in signal processing, coding theory, combinatorial
  designs, and quantum computing. They achieve the maximum possible determinant for matrices
  with bounded entries (Hadamard's maximum determinant problem). Their existence for all
  multiples of 4 would resolve a fundamental question in combinatorial design theory.

