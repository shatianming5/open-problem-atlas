statement:
  canonical: >
    The original Rota-Welsh conjecture — that the absolute values of coefficients of the
    characteristic polynomial of any matroid form a log-concave sequence — was proved by
    Adiprasito, Huh, and Katz (2018). The extended conjecture asks whether the same sequence
    is ultra-log-concave: |a_k|^2 >= (1 + 1/k)(1 + 1/(r-k)) |a_{k-1}| |a_{k+1}| for all
    relevant k, where r is the rank. This stronger property remains open for general matroids.
  informal: >
    The coefficients of the characteristic polynomial of a matroid are log-concave (proved).
    The remaining open question is whether a stronger "ultra-log-concavity" property holds,
    which would imply even tighter control on coefficient ratios.

why_it_matters: >
  The resolution of the Rota-Welsh conjecture by Adiprasito, Huh, and Katz was a landmark
  achievement connecting combinatorics to algebraic geometry (June Huh's Fields Medal 2022).
  The remaining ultra-log-concavity extension would complete the picture and has implications
  for combinatorial probability and negative dependence theory.

