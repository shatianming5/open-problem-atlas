statement:
  canonical: >
    A positive integer n is prime if and only if it satisfies
    sum_{k=1}^{n-1} k^{n-1} ≡ -1 (mod n). Equivalently, a composite number n satisfying
    this sum condition (called a Giuga number) does not exist. The conjecture also has
    Agoh's equivalent formulation: n is prime if and only if n * B_{n-1} ≡ -1 (mod n),
    where B_k denotes the k-th Bernoulli number.
  informal: >
    If you sum 1^{n-1} + 2^{n-1} + ... + (n-1)^{n-1} and the result is -1 modulo n,
    then n must be prime. No composite number can produce this sum. The conjecture says
    this power-sum condition perfectly characterizes primality.

why_it_matters: >
  The Agoh-Giuga conjecture provides an elegant characterization of primes through power
  sums and Bernoulli numbers. Its resolution would give a new theoretical primality criterion
  and deepen understanding of the interplay between combinatorial sums and divisibility.

