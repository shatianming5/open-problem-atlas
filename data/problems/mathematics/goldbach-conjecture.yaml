statement:
  canonical: >
    Every even integer greater than 2 can be expressed as the sum of two prime numbers.
    That is, for every even integer n > 2, there exist primes p and q such that n = p + q.
  informal: >
    Every even number bigger than 2 can be written as the sum of two primes. For example,
    4 = 2+2, 6 = 3+3, 8 = 3+5, 10 = 5+5 = 3+7. The conjecture says this pattern never stops.

why_it_matters: >
  Goldbach's conjecture, proposed in 1742, is one of the oldest unsolved problems in number
  theory and all of mathematics. It sits at the heart of additive number theory and is connected
  to deep questions about the distribution of primes and the structure of the integers.

