statement:
  canonical: >
    Let E be an elliptic curve over the rationals Q, and let L(E, s) be its Hasse-Weil
    L-function. The Birch and Swinnerton-Dyer conjecture asserts that:
    (1) The analytic rank of E (the order of vanishing of L(E, s) at s = 1) equals the
    algebraic rank of E(Q) (the rank of the Mordell-Weil group).
    (2) The leading coefficient of the Taylor expansion of L(E, s) at s = 1 is given by a
    precise formula involving the order of the Tate-Shafarevich group, the real period,
    the regulator, and the Tamagawa numbers.
  informal: >
    For an elliptic curve (a certain type of cubic equation) defined over the rational numbers,
    there is a deep connection between the number of rational solutions and the behavior of an
    associated analytic function (the L-function) at a specific point. The conjecture gives an
    exact recipe relating these algebraic and analytic quantities.

why_it_matters: >
  The BSD conjecture is one of the seven Millennium Prize Problems. It provides a bridge
  between the arithmetic of elliptic curves and their analytic properties, unifying algebraic
  geometry, number theory, and analysis. Elliptic curves are fundamental objects in modern
  number theory, playing a key role in the proof of Fermat's Last Theorem and in cryptography.

