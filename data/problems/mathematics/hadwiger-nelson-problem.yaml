statement:
  canonical: >
    What is the minimum number of colors needed to color all points of the Euclidean plane
    such that no two points at distance exactly 1 from each other share the same color?
    Equivalently, what is the chromatic number chi(G) of the unit-distance graph of the plane?
    It is known that 5 <= chi <= 7.
  informal: >
    How many colors do you need to paint the plane so that no two points exactly 1 unit apart
    share the same color? The answer is known to be between 5 and 7, but the exact value remains
    unknown.

why_it_matters: >
  The Hadwiger-Nelson problem, first posed around 1950, is one of the most famous open problems
  in combinatorial geometry. It connects discrete geometry, graph theory, and measure theory.
  Despite its simple statement, it has resisted resolution for over 70 years. In 2018, Aubrey
  de Grey made a breakthrough by improving the lower bound from 4 to 5, the first improvement
  since the problem was posed.

