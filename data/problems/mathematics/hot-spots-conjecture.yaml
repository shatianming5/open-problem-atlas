statement:
  canonical: >
    For a bounded, connected planar domain D with smooth boundary, the second Neumann eigenfunction
    of the Laplacian attains its maximum and minimum on the boundary of D. Equivalently, if
    heat diffuses in D with insulating boundary conditions, the hottest and coldest points
    eventually migrate to the boundary for generic initial conditions.
  informal: >
    If you heat a flat, insulated metal plate, the hottest and coldest spots will eventually
    end up on the boundary, not in the interior. This is conjectured to hold for all convex
    domains, but the general case for simply connected domains is open.

why_it_matters: >
  The hot spots conjecture, posed by J. Rauch (1974), lies at the intersection of PDE theory,
  spectral geometry, and probability. It has stimulated research on nodal domains, probabilistic
  coupling methods, and spectral properties of the Laplacian. It remains open even for general
  simply connected planar domains.

