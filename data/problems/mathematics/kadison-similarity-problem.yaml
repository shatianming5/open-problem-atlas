statement:
  canonical: >
    Let A be a C*-algebra and let pi: A -> B(H) be a bounded unital
    homomorphism into the bounded operators on a Hilbert space H. Is pi
    necessarily similar to a *-homomorphism? That is, does there exist an
    invertible operator S in B(H) such that rho(a) = S^{-1} pi(a) S is a
    *-homomorphism for all a in A?
  informal: >
    When you represent a C*-algebra (a special algebra of operators) as
    operators on a Hilbert space, a well-behaved representation preserves the
    adjoint operation. Kadison asked whether every bounded (but not necessarily
    adjoint-preserving) representation can be "corrected" by a change of basis
    to become adjoint-preserving.

why_it_matters: >
  Kadison's similarity problem, posed in 1955, is one of the most prominent
  unsolved problems in operator algebra theory. It is equivalent to several
  other important problems: every derivation from a C*-algebra into B(H) is
  inner, and it is related to the Dixmier problem for groups. Haagerup's work
  showed it holds for cyclic representations and for nuclear C*-algebras.

