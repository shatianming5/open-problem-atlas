statement:
  canonical: >
    Consider a monotone Boolean function f: {0,1}^n -> {0,1} that is balanced (Pr[f=1] ~ 1/2).
    If f has no "influential" variable (the influence of each variable is at most epsilon),
    then f is noise-sensitive: for any delta > 0, the correlation between f(x) and f(x^delta)
    tends to 0 as epsilon -> 0, where x^delta is obtained from x by independently flipping each
    bit with probability delta. More precisely, f is noise-sensitive if and only if the sum of
    squared Fourier coefficients above level k tends to zero for fixed k.
  informal: >
    Boolean functions where no single variable has much influence are easily corrupted by
    random noise — a small amount of random bit-flipping destroys the correlation with the
    original output.

why_it_matters: >
  Kalai's conjecture and related work by Benjamini, Kalai, and Schramm (1999) connects Boolean
  function analysis to probability theory, social choice theory, and percolation theory. It has
  applications to the hardness of approximation, voting theory (Arrow's theorem extensions),
  and critical phenomena in statistical mechanics.

