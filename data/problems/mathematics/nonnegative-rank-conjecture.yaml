statement:
  canonical: >
    For a polytope P, the extension complexity xc(P) is the minimum number of facets of
    any polytope Q that linearly projects onto P. Yannakakis showed xc(P) equals the
    nonnegative rank of the slack matrix of P. The open question is to determine the
    extension complexity of fundamental polytopes: in particular, does the matching polytope
    of K_n have extension complexity 2^{Omega(n)}, and what is the extension complexity of
    the TSP polytope?
  informal: >
    How efficiently can combinatorial optimization polytopes be represented as projections
    of simpler polytopes? Understanding this determines the power of linear programming
    for combinatorial optimization.

why_it_matters: >
  Extension complexity bridges combinatorial optimization and convex geometry. Rothvoss (2017)
  proved that the matching polytope has exponential extension complexity, resolving a major
  open question. But many related questions remain: the extension complexity of the TSP
  polytope, the cut polytope, and the role of semidefinite extended formulations are open.

