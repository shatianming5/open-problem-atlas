statement:
  canonical: >
    For every theta < 1 and every A > 0, the sum over q <= x^theta of the maximum over
    (a,q)=1 of |pi(x; q, a) - li(x)/phi(q)| is O(x / (log x)^A), where pi(x; q, a) counts
    primes up to x congruent to a mod q. The Bombieri-Vinogradov theorem establishes this
    for theta < 1/2; the conjecture extends it to all theta < 1.
  informal: >
    Primes are equidistributed among arithmetic progressions to a much greater extent than
    currently provable. The conjecture extends the Bombieri-Vinogradov theorem from moduli
    up to sqrt(x) to moduli nearly as large as x.

why_it_matters: >
  The Elliott-Halberstam conjecture (1968) is a major open problem in analytic number theory.
  It would have dramatic consequences: Goldston, Pintz, and Yildirim showed that EH implies
  bounded gaps between primes (later proved unconditionally by Zhang and Maynard). A full proof
  of EH would yield twin primes separated by at most 6.

