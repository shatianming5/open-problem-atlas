statement:
  canonical: >
    For every multigraph G, the list chromatic index equals the chromatic index:
    chi'_l(G) = chi'(G). Equivalently, if the edges of a graph can be properly colored
    with k colors, then they can be properly colored even if each edge has its own
    list of k available colors.
  informal: >
    Edge coloring with lists is no harder than ordinary edge coloring. If k colors
    suffice for a proper edge coloring, then you can still color properly even when
    each edge is restricted to its own palette of k colors.

why_it_matters: >
  The List Coloring Conjecture, independently posed by several researchers in the 1970s
  and 1980s, is a major open problem connecting list coloring with ordinary coloring.
  If true, it would unify many results about edge-coloring. It implies that Vizing's
  theorem extends to list edge-coloring: the list chromatic index of a simple graph is
  at most Delta + 1.

