statement:
  canonical: >
    Determine the Davenport constant D(G) for general finite abelian groups G. For a finite
    abelian group G = Z_{n_1} x Z_{n_2} x ... x Z_{n_r} with n_1 | n_2 | ... | n_r, it is
    conjectured that D(G) = 1 + sum_{i=1}^{r} (n_i - 1). The Davenport constant D(G) is the
    smallest integer d such that every sequence of d elements from G contains a nonempty
    subsequence summing to the identity.
  informal: >
    Given a finite abelian group, how long does a sequence of elements need to be before it
    must contain some nonempty subset that sums to zero? The conjectured answer is determined
    by the group's invariant factor decomposition, but this remains unproven in general.

why_it_matters: >
  The Erdos-Ginzburg-Ziv theorem (1961) proved D(Z_n) = 2n - 1, establishing the foundation
  of zero-sum theory. Determining the Davenport constant for general groups is a central
  problem in additive combinatorics with connections to factorization theory in algebraic
  number theory, coding theory, and the structure of abelian groups.

