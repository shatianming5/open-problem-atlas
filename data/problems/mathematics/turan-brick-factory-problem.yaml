statement:
  canonical: >
    Determine the crossing number cr(K_{m,n}) of the complete bipartite graph K_{m,n}.
    The conjecture states that cr(K_{m,n}) = floor(m/2) * floor((m-1)/2) * floor(n/2) * floor((n-1)/2),
    which is the number of crossings in the natural drawing of K_{m,n}.
  informal: >
    What is the minimum number of edge crossings when drawing the complete bipartite graph
    K_{m,n} in the plane? Turan conjectured that the obvious symmetric drawing is optimal.

why_it_matters: >
  Turan's brick factory problem, originating from his work in a forced labor camp during
  World War II, is one of the oldest and most fundamental open problems in topological
  graph theory. It led to the development of crossing number theory, which has applications
  in VLSI design, network visualization, and computational geometry.

