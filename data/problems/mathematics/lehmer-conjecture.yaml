statement:
  canonical: >
    There exists an absolute constant c > 0 such that for every monic
    irreducible polynomial P(x) in Z[x] that is not a cyclotomic polynomial,
    the Mahler measure M(P) = prod_{i} max(1, |alpha_i|), where the alpha_i are
    the roots of P, satisfies M(P) >= 1 + c. Equivalently, the infimum of
    Mahler measures of non-cyclotomic integer polynomials is strictly greater
    than 1, and is conjectured to be Lehmer's number,
    M(x^10 + x^9 - x^7 - x^6 - x^5 - x^4 - x^3 + x + 1) ~ 1.17628.
  informal: >
    The Mahler measure of a polynomial is a way to measure its "size" using its
    roots. For cyclotomic polynomials (whose roots are roots of unity), this
    measure equals 1. Lehmer asked whether there is a gap -- is there a minimum
    amount by which the Mahler measure of any other integer polynomial must
    exceed 1?

why_it_matters: >
  Lehmer's conjecture, posed in 1933, connects number theory, algebraic
  dynamics, and harmonic analysis. The Mahler measure appears in heights of
  algebraic numbers, entropy of algebraic dynamical systems, volumes of
  hyperbolic 3-manifolds, and values of L-functions. A resolution would have
  implications across these diverse areas.

