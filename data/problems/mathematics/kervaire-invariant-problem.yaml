statement:
  canonical: >
    Does there exist a framed manifold of dimension 126 with Kervaire
    invariant one? The Kervaire invariant θ_j ∈ π^s_{2^{j+1}-2} exists
    only in dimensions 2^{j+1} - 2. Hill, Hopkins, and Ravenel (2016)
    proved that framed manifolds with Kervaire invariant one do not exist
    in dimensions 2^{j+1} - 2 for j ≥ 7 (i.e., dimensions ≥ 254). The
    problem is resolved positively in dimensions 2, 6, 14, 30, and 62,
    leaving dimension 126 as the sole remaining open case.
  informal: >
    A classical topological invariant called the Kervaire invariant is known
    to be nontrivial in certain specific dimensions. The question of whether
    it is nontrivial in dimension 126 is the last unsettled case.

why_it_matters: >
  The Kervaire invariant problem is one of the most celebrated questions in
  stable homotopy theory and geometric topology. The resolution by Hill,
  Hopkins, and Ravenel of all cases except dimension 126 was a landmark
  achievement that introduced powerful new techniques in equivariant stable
  homotopy theory. The remaining dimension 126 case is a fundamental open
  question with deep connections to exotic spheres and surgery theory.

