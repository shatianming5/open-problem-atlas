statement:
  canonical: >
    Every finite simple directed graph (with no loops or parallel edges) has a vertex v
    whose second neighborhood (the set of vertices reachable from v by a directed path
    of length exactly 2, but not directly from v) is at least as large as its first
    neighborhood (out-neighborhood). That is, there exists v with |N^+(N^+(v)) \ N^+(v)| >= |N^+(v)|.
  informal: >
    In any directed graph, there is always some vertex that has at least as many
    "friends of friends" (reachable in exactly two steps, excluding direct neighbors)
    as it has direct friends (outgoing neighbors).

why_it_matters: >
  Seymour's second neighborhood conjecture, posed in the 1990s, is a fundamental open
  problem about the structure of directed graphs. It has connections to tournament theory,
  network structure, and influence propagation. Despite its simple statement, it has
  resisted proof for general digraphs.

