statement:
  canonical: >
    Let X be a smooth projective variety (or more generally a projective
    variety with at most terminal singularities) over an algebraically closed
    field. If the canonical divisor K_X is nef (non-negatively intersecting
    every curve), then K_X is semi-ample, meaning some positive multiple mK_X
    is base-point free and defines a morphism. In particular, the Kodaira
    dimension equals the numerical Kodaira dimension: kappa(X) = nu(X).
  informal: >
    In algebraic geometry, the canonical divisor of a variety measures its
    intrinsic curvature. The abundance conjecture says that if this curvature
    is "non-negative in a weak sense" (nef), then it is actually "effective
    enough" to define a meaningful geometric map -- the variety fibers nicely
    over a lower-dimensional space determined by its curvature.

why_it_matters: >
  The abundance conjecture is one of the most important open problems in
  birational geometry and the minimal model program (MMP). The MMP reduces the
  study of algebraic varieties to minimal models, but the usefulness of minimal
  models depends on abundance. Without it, the MMP remains incomplete. The
  conjecture is known in dimensions up to 3 (Miyaoka, Kawamata) but open in
  dimension 4 and above.

