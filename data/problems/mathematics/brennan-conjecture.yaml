statement:
  canonical: >
    Let f be a conformal (univalent) map from a simply connected domain Omega (not equal to C)
    onto the unit disk. Then the integral of |f'|^p over Omega is finite for all
    -1/3 < p - 2 < 1, i.e., for 4/3 < p < 3. Equivalently, for the inverse map g = f^{-1}
    from the disk to Omega, the integral of |g'|^t over the disk is finite for all t < 3 + epsilon.
    The critical exponent p = 3 (equivalently t = 3) is the conjectured boundary.
  informal: >
    Derivatives of conformal maps should be integrable to certain powers. Brennan's conjecture
    pinpoints the exact range of powers for which this integrability holds.

why_it_matters: >
  Brennan's conjecture (1978) is a central problem in geometric function theory and complex
  analysis. It relates to the fine boundary behavior of conformal maps, the integral means
  spectrum, and has connections to the universal integral means spectrum (Kraetzer's conjecture).
  It generalizes and sharpens classical results of the Bieberbach theory.

