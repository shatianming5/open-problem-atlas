statement:
  canonical: >
    Classify all irreducible unitary representations of a real reductive Lie
    group G. That is, determine the unitary dual G-hat = {equivalence classes
    of irreducible unitary representations of G on Hilbert spaces} for all
    real reductive groups G. The problem remains open for general real
    reductive groups beyond the classical groups of small rank.
  informal: >
    A "representation" describes how a symmetry group can act on a vector
    space by rotations and reflections. The unitary dual problem asks for a
    complete list of all the basic (irreducible) ways a given Lie group can
    act while preserving lengths and angles (unitarily). This is the
    fundamental classification problem in representation theory.

why_it_matters: >
  The classification of unitary representations is one of the central problems
  in mathematics, with applications to number theory (automorphic forms),
  physics (quantum mechanics), and harmonic analysis. Despite Vogan's program
  and major advances including the Atlas of Lie Groups project (computing
  unitary duals algorithmically for specific groups), the general problem
  remains open. It connects to the Langlands program and the theory of
  automorphic forms.

