statement:
  canonical: >
    For origin-symmetric convex bodies K and L in R^n and lambda in [0,1],
    the inequality Vol((1-lambda) cdot K +_0 lambda cdot L) >= Vol(K)^{1-lambda} Vol(L)^lambda
    holds, where +_0 denotes the log-Minkowski addition (geometric mean of support functions).
    Equivalently, the cone-volume measure satisfies a log-concavity property stronger than the
    classical Brunn-Minkowski inequality.
  informal: >
    The conjecture proposes a multiplicative (logarithmic) strengthening of the classical
    Brunn-Minkowski inequality for origin-symmetric convex bodies, replacing the usual
    Minkowski addition with a geometric-mean operation on support functions.

why_it_matters: >
  The log-Brunn-Minkowski conjecture, proposed by Boroczky, Lutwak, Yang, and Zhang (2012),
  would unify and strengthen several fundamental inequalities in convex geometry. It implies
  the B-conjecture, the log-Minkowski inequality, and the uniqueness of the cone-volume measure.
  It represents the deepest conjectured strengthening of the Brunn-Minkowski inequality.

