statement:
  canonical: >
    For every centrally symmetric convex body K in R^n, the volume product
    Vol(K) * Vol(K^o) >= 4^n / n!, where K^o is the polar body of K. Equality is conjectured
    to hold if and only if K is a hypercube (or its affine image). In the non-symmetric case,
    the conjectured minimum is (n+1)^{n+1} / (n!)^2, achieved by the simplex.
  informal: >
    Among all centrally symmetric convex bodies, the hypercube (and its dual, the cross-polytope)
    should minimize the product of the volume of the body and the volume of its polar dual.

why_it_matters: >
  Mahler's conjecture (1939) is a central open problem in convex geometry and geometric
  functional analysis. The reverse direction (the Blaschke-Santalo inequality, maximizing
  the volume product) is long established. The conjecture has connections to number theory,
  symplectic geometry, and information theory.

