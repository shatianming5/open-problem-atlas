statement:
  canonical: >
    A Banach space X has the Radon-Nikodym property (RNP) if and only if every X-valued
    measure of bounded variation that is absolutely continuous with respect to a scalar
    measure has a Radon-Nikodym derivative (density). Uhl's conjecture characterizes which
    Banach spaces have the RNP in terms of geometric properties: X has RNP if and only if
    every closed bounded convex subset of X is the closed convex hull of its strongly
    exposed points.
  informal: >
    Which Banach spaces have the property that vector-valued measures always have densities?
    The conjecture connects this analytic property to the geometry of convex sets in the space.

why_it_matters: >
  The Radon-Nikodym property is one of the most important properties in the interaction
  between measure theory and Banach space geometry. Understanding which spaces have RNP
  connects to probability (martingale convergence), optimization (dentability of convex sets),
  and harmonic analysis (vector-valued singular integrals).

