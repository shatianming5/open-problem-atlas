statement:
  canonical: >
    A hiker is lost in a forest whose shape is known to be a convex region D in the plane.
    The hiker knows the shape and size of D but not their position or orientation within it.
    What is the shortest path the hiker can follow to guarantee reaching the boundary of D?
    The problem asks for the infimum over all curves gamma of the maximum over all positions
    and orientations of the distance traveled along gamma before exiting D.
  informal: >
    You are lost in a forest of known shape but unknown position and direction. What is the
    shortest path you can walk to guarantee escaping the forest, no matter where you started
    and which way you are facing?

why_it_matters: >
  Bellman's lost-in-a-forest problem, posed by Richard Bellman in 1956, is a fundamental
  unsolved problem in geometric optimization and search theory. Even for simple forest
  shapes (such as a strip of known width, a disk, or a half-plane), optimal solutions are
  not known in general. The problem has connections to computational geometry, optimal
  control theory, and the theory of pursuit-evasion games.

