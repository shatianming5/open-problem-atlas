partial_results:
  - summary: "For an infinite strip of width 1, the optimal path has length at most sqrt(2) + pi/6 * sqrt(3) ≈ 2.3229, achieved by a zigzag-and-turn strategy."
    year: 1961
  - summary: "Finch and Wetzel established bounds for several specific forest shapes."
    year: 2004
  - summary: "Ward improved bounds for the half-plane case, showing the optimal escape path length is between 6.3972 and 13.8119."
