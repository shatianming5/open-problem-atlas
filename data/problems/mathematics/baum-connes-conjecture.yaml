statement:
  canonical: >
    For every second-countable locally compact group G, the assembly map
    μ: K^G_*(EG) → K_*(C*_r(G)) from the equivariant K-homology of the
    classifying space for proper G-actions to the K-theory of the reduced
    group C*-algebra is an isomorphism.
  informal: >
    There is a natural map from the topology of a group (its classifying
    space) to the algebra of the group (its C*-algebra). The Baum–Connes
    conjecture says this map is always a perfect correspondence — it is
    an isomorphism in K-theory.

why_it_matters: >
  The Baum–Connes conjecture unifies index theory, representation theory,
  and topology. It implies the Novikov conjecture on higher signatures
  and the Kadison–Kaplansky idempotent conjecture. The conjecture with
  coefficients was disproved by counterexamples from Higson, Lafforgue,
  and Skandalis (2002), but the original conjecture without coefficients
  remains open.

