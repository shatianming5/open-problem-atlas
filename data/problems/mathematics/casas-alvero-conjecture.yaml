statement:
  canonical: >
    Let f(x) be a monic polynomial of degree n over a field of characteristic zero. If f
    shares a common root with each of its derivatives f'(x), f''(x), ..., f^{(n-1)}(x),
    then f(x) = (x - a)^n for some a. Equivalently, a degree-n polynomial over C that has
    a common root with every one of its first n-1 derivatives must be a perfect n-th power.
  informal: >
    If a polynomial shares a root with each of its derivatives (first, second, ..., up to
    the (n-1)-st), then it must be a power of a linear factor.

why_it_matters: >
  The Casas-Alvero conjecture (2001) is a deceptively simple-looking problem in commutative
  algebra and algebraic geometry. Despite its elementary statement, it has resisted proof for
  over two decades. It has connections to the theory of polynomial maps, jet spaces, and
  the Jacobian conjecture. It is verified for degrees up to 12 and for prime power degrees.

