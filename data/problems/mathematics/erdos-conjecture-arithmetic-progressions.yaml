statement:
  canonical: >
    If A is a set of positive integers such that the sum of reciprocals sum_{a in A} 1/a
    diverges, then A contains arbitrarily long arithmetic progressions.
  informal: >
    If you have a set of positive integers that is "large" in the sense that the sum of
    their reciprocals is infinite (like the primes), then the set must contain arithmetic
    progressions of every possible length. This would vastly generalize the Green-Tao
    theorem on primes.

why_it_matters: >
  This conjecture, posed by Erdos and Turan, is one of the most famous open problems in
  additive combinatorics and number theory. It would unify and vastly generalize
  Szemeredi's theorem (every set of positive upper density contains arbitrarily long
  arithmetic progressions) and the Green-Tao theorem (the primes contain arbitrarily long
  arithmetic progressions). Erdos offered $5,000 for its solution, his largest prize.

