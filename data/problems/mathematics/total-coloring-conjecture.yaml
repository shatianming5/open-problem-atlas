statement:
  canonical: >
    For every simple graph G with maximum degree Delta(G), the total chromatic number
    chi''(G) satisfies chi''(G) <= Delta(G) + 2. The total chromatic number is the minimum
    number of colors needed to color both the vertices and edges of G so that no two adjacent
    or incident elements share the same color.
  informal: >
    If you want to color both the vertices and edges of a graph so that no two neighboring
    elements share a color, you never need more than Delta + 2 colors, where Delta is the
    maximum degree.

why_it_matters: >
  The Total Coloring Conjecture, independently posed by Behzad (1965) and Vizing (1968),
  is one of the most famous open problems in graph coloring. The trivial lower bound is
  Delta + 1, and the conjecture asserts that at most one extra color suffices. It has been
  verified for many graph classes but remains open in general.

