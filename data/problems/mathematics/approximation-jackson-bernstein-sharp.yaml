statement:
  canonical: >
    Determine the sharp constants in the Jackson-type inequality for trigonometric polynomial
    approximation: for the best approximation E_n(f)_p of a function f in L^p[0, 2pi] by
    trigonometric polynomials of degree at most n, establish the optimal constant C(r, p) in
    E_n(f)_p <= C(r, p) * omega_r(f, 1/n)_p / n^r for all r >= 1, 1 <= p <= infinity, where
    omega_r is the r-th modulus of smoothness. The sharp constants are known only in special
    cases (r=1, p=infinity by Favard-Akhiezer-Krein).
  informal: >
    How well can smooth functions be approximated by trigonometric polynomials? The best possible
    constant relating approximation error to smoothness is known only in a few cases.

why_it_matters: >
  The Jackson and Bernstein theorems are cornerstones of approximation theory, establishing
  the relationship between smoothness of functions and speed of approximation. Determining
  sharp constants has been pursued since the early 20th century and connects to extremal
  problems in analysis, spline theory, and numerical methods.

