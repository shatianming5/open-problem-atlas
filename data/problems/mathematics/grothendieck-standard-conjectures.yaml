statement:
  canonical: >
    Grothendieck's standard conjectures consist of four related conjectures for smooth projective
    varieties: (A) the Lefschetz standard conjecture - the inverse of the hard Lefschetz
    isomorphism in cohomology is induced by an algebraic correspondence; (B) the conjecture
    of Hodge type - a certain quadratic form on algebraic cycles defined via intersection
    pairing is positive definite on primitive classes; (C) the Kunneth standard conjecture -
    the Kunneth components of the diagonal are algebraic; (D) numerical and homological
    equivalence coincide for algebraic cycles.
  informal: >
    These conjectures assert that deep topological structures on the cohomology of algebraic
    varieties (like the Lefschetz decomposition) have purely algebraic origins, bridging topology
    and algebra in a canonical way.

why_it_matters: >
  Grothendieck proposed these conjectures in 1968 as the foundation for his theory of motives.
  They would establish the algebraicity of many cohomological constructions and would imply the
  Weil conjectures (now proved by other means), the Hodge conjecture in certain cases, and provide
  the basis for a universal cohomology theory. They remain among the deepest open problems in
  algebraic geometry.

