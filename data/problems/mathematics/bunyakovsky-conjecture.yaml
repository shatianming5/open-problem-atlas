statement:
  canonical: >
    Let f(x) be an irreducible polynomial of degree at least 1 with integer coefficients and
    positive leading coefficient. If the set of values {f(1), f(2), f(3), ...} has no common
    factor greater than 1 (i.e., gcd(f(1), f(2), f(3), ...) = 1), then f(n) is prime for
    infinitely many positive integers n.
  informal: >
    If you have a polynomial with integer coefficients that cannot be factored further, and
    there is no single number greater than 1 that divides all of its positive-integer outputs,
    then the polynomial must produce infinitely many prime values.

why_it_matters: >
  The Bunyakovsky conjecture is a fundamental generalization of Dirichlet's theorem on primes
  in arithmetic progressions to polynomials of arbitrary degree. Its resolution would unify
  many known and conjectured results about prime-generating polynomials.

