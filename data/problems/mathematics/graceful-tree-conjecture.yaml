statement:
  canonical: >
    Every tree with n edges admits a graceful labeling. That is, for every tree T with n edges,
    there exists an injective function f: V(T) -> {0, 1, ..., n} such that the set of values
    {|f(u) - f(v)| : uv in E(T)} equals {1, 2, ..., n}.
  informal: >
    Label the vertices of any tree using distinct numbers from 0 to n (where n is the number of
    edges). The conjecture claims you can always choose the labels so that the differences along
    the edges are exactly the numbers 1, 2, ..., n, each appearing exactly once.

why_it_matters: >
  The graceful tree conjecture, proposed by Ringel in 1963 and refined by Kotzig and Rosa,
  is a central open problem in graph labeling theory. A proof would imply Ringel's conjecture
  that the complete graph K_{2n+1} can be decomposed into 2n+1 copies of any given tree with
  n edges. It has spawned a rich subfield of combinatorics.

