statement:
  canonical: >
    For reductive groups G and H over a number field F, every homomorphism of L-groups
    r: ^L H -> ^L G should induce a transfer of automorphic representations from H to G.
    More precisely, if pi is an automorphic representation of H(A_F) with L-parameter phi_pi,
    then there exists an automorphic representation Pi of G(A_F) with L-parameter r ∘ phi_pi.
  informal: >
    There should be a systematic way to transfer automorphic forms between different algebraic
    groups, governed by homomorphisms between their dual groups. This "functoriality principle"
    is the central organizing conjecture of the Langlands program.

why_it_matters: >
  The Langlands functoriality conjecture, proposed by Robert Langlands in 1970, is one of the
  most ambitious conjectures in mathematics. It unifies number theory, representation theory,
  and algebraic geometry. Specific instances include the Artin conjecture, the Ramanujan-Petersson
  conjecture, and Serre's modularity conjecture. It subsumes much of modern number theory.

