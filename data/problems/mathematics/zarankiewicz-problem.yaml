statement:
  canonical: >
    Determine the exact value of the Zarankiewicz number z(m,n;s,t), defined as the maximum
    number of 1s in an m x n binary matrix that contains no s x t all-ones submatrix.
    Equivalently, determine the Turan number ex(n; K_{s,t}), the maximum number of edges
    in a bipartite graph on n+n vertices containing no K_{s,t} subgraph. In particular,
    the exact asymptotics of ex(n; K_{s,t}) for general s,t remain unknown.
  informal: >
    How many edges can a bipartite graph have while avoiding a complete bipartite subgraph
    K_{s,t}? The Kovari-Sos-Turan theorem gives an upper bound, but matching constructions
    exist only for special cases.

why_it_matters: >
  The Zarankiewicz problem is a central question in extremal graph theory, connecting to
  incidence geometry, algebraic combinatorics, and additive number theory. The gap between
  upper and lower bounds for general parameters has persisted for decades and resolving it
  would have major implications for Turan-type extremal problems.

