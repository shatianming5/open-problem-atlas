    year: 1954
  - summary: "Algebraic constructions match the upper bound for K_{2,2}, K_{3,3}, and K_{2,t} for all t, using finite geometry."
    year: 1966
  - summary: "Kollar, Ronyai, and Szabo gave matching lower bounds for ex(n; K_{s,t}) when t > (s-1)! using algebraic constructions."
    year: 1996
  - summary: "Bukh and Conlon improved upper bounds for K_{s,t} when t is moderately large relative to s using random algebraic methods."
