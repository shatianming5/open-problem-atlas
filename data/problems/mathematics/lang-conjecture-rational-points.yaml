statement:
  canonical: >
    Let X be a smooth projective variety of general type defined over a number
    field K. Then the set of K-rational points X(K) is not Zariski dense in X.
    More precisely, there exists a proper closed subvariety Z subset X such
    that X(K) subset Z(K), i.e., all but finitely many rational points lie on
    a proper subvariety.
  informal: >
    Varieties of general type are the "most curved" algebraic varieties, the
    higher-dimensional analogues of hyperbolic curves. Lang conjectured that
    such varieties over number fields can only have a "sparse" set of rational
    points -- they must all be confined to a fixed lower-dimensional subset.
    This vastly generalizes Faltings' theorem (Mordell conjecture) from curves
    to higher dimensions.

why_it_matters: >
  Lang's conjecture, formulated in the 1970s-80s, is one of the grand
  conjectures in arithmetic geometry linking the geometry of varieties (via
  Kodaira dimension) to the arithmetic of their rational points. It would
  unify and extend Faltings' theorem, the Bombieri-Lang conjecture, and
  provide a geometric framework for understanding Diophantine equations in
  higher dimensions.

