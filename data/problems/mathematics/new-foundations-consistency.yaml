statement:
  canonical: >
    Is Quine's set theory NF (New Foundations) consistent relative to
    standard set-theoretic axioms? NF is the set theory with a universal
    set, stratified comprehension, and extensionality. The question is
    whether NF is consistent relative to ZFC or to some natural extension
    of ZFC. Holmes (2012+) has claimed a proof of consistency of NF, which
    is being formalized in Lean, but the proof has not yet been fully
    verified and published in a peer-reviewed journal.
  informal: >
    Quine proposed an alternative set theory in 1937 that allows a universal
    set (the set of all sets). Despite decades of study, nobody has been
    able to prove whether this theory is consistent. A claimed proof exists
    but has not been fully verified.

why_it_matters: >
  NF is one of the oldest alternative set theories, proposed by Quine in
  1937. Despite nearly 90 years of study, its consistency relative to
  standard axioms remains unclear. The problem is intimately connected to
  the foundations of mathematics, the nature of stratification, and
  questions about the cumulative hierarchy vs. universal set approaches
  to set theory. A formalized proof would be a landmark in the foundations
  of mathematics.

