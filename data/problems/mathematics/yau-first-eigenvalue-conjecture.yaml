statement:
  canonical: >
    Let Sigma be a closed embedded minimal hypersurface in the unit sphere
    S^{n+1}. Then the first eigenvalue of the Laplacian on Sigma equals n,
    i.e., lambda_1(Sigma) = n. This is known to hold for totally geodesic
    equators (where lambda_1 = n) and the conjecture asserts it holds for
    all such embedded minimal hypersurfaces.
  informal: >
    Minimal surfaces in spheres are surfaces that locally minimize area. Yau
    conjectured that for any such surface embedded (without self-intersections)
    in the sphere, the lowest nontrivial frequency of vibration (first
    eigenvalue of the Laplacian) takes a specific universal value that depends
    only on the dimension.

why_it_matters: >
  Yau's conjecture, posed in 1982, is a major open problem in spectral
  geometry connecting minimal surface theory with eigenvalue problems. It
  relates the extrinsic geometry of minimal submanifolds to their intrinsic
  spectral properties. Progress on this conjecture has stimulated the
  development of new tools in geometric analysis.

