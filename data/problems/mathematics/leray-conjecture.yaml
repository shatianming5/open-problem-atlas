statement:
  canonical: >
    There are no non-trivial self-similar blow-up solutions to the three-dimensional
    incompressible Navier-Stokes equations. Specifically, if u(x,t) = (T-t)^{-1/2} U(x /
    (T-t)^{1/2}) is a solution to the Navier-Stokes equations that blows up at time T, then
    U must be identically zero (no non-zero self-similar profile exists with finite energy).
  informal: >
    If the Navier-Stokes equations describing fluid flow were to develop a singularity
    (blow-up), it cannot happen in a self-similar way -- the simplest type of singularity
    is ruled out.

why_it_matters: >
  Leray's conjecture (1934) is intimately connected to the Navier-Stokes existence and
  smoothness Millennium Problem. If non-trivial self-similar blow-up solutions were found,
  it would settle the regularity question negatively. Ruling them out, as conjectured,
  is a necessary step toward proving regularity. Necas, Ruzicka, Sverak proved it for
  solutions in L^3, but the general case remains open.

