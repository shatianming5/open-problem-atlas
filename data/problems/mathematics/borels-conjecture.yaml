statement:
  canonical: >
    Every strong measure zero subset of the real line is countable. A set
    X subset R is strong measure zero if for every sequence (epsilon_n) of
    positive reals, there exists a sequence of intervals (I_n) with
    |I_n| < epsilon_n such that X is contained in the union of the I_n.
    Borel's conjecture asserts that the only such sets are the countable ones.
  informal: >
    A set of real numbers is "strong measure zero" if it can be covered by
    intervals of any prescribed shrinking sizes. Borel conjectured in 1919
    that only countable sets can be this "thin." This turns out to be
    independent of the usual axioms of set theory (ZFC).

why_it_matters: >
  Borel's conjecture is a fundamental statement in descriptive set theory
  and the study of measure and category on the real line. Laver proved in
  1976 that Borel's conjecture is consistent with ZFC (using a countable
  support iteration of Laver forcing), and Sierpinski showed that the
  Continuum Hypothesis implies its negation. The conjecture's independence
  makes its study central to the investigation of set-theoretic axioms
  beyond ZFC, and related questions about dual Borel conjecture and
  simultaneous consistency remain open.

