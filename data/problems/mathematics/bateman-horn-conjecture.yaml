statement:
  canonical: >
    Let f_1(x), f_2(x), ..., f_r(x) be distinct irreducible polynomials with integer
    coefficients and positive leading coefficients. Let N(f_1, ..., f_r; x) denote the
    number of positive integers n <= x such that f_1(n), f_2(n), ..., f_r(n) are all prime.
    If the product f_1 * f_2 * ... * f_r has no fixed prime divisor, then
    N(f_1, ..., f_r; x) ~ (C(f_1, ..., f_r) / (d_1 * d_2 * ... * d_r)) * Li_r(x),
    where d_i = deg(f_i), Li_r(x) = integral from 2 to x of dt/(log t)^r, and
    C(f_1, ..., f_r) = prod_{p prime} (1 - N_p/p) / (1 - 1/p)^r with N_p the number of
    solutions to f_1(n) * ... * f_r(n) ≡ 0 (mod p).
  informal: >
    The Bateman-Horn conjecture gives a precise formula for how often a collection of
    polynomials simultaneously take prime values. It generalizes the prime number theorem
    and encompasses the twin prime conjecture, Bunyakovsky's conjecture, and many others.

why_it_matters: >
  The Bateman-Horn conjecture is the most comprehensive quantitative prediction for prime
  values of polynomials. It unifies a vast collection of conjectures in analytic number theory
  under a single precise asymptotic framework.

