statement:
  canonical: >
    Consider the Anderson model H = -Δ + V on ℓ^2(Z^d) where V is an
    i.i.d. random potential with bounded distribution. For d ≥ 3 and
    sufficiently small disorder (small coupling constant λ), does the
    operator H have absolutely continuous spectrum and extended (delocalized)
    eigenstates? Prove the existence of a mobility edge separating
    localized and extended states in dimensions d ≥ 3.
  informal: >
    In a disordered quantum system on a lattice, particles can get trapped
    (localized) by randomness. In low dimensions or with strong disorder,
    all states are localized. In higher dimensions with weak disorder, there
    should be a transition where some states become delocalized — waves can
    propagate. Proving this transition exists is one of the great open
    problems in mathematical physics.

why_it_matters: >
  The Anderson localization-delocalization transition is one of the most
  important open problems in mathematical physics and probability theory.
  Anderson's 1958 prediction of localization won him the Nobel Prize in
  Physics. While localization has been rigorously proved (Fröhlich-Spencer,
  Aizenman-Molchanov), the existence of delocalized states and the mobility
  edge in d >= 3 remains completely open from a rigorous mathematical
  standpoint.

