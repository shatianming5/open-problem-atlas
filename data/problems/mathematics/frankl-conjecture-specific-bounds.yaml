statement:
  canonical: >
    For a union-closed family F of sets (closed under pairwise union) with F not equal to
    {empty set}, determine the best constant c such that there always exists an element
    contained in at least c * |F| sets of F. The union-closed conjecture of Frankl asserts
    c = 1/2. Gilmer (2022) proved c >= 0.01, and subsequent work improved this to
    c >= (3 - sqrt(5))/2 ~ 0.382. Closing the gap to 1/2 remains open.
  informal: >
    In a family of sets closed under union, there should be some element appearing in at
    least half the sets. The best proven constant is about 38.2% instead of 50%. What is
    the true threshold?

why_it_matters: >
  Frankl's union-closed conjecture is one of the most famous open problems in combinatorics.
  While the qualitative conjecture (c = 1/2) remains open, the quantitative question of
  determining the sharp constant has attracted intense recent interest. Gilmer's 2022
  breakthrough using entropy methods opened a new line of attack, but the gap between
  0.382 and 0.5 persists.

