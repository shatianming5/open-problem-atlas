statement:
  canonical: >
    Let K be an abstract elementary class (AEC) with amalgamation. If K is
    categorical in some cardinal lambda >= Hanf(K) (meaning K has exactly one
    model of size lambda up to isomorphism), then K is categorical in all
    cardinals mu >= Hanf(K). This would generalize Morley's categoricity theorem
    from first-order logic to the much broader framework of abstract elementary
    classes.
  informal: >
    In first-order logic, Morley proved that if a theory has exactly one model
    of some uncountable size, it has exactly one model of every uncountable
    size. Shelah conjectured this "transfer of uniqueness" should hold in a much
    more general logical setting called abstract elementary classes, which
    encompass many non-first-order logics.

why_it_matters: >
  Shelah's categoricity conjecture is the central open problem in the
  classification theory of non-elementary classes. A positive resolution would
  dramatically extend the reach of model-theoretic classification theory beyond
  first-order logic, impacting infinitary logic, homogeneous model theory, and
  the study of algebraic structures not axiomatizable in first-order logic.

