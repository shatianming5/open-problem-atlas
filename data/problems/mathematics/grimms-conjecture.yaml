statement:
  canonical: >
    For every positive integer n, if n+1, n+2, ..., n+k are all composite numbers, then
    there exist distinct primes p_1, p_2, ..., p_k such that p_i divides n+i for each
    i = 1, 2, ..., k.
  informal: >
    Given any run of consecutive composite (non-prime) numbers, one can assign to each
    composite number in the run a distinct prime factor. No two composites in the run need
    share the same assigned prime.

why_it_matters: >
  Grimm's conjecture connects the combinatorial structure of prime factorizations with
  the distribution of primes. It implies Legendre's conjecture and would yield new insights
  into prime gaps and the matching structure of divisibility.

