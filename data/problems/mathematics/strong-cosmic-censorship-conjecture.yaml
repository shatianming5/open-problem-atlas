statement:
  canonical: >
    The maximal globally hyperbolic development of generic compact or
    asymptotically flat initial data for the Einstein vacuum equations
    R_{μν} = 0 is inextendible as a suitably regular Lorentzian manifold.
    In Christodoulou's C^0 formulation: the maximal Cauchy development is
    C^0-inextendible for generic initial data.
  informal: >
    The laws of general relativity, given generic initial conditions,
    should determine the spacetime uniquely — there should be no way to
    extend the solution beyond a certain boundary (the Cauchy horizon)
    in a physically meaningful way. This is the mathematical version of
    the statement that "physics is deterministic in general relativity."

why_it_matters: >
  The strong cosmic censorship conjecture is one of the most important open
  problems at the intersection of mathematical physics and PDE theory. It
  addresses the fundamental question of determinism in general relativity.
  Recent work by Dafermos and Luk (2017) on the interior of black holes
  has shown that the C^0 formulation is true for the Kerr solution, but
  the full conjecture remains wide open.

