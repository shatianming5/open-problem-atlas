statement:
  canonical: >
    In the space of rational maps of degree d >= 2 on the Riemann sphere,
    the hyperbolic maps form a dense open subset. Equivalently, for the
    quadratic family f_c(z) = z^2 + c, the set of parameters c in C for
    which f_c is hyperbolic (every critical orbit converges to an attracting
    cycle) is dense in the Mandelbrot set's complement, and hyperbolic
    components are dense in the Mandelbrot set.
  informal: >
    Among all polynomial or rational maps that define dynamical systems on the
    complex plane, the "well-behaved" (hyperbolic) ones should be the typical
    case. The conjecture says that for almost any parameter value, the
    corresponding dynamical system is structurally stable -- chaotic maps that
    are not hyperbolic should be rare in a topological sense.

why_it_matters: >
  The Fatou conjecture, originating from Fatou's work in the 1920s, is one of
  the most important open problems in complex dynamics. It implies that
  structurally stable systems are generic, which would give a comprehensive
  understanding of the parameter space of rational maps. It is closely related
  to the MLC conjecture and has profound implications for our understanding of
  the Mandelbrot set.

