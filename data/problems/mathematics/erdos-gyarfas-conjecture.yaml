statement:
  canonical: >
    Every graph with minimum degree at least 3 contains a cycle whose length is a power
    of 2. That is, for every graph G with delta(G) >= 3, there exists a cycle of length
    2^k for some positive integer k.
  informal: >
    In any graph where every vertex has at least 3 neighbors, you can always find a cycle
    whose length is a power of 2 (i.e., length 2, 4, 8, 16, ...).

why_it_matters: >
  The Erdos-Gyarfas conjecture, posed in 1995, is a beautiful and natural conjecture about
  cycle lengths in graphs. It connects graph structure to number-theoretic properties of
  cycle lengths. Despite significant effort, even the weaker question of whether every
  such graph contains a cycle of length divisible by a power of 2 remains challenging.

