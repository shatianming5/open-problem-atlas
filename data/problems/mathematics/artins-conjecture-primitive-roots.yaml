statement:
  canonical: >
    For any integer a that is not -1 and not a perfect square, there are
    infinitely many primes p for which a is a primitive root modulo p, i.e.,
    a generates the multiplicative group (Z/pZ)*. Moreover, the set of such
    primes has a positive natural density that can be computed explicitly in
    terms of an Artin constant.
  informal: >
    A primitive root modulo a prime p is a number whose successive powers give
    all nonzero remainders when divided by p. Artin conjectured that any
    "generic" integer (not -1 or a perfect square) serves as a primitive root
    for infinitely many primes, and this happens with a predictable frequency.

why_it_matters: >
  Artin's conjecture, posed in 1927, is a major open problem in algebraic
  number theory. It concerns the structure of multiplicative groups of finite
  fields and connects to deep questions in algebraic K-theory and the
  distribution of primes. Hooley proved it conditionally on the Generalized
  Riemann Hypothesis, but an unconditional proof remains elusive.

