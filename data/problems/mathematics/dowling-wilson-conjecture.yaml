statement:
  canonical: >
    For any matroid M of rank r, let W_k denote the number of flats of rank k. Then the sequence
    W_0, W_1, ..., W_r is top-heavy: W_k <= W_{r-k} for all k <= r/2. More generally, the
    Whitney numbers of the second kind of any matroid satisfy this top-heavy property.
  informal: >
    In any matroid, there are at least as many high-rank flats as low-rank flats. The number
    of subspaces "increases toward the top" of the lattice.

why_it_matters: >
  The Dowling-Wilson conjecture (1975) was a driving force behind the development of combinatorial
  Hodge theory. Braden, Huh, Matherne, Proudfoot, and Wang proved the conjecture for realizable
  matroids using intersection cohomology of wonderful compactifications. The general non-realizable
  case remains open and requires purely combinatorial or algebraic methods.

