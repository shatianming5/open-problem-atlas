statement:
  canonical: >
    Let H = {h_1, h_2, ..., h_k} be an admissible k-tuple of non-negative integers (meaning
    for every prime p, the set H does not cover all residue classes modulo p). Let
    pi_H(x) denote the number of integers n <= x such that n + h_1, n + h_2, ..., n + h_k
    are all prime. Then pi_H(x) ~ S(H) * x / (log x)^k as x -> infinity, where
    S(H) = prod_{p prime} (1 - nu_H(p)/p) / (1 - 1/p)^k and nu_H(p) is the number of
    distinct residues of H modulo p. In particular, pi_H(x) -> infinity.
  informal: >
    Consider any pattern of gaps between primes that is not ruled out by simple divisibility
    obstructions. The conjecture predicts that this pattern appears infinitely often among
    the primes, and gives an exact formula for how frequently it appears.

why_it_matters: >
  The Hardy-Littlewood k-tuple conjecture is one of the most fundamental conjectures in
  analytic number theory. It implies the twin prime conjecture and predicts the fine
  distribution of prime constellations. It forms the backbone of quantitative predictions
  about primes.

