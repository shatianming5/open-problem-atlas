  - summary: "Zhang proved bounded gaps between primes (gap at most 70 million), the first finite bound."
    year: 2013
  - summary: "Maynard and Tao independently proved bounded gaps with a much smaller bound, and showed lim inf (p_{n+m} - p_n) < infinity for all m."
