statement:
  canonical: >
    Every simple finite undirected graph G on n >= 3 vertices is determined up to isomorphism
    by its deck, the multiset of (isomorphism classes of) vertex-deleted subgraphs
    {G - v : v in V(G)}. In other words, if two graphs G and H with at least 3 vertices have
    the same deck, then G and H are isomorphic.
  informal: >
    Imagine you have a graph and you create a collection of smaller graphs, each obtained by
    removing one vertex (and all its edges). The conjecture says that you can always figure out
    the original graph from this collection of subgraphs, as long as it has at least 3 vertices.

why_it_matters: >
  The reconstruction conjecture, posed by Kelly and Ulam in 1941-1942, is one of the foremost
  unsolved problems in graph theory. It asks a fundamental question about the information
  content of local substructures of a graph and has deep connections to graph isomorphism
  and structural graph theory.

