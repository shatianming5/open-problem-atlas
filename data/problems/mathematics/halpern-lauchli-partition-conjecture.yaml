statement:
  canonical: >
    The Halpern-Lauchli theorem states that for any finite number d of
    perfect binary trees T_1, ..., T_d of height omega, and any finite
    coloring of the level product Union_n (T_1(n) x ... x T_d(n)), there
    exist strong subtrees S_i subset T_i of height omega such that the level
    product of S_1, ..., S_d is monochromatic. The open problem asks: does
    the analogous statement hold when omega is replaced by an uncountable
    cardinal kappa? In particular, does it hold at kappa = omega_1?
  informal: >
    The Halpern-Lauchli theorem is a powerful Ramsey-type result about coloring
    products of trees. It works beautifully for trees of countable height. The
    open question is whether this deep combinatorial principle extends to trees
    of uncountable height, which requires fundamentally new techniques or
    potentially new axioms.

why_it_matters: >
  The Halpern-Lauchli theorem is a cornerstone of infinitary combinatorics
  with applications to Banach space theory and Ramsey theory. Extending it to
  uncountable cardinals is a central problem in set-theoretic combinatorics
  that connects to large cardinal axioms and forcing. Understanding this
  extension has implications for partition calculus and the structure of
  uncountable trees.

