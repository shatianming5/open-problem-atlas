statement:
  canonical: >
    Let p_n denote the n-th prime number and g_n = p_{n+1} - p_n the n-th prime gap. Cramer's
    conjecture states that g_n = O((log p_n)^2), and more precisely, that
    lim sup_{n -> infinity} g_n / (log p_n)^2 = 1.
  informal: >
    The gaps between consecutive prime numbers grow, but Cramer's conjecture predicts exactly
    how fast: the largest gaps near a prime p should be roughly (log p)^2. For example, near
    a prime around 1 million (log is about 14), the largest gap should be around 196.

why_it_matters: >
  Cramer's conjecture gives the strongest plausible prediction for the size of prime gaps,
  based on probabilistic models of the primes. It implies Legendre's conjecture and many
  other results about the distribution of primes. It refines our understanding of how
  primes are distributed among the integers.

