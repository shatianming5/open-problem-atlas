statement:
  canonical: >
    Determine all pairs of positive integers (n, m) such that n! + 1 = m^2. The known solutions
    are (n, m) = (4, 5), (5, 11), and (7, 71). Brocard's problem asks whether these are the
    only solutions; equivalently, whether there are no further values of n > 7 for which
    n! + 1 is a perfect square.
  informal: >
    Are there any factorials other than 4! = 24, 5! = 120, and 7! = 5040 such that adding 1
    gives a perfect square? (Since 25, 121, and 5041 are all perfect squares.) The conjecture
    is that no other such factorials exist.

why_it_matters: >
  Brocard's problem, posed in 1876 and independently considered by Ramanujan, connects factorial
  growth with the distribution of perfect squares. It is a natural Diophantine problem whose
  resolution would likely require new techniques in transcendental number theory or the
  abc conjecture.

