statement:
  canonical: >
    If the sum a_1^k + a_2^k + ... + a_s^k = b_1^k + b_2^k + ... + b_t^k holds with all
    a_i, b_j positive integers and k >= 2, then s + t >= k. Equivalently, the Diophantine
    equation x_1^k + x_2^k + ... + x_m^k = 0 in nonzero integers requires m >= k + 1 terms.
  informal: >
    When expressing an equation of equal sums of k-th powers on both sides, the total number
    of terms on both sides combined must be at least k. You cannot write an identity with
    too few k-th power terms.

why_it_matters: >
  The Lander-Parkin-Selfridge conjecture generalizes Fermat's Last Theorem and Euler's
  conjecture on sums of powers, providing a unified framework for understanding the minimal
  complexity of power sum identities.

