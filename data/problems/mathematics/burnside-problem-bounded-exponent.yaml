statement:
  canonical: >
    For which pairs (d, n) with d >= 2 and n >= 2 is the free Burnside group B(d, n)
    (the largest finite group with d generators and exponent n) actually finite? It is known
    that B(d, n) is infinite for all d >= 2 when n >= 8000 (Adian-Novikov), and for odd
    n >= 665 (Adian). For even exponent, the finiteness of B(2, 2^k) for k >= 13 is open.
    Determining the exact boundary between finite and infinite cases remains unsolved.
  informal: >
    Consider a group generated by d elements where every element raised to the n-th power
    equals the identity. Is this group always finite? The answer is no for large n, and yes
    for small n, but the exact dividing line is unknown.

why_it_matters: >
  The Burnside problem, posed in 1902, is one of the oldest and most influential problems
  in group theory and combinatorics. The negative solution for large exponents by Novikov
  and Adian (1968) was a landmark. Understanding the boundary between finite and infinite
  behavior has deep implications for group theory, combinatorics on words, and geometric
  group theory.

