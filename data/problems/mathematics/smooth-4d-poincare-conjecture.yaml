statement:
  canonical: >
    Every closed smooth 4-manifold that is homeomorphic to the 4-sphere S^4 is also
    diffeomorphic to S^4. Equivalently, there are no exotic smooth structures on S^4.
  informal: >
    The standard 4-dimensional sphere has a natural "smooth structure" that lets us do calculus
    on it. The conjecture asks: is this the only way to make the 4-sphere smooth? Unlike other
    dimensions (where the answer is known), the 4-dimensional case remains wide open.

why_it_matters: >
  The smooth 4-dimensional Poincare conjecture is the last remaining case of the generalized
  Poincare conjecture in the smooth category. Dimension 4 is uniquely difficult in topology:
  it is the only dimension where the smooth and topological categories diverge dramatically
  (as shown by the existence of exotic R^4s). Its resolution would be a landmark in
  4-manifold topology.

