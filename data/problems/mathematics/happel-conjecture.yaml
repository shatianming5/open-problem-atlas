statement:
  canonical: >
    Let A be a finite-dimensional algebra over an algebraically closed
    field k. If the derived category D^b(mod-A) of bounded complexes of
    finitely generated A-modules has no loops in its Auslander-Reiten
    quiver and has a tilting object, then A is derived equivalent to a
    hereditary algebra.
  informal: >
    If the derived category of a finite-dimensional algebra is well-behaved
    (has no self-extensions of a certain type and possesses a tilting object),
    then the algebra should be essentially as simple as a hereditary algebra
    (one with no higher extension groups).

why_it_matters: >
  Happel's conjecture connects the structure of derived categories with
  the representation-theoretic classification of algebras. It is a central
  open question in the representation theory of finite-dimensional algebras
  and homological algebra. The conjecture would provide a powerful criterion
  for recognizing derived-hereditary algebras.

