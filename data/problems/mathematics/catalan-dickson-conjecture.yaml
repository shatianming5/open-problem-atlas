  - summary: "Ochem and Rao proved that any odd perfect number must exceed 10^1500."
    year: 2012
  - summary: "Nielsen proved that any odd perfect number must have at least 10 distinct prime factors."
    year: 2015
  - summary: "Any odd perfect number must have its largest prime factor exceed 10^8 (Goto and Ohno)."
