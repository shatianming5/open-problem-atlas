statement:
  canonical: >
    In stable homotopy theory, the telescope conjecture (Ravenel, 1984) asserts that the
    v_n-periodic homotopy groups of a finite complex X, computed via the telescope (direct
    limit of v_n self-maps), agree with the L_n-local homotopy groups (computed via Bousfield
    localization at the Johnson-Wilson theory E(n)). Equivalently, the natural map from the
    telescope to the L_n-localization is an equivalence.
  informal: >
    There are two ways to isolate periodic phenomena in stable homotopy theory: one concrete
    (telescopes) and one abstract (Bousfield localization). The telescope conjecture predicted
    they agree. This was recently disproved at height 2 and above.

why_it_matters: >
  The telescope conjecture was one of Ravenel's conjectures that organized chromatic homotopy
  theory for 40 years. While five of Ravenel's seven conjectures were proved by Devinatz,
  Hopkins, and Smith, the telescope conjecture was recently disproved by Burklund, Hahn,
  Levy, and Schlank (2023) at heights >= 2. Understanding the precise failure and its
  consequences for chromatic homotopy theory is a major open direction.

