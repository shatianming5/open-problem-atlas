statement:
  canonical: >
    For every continuous function f on a compact metric space X and every
    homeomorphism T: X -> X with zero topological entropy, and for every
    point x in X, the sum (1/N) sum_{n=1}^{N} mu(n) f(T^n x) converges
    to 0 as N -> infinity, where mu is the Mobius function. Equivalently,
    every zero-entropy dynamical system is disjoint from the Mobius function.
  informal: >
    The Mobius function, which encodes information about prime factorizations,
    should be "unrelated" to any dynamical system with low complexity
    (zero topological entropy). Their correlation should vanish as you
    average over more and more terms.

why_it_matters: >
  Sarnak's conjecture, posed in 2010, bridges analytic number theory and
  ergodic theory. It generalizes the prime number theorem (which corresponds
  to the case where T is the identity) and implies the Chowla conjecture
  on correlations of the Mobius function. It has stimulated extensive work
  connecting dynamics, combinatorics, and multiplicative number theory.

