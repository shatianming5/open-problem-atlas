statement:
  canonical: >
    There are infinitely many primes p such that p + 2 is also prime. Equivalently,
    lim inf_{n -> infinity} (p_{n+1} - p_n) = 2, where p_n denotes the n-th prime number.
  informal: >
    Twin primes are pairs of prime numbers that differ by exactly 2, such as (3, 5), (11, 13),
    and (17, 19). The twin prime conjecture asserts that there are infinitely many such pairs.

why_it_matters: >
  The twin prime conjecture is one of the oldest open problems in number theory, intimately
  connected to the distribution of prime numbers. Its resolution would deepen our understanding
  of prime gaps and has connections to sieve methods, the Hardy-Littlewood conjectures, and
  the structure of the primes.

