statement:
  canonical: >
    Let R be a Noetherian ring of prime characteristic p > 0, I an ideal of R,
    and S a multiplicative set. If an element z belongs to the tight closure
    I^* of I in R, then the image of z in S^{-1}R belongs to the tight
    closure (S^{-1}I)^* of S^{-1}I in the localization S^{-1}R. That is,
    tight closure commutes with localization: (I^*)S^{-1}R = (IS^{-1}R)^*.
  informal: >
    Tight closure is an important operation on ideals in commutative algebra
    defined using the Frobenius endomorphism in characteristic p. The
    conjecture says that this operation behaves well under localization —
    restricting to a smaller piece of the ring preserves the tight closure.

why_it_matters: >
  Tight closure, introduced by Hochster and Huneke in 1990, is one of the
  most powerful tools in commutative algebra and algebraic geometry over
  fields of positive characteristic. The localization problem is the most
  fundamental open question about tight closure and affects many applications
  including the understanding of singularities and the homological conjectures.

