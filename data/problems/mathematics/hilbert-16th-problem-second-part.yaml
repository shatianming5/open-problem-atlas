statement:
  canonical: >
    For a polynomial vector field of degree n in the plane,
    dx/dt = P_n(x,y), dy/dt = Q_n(x,y), where P_n and Q_n are polynomials of
    degree at most n, determine a uniform upper bound H(n) on the number of
    limit cycles (isolated periodic orbits), and investigate their possible
    configurations. In particular, is H(n) finite for each n?
  informal: >
    Consider a system of two differential equations in the plane where the
    right-hand sides are polynomials of degree n. The question asks: what is
    the maximum number of closed loops (limit cycles) that the trajectories of
    such a system can form? Even for quadratic systems (n=2), this remains
    unsolved.

why_it_matters: >
  The second part of Hilbert's 16th problem, posed in 1900, is one of the most
  enduring open problems in mathematics. It sits at the intersection of
  dynamical systems, real algebraic geometry, and qualitative theory of ODEs.
  Despite over a century of research, even the finiteness of the number of
  limit cycles for polynomial systems of any fixed degree has not been fully
  established in general.

