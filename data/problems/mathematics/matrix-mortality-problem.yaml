statement:
  canonical: >
    Given a finite set of n x n integer matrices {M_1, ..., M_k}, is it decidable whether
    there exists a product M_{i_1} M_{i_2} ... M_{i_m} equal to the zero matrix? This is
    known to be undecidable for n >= 3 (Paterson, 1970). The question is open for 2x2 matrices:
    given a finite set of 2x2 integer matrices, is the mortality problem (does some product
    equal the zero matrix?) decidable?
  informal: >
    Given a collection of 2x2 integer matrices, can we always determine whether some product
    of these matrices (with repetition allowed) gives the zero matrix?

why_it_matters: >
  The matrix mortality problem is a fundamental question in decidability theory and
  non-commutative algebra. It connects automata theory, the theory of matrix semigroups,
  and computational complexity. The 2x2 case remains one of the most prominent open
  decidability questions, with connections to the Post correspondence problem and
  word problems in semigroups.

