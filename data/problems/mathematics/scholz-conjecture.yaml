statement:
  canonical: >
    Let l(n) denote the length of the shortest addition chain for the positive integer n
    (the minimum number of additions needed to reach n starting from 1, where each step adds
    two previously computed values). Then l(2^n - 1) <= l(n) + n - 1 for all positive
    integers n.
  informal: >
    An addition chain for n is a sequence starting at 1 where each term is the sum of two
    earlier terms, ending at n. The conjecture says that computing 2^n - 1 (a Mersenne number)
    never requires more than n - 1 extra steps beyond what is needed to compute n itself.

why_it_matters: >
  The Scholz conjecture connects the combinatorial theory of addition chains to the structure
  of Mersenne numbers. Addition chains are fundamental in efficient exponentiation algorithms
  used in cryptography and computer algebra.

