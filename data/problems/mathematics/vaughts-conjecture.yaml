statement:
  canonical: >
    Let T be a complete countable first-order theory in a countable language. Then the number
    of countable models of T up to isomorphism (denoted I(T, aleph_0)) is either countable
    (i.e., finite or equal to aleph_0) or exactly 2^{aleph_0} (the cardinality of the
    continuum). In other words, no complete countable first-order theory has exactly aleph_1
    many countable models (assuming the continuum hypothesis fails).
  informal: >
    When studying a mathematical theory (a consistent set of axioms in first-order logic), one
    can ask: how many essentially different countable structures satisfy these axioms? Vaught
    conjectured that the answer is either small (countably many) or as large as possible
    (continuum many) -- there is no intermediate case.

why_it_matters: >
  Vaught's conjecture, posed in 1961, is the most important open problem in model theory
  and one of the central questions in mathematical logic. It sits at the intersection of
  model theory, descriptive set theory, and set theory. Its resolution would deepen our
  understanding of the classification of mathematical structures and the nature of
  definability.

