statement:
  canonical: >
    For every integer n >= 2, there exist positive integers x, y, z such that
    4/n = 1/x + 1/y + 1/z.
  informal: >
    The conjecture claims that for any integer n >= 2, the fraction 4/n can always be
    written as a sum of exactly three unit fractions (fractions with numerator 1).

why_it_matters: >
  The Erdos-Straus conjecture is a central problem in the theory of Egyptian fractions,
  connecting elementary number theory with Diophantine equations. Its resolution would
  advance understanding of the representability properties of rational numbers as sums of
  unit fractions.

