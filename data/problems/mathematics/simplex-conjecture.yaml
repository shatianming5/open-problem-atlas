statement:
  canonical: >
    Among all codes (finite subsets) of M points on the unit sphere S^{n-1} in R^n, the
    configuration that maximizes the minimum pairwise distance is the regular simplex when
    M = n+1. For general M > n+1, the conjecture extends to the arrangement maximizing the
    minimum distance, which remains open in most dimensions for M not equal to special values.
    In the information-theoretic formulation, the simplex code achieves the optimal error
    exponent for equal-energy codes on the Gaussian channel.
  informal: >
    When packing M points on a sphere to maximize the minimum distance between any two points,
    the optimal arrangement for n+1 points in n dimensions forms a regular simplex. The problem
    is open for many other values of M and n.

why_it_matters: >
  The simplex conjecture connects discrete geometry (sphere packing), information theory
  (channel coding), and mathematical optimization. The optimal arrangement of points on
  spheres has applications in signal constellation design, error-correcting codes, and quantum
  information theory.

