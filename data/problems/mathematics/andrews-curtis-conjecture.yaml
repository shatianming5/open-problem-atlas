statement:
  canonical: >
    Every balanced presentation of the trivial group can be transformed
    into the trivial presentation by a sequence of Andrews–Curtis moves:
    (1) replace a relator r_i by r_i · r_j (i ≠ j), (2) replace r_i by
    r_i^{-1}, (3) replace r_i by a conjugate w · r_i · w^{-1}, and
    (4) apply automorphisms to the free group on generators.
  informal: >
    If you have a way of presenting the trivial group with the same number
    of generators and relations, can you always simplify it to the obvious
    trivial presentation using a specific set of allowed moves?

why_it_matters: >
  The Andrews–Curtis conjecture is a major open problem at the intersection
  of combinatorial group theory and low-dimensional topology. It is connected
  to questions about simple homotopy theory and the smooth 4-dimensional
  Poincaré conjecture. Most experts believe the conjecture is false, and
  many potential counterexamples have been proposed, but none have been
  proven to be genuine counterexamples.

