statement:
  canonical: >
    Define the function T: N -> N by T(n) = n/2 if n is even, and T(n) = 3n+1 if n is odd.
    The Collatz conjecture asserts that for every positive integer n, there exists a finite k
    such that T^k(n) = 1, i.e., the orbit of every positive integer under T eventually reaches 1.
  informal: >
    Take any positive integer. If it is even, divide it by 2. If it is odd, multiply it by 3
    and add 1. Repeat. The conjecture states that no matter what number you start with, you
    will always eventually reach 1.

why_it_matters: >
  The Collatz conjecture is one of the simplest-to-state unsolved problems in mathematics.
  It connects number theory with dynamical systems and ergodic theory. Despite its elementary
  formulation, it resists all known proof techniques and has been called "an extraordinarily
  difficult problem, completely out of reach of present day mathematics" by Paul Erdos.

