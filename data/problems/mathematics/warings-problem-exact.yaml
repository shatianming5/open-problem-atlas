statement:
  canonical: >
    Let g(k) denote the smallest s such that every positive integer can be written as a sum
    of at most s k-th powers of non-negative integers. It is conjectured that for all k >= 2,
    g(k) = 2^k + floor((3/2)^k) - 2, provided that the fractional part {(3/2)^k} satisfies
    {(3/2)^k} <= 1 - (3/4)^k + floor((3/4)^k) * 2^{-k}. Prove this formula for all k, or
    determine g(k) exactly for all k >= 2.
  informal: >
    Waring's problem asks: for each power k, what is the maximum number of k-th powers needed
    to represent any positive integer as their sum? A conjectured formula gives the answer for
    all k, but proving it requires showing a certain inequality about powers of 3/2 holds for
    all k.

why_it_matters: >
  Waring's problem is one of the most classical problems in additive number theory. While
  Hilbert proved g(k) is finite for all k, the exact determination for all k remains open
  and connects to deep questions about the distribution of powers of 3/2 modulo 1.

