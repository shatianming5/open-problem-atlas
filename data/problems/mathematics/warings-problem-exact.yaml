partial_results:
  - summary: "g(2) = 4 (Lagrange's four-square theorem, 1770), g(3) = 9 (proved in stages, completed by Dickson and Pillai by 1940)."
    year: 1940
  - summary: "The conjectured formula is verified for all k <= 471,600,000 (Kubina and Wunderlich, 1990, extended by others)."
    year: 1990
  - summary: "Mahler (1957) proved the key inequality {(3/2)^k} <= 1 - 2^{-k} holds for all sufficiently large k, but the result is ineffective."
    year: 1957
  - summary: "The formula g(k) = 2^k + floor((3/2)^k) - 2 has been proven for specific ranges, contingent on bounds for {(3/2)^k}."
