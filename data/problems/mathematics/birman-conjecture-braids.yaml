statement:
  canonical: >
    For each n >= 1, the subgroup of the braid group B_n generated by all squares of the
    standard Artin generators (the "squared generators subgroup") is a right-angled Artin
    group. More precisely, Birman conjectured structural properties relating subgroups of
    braid groups to mapping class groups and surface topology.
  informal: >
    Certain natural subgroups of braid groups (groups describing how strands can be intertwined)
    should have a particularly clean algebraic structure described by a graph.

why_it_matters: >
  Birman's conjectures connect braid groups, mapping class groups, and low-dimensional
  topology. Braid groups are fundamental in knot theory, algebraic geometry (monodromy),
  and quantum computing (anyonic systems). Understanding their subgroup structure has
  implications across topology and algebra.

