statement:
  canonical: >
    Can a zero of a system of n polynomial equations in n complex unknowns be found
    approximately in time polynomial in the size of the input (the number of coefficients)?
    More precisely, is there a uniform algorithm that, given a system f = (f_1, ..., f_n)
    of polynomials, produces an approximate zero in expected time polynomial in N = sum of
    the number of monomials, with the expectation over a suitable probability distribution?
  informal: >
    Is there an efficient algorithm to find approximate solutions to systems of polynomial
    equations? Smale asks whether this can be done in polynomial time on average.

why_it_matters: >
  Smale's 17th problem (from his 1998 list for the 21st century) connects numerical analysis,
  algebraic geometry, and complexity theory. It asks about the fundamental computational
  complexity of solving polynomial systems, bridging continuous and discrete mathematics.
  Progress relates to homotopy methods, condition numbers, and alpha-theory.

