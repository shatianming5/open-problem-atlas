statement:
  canonical: >
    For any two graphs G and H, the domination number of the Cartesian product satisfies
    gamma(G square H) >= gamma(G) * gamma(H), where gamma denotes the domination number
    and G square H is the Cartesian product of graphs G and H.
  informal: >
    The minimum number of vertices needed to dominate the Cartesian product of two graphs
    is at least the product of the domination numbers of the individual graphs. In other
    words, domination does not become easier in the product.

why_it_matters: >
  Vizing's conjecture, posed in 1968, is one of the most famous open problems in domination
  theory and graph products. It has been called the most important unsolved problem in the
  theory of graph domination. Understanding domination in product graphs has applications
  in network design, coding theory, and distributed computing.

