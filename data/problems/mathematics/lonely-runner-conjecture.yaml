statement:
  canonical: >
    Consider k >= 2 runners on a circular track of circumference 1, starting at the same point
    and running with pairwise distinct constant speeds. For each runner, there exists a time at
    which that runner is at distance at least 1/k from all other runners. Equivalently, for
    every set of k-1 positive integers v_1, ..., v_{k-1}, there exists a real number t such
    that for all i, the fractional part of t * v_i is in [1/k, (k-1)/k].
  informal: >
    Imagine k runners jogging around a circular track, all starting at the same point but at
    different constant speeds. The conjecture says that each runner will, at some point in time,
    be "lonely" -- separated from every other runner by at least 1/k of the track's length.

why_it_matters: >
  The lonely runner conjecture, posed by Wills (1967) and independently by Cusick (1982),
  is a beautiful problem at the intersection of combinatorics, number theory, and Diophantine
  approximation. It connects to view-obstruction problems in geometry, to flows in graphs,
  and to chromatic numbers of distance graphs.

