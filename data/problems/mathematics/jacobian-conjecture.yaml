statement:
  canonical: >
    Let F = (F_1, ..., F_n): C^n -> C^n be a polynomial map such that the Jacobian determinant
    det(dF_i/dx_j) is a nonzero constant. Then F is a polynomial automorphism, i.e., F has a
    polynomial inverse. Equivalently, if F: C^n -> C^n is a polynomial map with constant
    nonzero Jacobian determinant, then F is bijective.
  informal: >
    If you have a system of polynomial equations in n variables whose Jacobian determinant
    (a measure of local invertibility) is everywhere nonzero, then the system must have a
    global polynomial inverse -- you can solve for the original variables using polynomials.

why_it_matters: >
  The Jacobian conjecture, posed by Keller in 1939, is one of the most famous open problems in
  algebraic geometry and commutative algebra. It appears on Smale's list of problems for the
  21st century. Despite its simple statement, it has resisted proof even in two dimensions
  and has surprising connections to many areas including D-modules, the Dixmier conjecture,
  and affine algebraic geometry.

