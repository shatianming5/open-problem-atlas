statement:
  canonical: >
    Let S be a set of n points in R^d (d >= 2), not all on a single hyperplane. The set of
    directions determined by pairs of points in S has cardinality at least 2*floor(n/2). In
    the plane (d=2), Ungar proved this bound of 2*floor(n/2) directions in 1982. The
    conjecture extends to higher dimensions: for d >= 3, what is the minimum number of
    directions determined by n points in general position in R^d?
  informal: >
    Given n points in d-dimensional space not all on a hyperplane, how few distinct directions
    can the connecting lines determine? Ungar proved the 2D case; the higher-dimensional
    analogue is open.

why_it_matters: >
  This problem connects discrete geometry, combinatorics, and algebraic methods. Ungar's elegant
  proof in 2D used allowable sequences. Higher-dimensional extensions relate to the Sylvester-Gallai
  theorem, the orchard problem, and extremal combinatorial geometry.

