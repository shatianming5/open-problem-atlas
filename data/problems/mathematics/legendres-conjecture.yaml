statement:
  canonical: >
    For every positive integer n, there exists a prime number p such that n^2 < p < (n+1)^2.
    Equivalently, there is always at least one prime between consecutive perfect squares.
  informal: >
    Between any two consecutive perfect squares (like 100 and 121, or 144 and 169), there is
    always at least one prime number. Despite strong numerical evidence, this has never been proved.

why_it_matters: >
  Legendre's conjecture is one of Landau's four "unattackable" problems presented at the 1912
  International Congress of Mathematicians. It is weaker than the Cramer conjecture and stronger
  than Bertrand's postulate. Resolving it would significantly advance our understanding of
  prime gaps and the distribution of primes in short intervals.

