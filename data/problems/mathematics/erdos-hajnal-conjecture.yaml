statement:
  canonical: >
    For every graph H, there exists a constant delta(H) > 0 such that every graph G on n
    vertices that does not contain H as an induced subgraph has either a clique or an
    independent set of size at least n^{delta(H)}.
  informal: >
    If a graph avoids some fixed pattern as an induced subgraph, then it must contain either
    a very large clique or a very large independent set -- specifically, of polynomial size
    in the number of vertices, rather than just logarithmic size.

why_it_matters: >
  The Erdos-Hajnal conjecture, posed in 1989, is one of the most important open problems
  in structural graph theory. The Ramsey theorem only guarantees cliques or independent
  sets of logarithmic size in general graphs. The conjecture asserts a dramatic improvement
  for graphs with forbidden induced subgraphs, and has deep connections to the Regularity
  Lemma, model theory, and tournament structure.

