statement:
  canonical: >
    All non-trivial zeros of the Riemann zeta function zeta(s) = sum_{n=1}^{infinity} n^{-s}
    have real part equal to 1/2. That is, if zeta(s) = 0 and s is not a negative even integer,
    then Re(s) = 1/2.
  informal: >
    The Riemann zeta function encodes deep information about the distribution of prime numbers.
    The hypothesis states that all its "interesting" zeros lie on a single vertical line in the
    complex plane (the critical line Re(s) = 1/2).

why_it_matters: >
  The Riemann hypothesis is widely regarded as the most important unsolved problem in pure
  mathematics. It is one of the seven Millennium Prize Problems. Its truth would imply the
  best possible error bound in the Prime Number Theorem and would have profound consequences
  across number theory, random matrix theory, quantum physics, and cryptography.

