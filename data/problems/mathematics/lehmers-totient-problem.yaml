statement:
  canonical: >
    There is no composite positive integer n such that Euler's totient function phi(n)
    divides n - 1. Equivalently, if phi(n) | (n - 1), then n is prime.
  informal: >
    Euler's totient function phi(n) counts how many integers from 1 to n are coprime to n.
    For primes p, phi(p) = p - 1, which divides p - 1. The question asks whether any
    composite number can also have the property that phi(n) divides n - 1.

why_it_matters: >
  Lehmer's totient problem is a fundamental question in multiplicative number theory connecting
  the structure of Euler's totient function to primality testing. Its resolution would clarify
  the extent to which the divisibility condition phi(n) | (n-1) characterizes primes.

