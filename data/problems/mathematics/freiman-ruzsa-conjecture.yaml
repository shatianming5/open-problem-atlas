statement:
  canonical: >
    If A is a finite subset of Z^n (or more generally an abelian group) with |A + A| <= K|A|
    (small doubling), then A can be covered by at most poly(K) translates of a subgroup H
    with |H| <= |A|. More precisely, there exists a generalized arithmetic progression of
    dimension at most C(K) containing A, where C(K) is polynomial in K.
  informal: >
    Sets with small additive doubling (the sumset is not much larger than the set itself)
    must have a strong additive structure: they can be efficiently covered by a structured
    set (generalized arithmetic progression) of comparable size.

why_it_matters: >
  The Polynomial Freiman-Ruzsa conjecture is a central problem in additive combinatorics.
  Freiman's theorem (1973) provides exponential bounds; the conjecture sharpens these to
  polynomial. In late 2023, Gowers, Green, Manners, and Tao proved the conjecture over F_2^n
  using entropy methods, a major breakthrough. The integer (Z^n) case remains open with
  polynomial bounds.

