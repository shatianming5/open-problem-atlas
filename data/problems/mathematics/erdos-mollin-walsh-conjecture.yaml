statement:
  canonical: >
    There do not exist three consecutive powerful numbers (a powerful number is a positive
    integer n such that if a prime p divides n, then p^2 also divides n). Equivalently,
    there is no positive integer n such that n, n+1, and n+2 are all powerful.
  informal: >
    A powerful number is one where every prime factor appears at least to the second power
    (like 4, 8, 9, 25, 27, ...). The conjecture says you can never find three powerful
    numbers in a row.

why_it_matters: >
  The Erdos-Mollin-Walsh conjecture addresses the distribution of powerful numbers, which
  are closely related to square-free numbers and the structure of the integers. Its resolution
  would illuminate the spacing properties of numbers with constrained factorizations.

