statement:
  canonical: >
    For every tree T with n edges, the complete graph K_{2n+1} can be decomposed into 2n+1
    edge-disjoint copies of T. Equivalently, every tree with n edges packs 2n+1 times into
    the complete graph K_{2n+1}.
  informal: >
    Any tree with n edges can tile the complete graph on 2n+1 vertices perfectly -- the edges
    of the complete graph can be partitioned into 2n+1 copies of the tree with no overlaps.

why_it_matters: >
  Ringel's conjecture (1963) is a foundational problem in graph theory and combinatorial design.
  It generalizes the well-known fact that K_{2n+1} can be decomposed into Hamiltonian cycles.
  Montgomery, Pokrovskiy, and Sudakov proved it for sufficiently large n (2021), but the conjecture
  remains open for small and moderate values of n for all trees.

