statement:
  canonical: >
    Does the entropy power inequality extend to Rényi entropies of all orders p >= 1?
    Specifically, for independent continuous random variables X and Y with finite Rényi
    entropy of order p, does e^{2 H_p(X+Y)/n} >= e^{2 H_p(X)/n} + e^{2 H_p(Y)/n}
    hold, where H_p denotes the Rényi entropy of order p and n is the dimension?
  informal: >
    The classical entropy power inequality (Shannon, Stam) says that the "entropy power" of
    the sum of independent random variables is at least the sum of their entropy powers. The
    open problem asks whether this extends from Shannon entropy to the full family of Rényi
    entropies.

why_it_matters: >
  The entropy power inequality (EPI) is a pillar of information theory with applications to
  channel capacity, estimation theory, and probability. Extending it to Rényi entropies would
  unify and generalize numerous information-theoretic inequalities and has applications to
  coding theory and statistical mechanics.

