statement:
  canonical: >
    Let B_1, B_2, ..., B_n be n bases of a rank-n matroid M. Then one can always find n
    disjoint transversals of (B_1, ..., B_n), each of which is itself a basis of M.
    Equivalently, if the elements of the n bases are arranged as rows of an n x n matrix,
    one can permute within each row so that every column is also a basis.
  informal: >
    Given n bases of a matroid, each with n elements, arrange them in a grid. Can you always
    rearrange each row so that every column also forms a basis? Rota conjectured yes.

why_it_matters: >
  Rota's basis conjecture, attributed to Gian-Carlo Rota in the 1980s, is a fundamental
  open problem in matroid theory and combinatorics. It connects to Latin squares, scheduling
  theory, and algebraic combinatorics. It has inspired significant work on partial results
  and has been called one of the most beautiful conjectures in matroid theory.

