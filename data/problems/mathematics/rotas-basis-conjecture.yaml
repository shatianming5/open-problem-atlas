partial_results:
  - summary: "The conjecture is known to hold for paving matroids and for strongly base-orderable matroids."
    year: 1994
  - summary: "Geelen and Humphries proved one can always find at least 2 disjoint common transversals that are bases."
    year: 2006
  - summary: "Wild proved the conjecture for matroids of rank at most 3."
    year: 1994
  - summary: "Bucic, Kwan, Pokrovskiy, and Sudakov proved that at least (1/2 - o(1))n disjoint transversal bases exist."
    year: 2020

