repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: validate-data
        name: Validate atlas data
        entry: python -m review.validators.validate_all
        language: python
        pass_filenames: false
        files: ^data/.*\.yaml$
        additional_dependencies:
          - pyyaml>=6.0
          - jsonschema>=4.20
